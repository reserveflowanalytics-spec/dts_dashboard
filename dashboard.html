<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reserve Flow · Daily Treasury Flow Research</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=JetBrains+Mono:wght@400;500;700&display=swap');
:root{
  --paper:#faf6ef; --panel:#f5f0e6; --hair:#d8d0c2; --ink:#1c1a17;
  --sec:#4a453d; --mut:#6b6459; --ox:#8c2332; --grn:#3f6d4e;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:#efe9df;font-family:'Source Serif 4',Georgia,serif;color:var(--ink);
  -webkit-font-smoothing:antialiased;padding:28px 16px}
.mono{font-family:'JetBrains Mono',monospace}
.page{max-width:720px;margin:0 auto;background:var(--paper);border:1px solid var(--hair);
  padding:36px 44px 30px}
.mast{text-align:center;border-bottom:2.5px solid var(--ink);padding-bottom:13px}
.mast .name{font-size:31px;font-weight:700;letter-spacing:.5px}
.mast .tag{font-size:10px;color:var(--mut);letter-spacing:3px;text-transform:uppercase;margin-top:4px}
.dateline{display:flex;justify-content:space-between;font-size:10px;color:var(--mut);
  letter-spacing:1.5px;text-transform:uppercase;border-bottom:1px solid var(--hair);
  padding:7px 2px;margin-bottom:26px}
.sechdr{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--ox);
  font-weight:600;border-top:1px solid var(--ink);padding-top:8px;margin:32px 0 14px;
  display:flex;justify-content:space-between}
.sechdr .n{color:#b7ad9c}
.caption{font-size:11px;font-style:italic;color:var(--mut);margin-top:6px}
.prose{font-size:13.5px;line-height:1.68;color:#2e2a24;margin:10px 0 18px}
.loading{padding:60px 0;text-align:center;font-style:italic;color:var(--mut)}
.err{padding:40px;text-align:center;color:var(--ox)}
.foot{border-top:2.5px solid var(--ink);margin-top:30px;padding-top:10px;display:flex;
  justify-content:space-between;flex-wrap:wrap;gap:6px;font-size:10px;color:var(--mut);
  letter-spacing:1px;text-transform:uppercase}
.foot a{color:var(--ox);text-decoration:none}
@media(max-width:640px){.page{padding:24px 18px}.mast .name{font-size:24px}}
/* TASK2-CSS */ /* TASK3-CSS */ /* TASK4-CSS */ /* TASK5-CSS */
</style>
</head>
<body>
<div class="page">
  <div class="mast">
    <div class="name">Reserve Flow</div>
    <div class="tag">Daily Treasury Flow Research</div>
  </div>
  <div class="dateline">
    <span id="dl-date">&nbsp;</span><span id="dl-issue">&nbsp;</span><span class="mono">DTS T+1</span>
  </div>
  <div class="loading" id="loader">Loading today's issue&hellip;</div>
  <section id="sec-today" hidden></section>
  <section id="sec-data" hidden></section>
  <section id="sec-track" hidden></section>
  <section id="sec-hood" hidden></section>
  <div class="foot" id="foot" hidden>
    <span>Source: US Treasury DTS</span>
    <span>Reserve Flow Analytics</span>
    <span><a href="https://reserveflow.substack.com" target="_blank" rel="noopener">Subscribe for the daily note &rarr;</a></span>
  </div>
</div>
<script>
'use strict';
const C = { paper:'#faf6ef', panel:'#f5f0e6', hair:'#d8d0c2', ink:'#1c1a17',
            sec:'#4a453d', mut:'#6b6459', ox:'#8c2332', grn:'#3f6d4e' };
const MINUS = '−';
function fmtB(n, dp=1){ const s = n<0 ? MINUS : '+'; return s+'$'+Math.abs(n).toFixed(dp)+'B'; }
function md2b(s){ return (s||'').replace(/\*\*(.+?)\*\*/g,'<b>$1</b>'); }
function regimeColor(r){ return r==='Supportive'?C.grn : r==='Restrictive'?C.ox : C.mut; }
function longDate(iso){ return new Date(iso+'T12:00:00Z').toLocaleDateString('en-US',
  {weekday:'long',year:'numeric',month:'long',day:'numeric',timeZone:'UTC'}); }
const serifFont = {family:"'Source Serif 4',Georgia,serif"};
const monoFont  = {family:"'JetBrains Mono',monospace"};

async function loadAll(){
  const j = async (u) => { const r = await fetch(u+'?v='+Date.now()); if(!r.ok) throw new Error(u); return r.json(); };
  const t = async (u) => { try { const r = await fetch(u+'?v='+Date.now()); if(!r.ok) return null; return r.text(); } catch(e) { return null; } };
  const [viz, pos, sigTxt, sigRet, spx] = await Promise.all([
    j('viz_data.json'),
    j('positioning_today.json').catch(()=>null),
    t('signal_log.jsonl'),
    j('signal_returns.json').catch(()=>null),
    j('spx_series.json').catch(()=>null),
  ]);
  const signalLog = (sigTxt||'').trim().split('\n').filter(Boolean).map(l=>JSON.parse(l));
  return { viz, pos, signalLog, signalReturns: sigRet, spx };
}

/* TASK2-JS */
/* TASK3-JS */
/* TASK4-JS */
/* TASK5-JS */

async function main(){
  let D;
  try { D = await loadAll(); }
  catch(e){ document.getElementById('loader').outerHTML =
    '<div class="err">Could not load dashboard data ('+e.message+'). Serve this directory over HTTP.</div>'; return; }
  window.DATA = D;
  document.getElementById('dl-date').textContent = longDate(D.viz.meta.latest);
  document.getElementById('dl-issue').textContent = 'Issue No. '+D.signalLog.length;
  document.getElementById('loader').hidden = true;
  ['sec-today','sec-data','sec-track','sec-hood','foot'].forEach(id=>document.getElementById(id).hidden=false);
  if(typeof renderToday==='function') renderToday(D);
  if(typeof renderDataSection==='function') renderDataSection(D);
  if(typeof renderTrackRecord==='function') renderTrackRecord(D);
  if(typeof setupUnderHood==='function') setupUnderHood(D);
}
main();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Reserve Flow · Daily Treasury Flow Research</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&family=JetBrains+Mono:wght@400;500;700&display=swap');
:root{
  --paper:#faf6ef; --panel:#f5f0e6; --hair:#d8d0c2; --ink:#1c1a17;
  --sec:#4a453d; --mut:#6b6459; --ox:#8c2332; --grn:#3f6d4e;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:#efe9df;font-family:'Source Serif 4',Georgia,serif;color:var(--ink);
  -webkit-font-smoothing:antialiased;padding:28px 16px}
.mono{font-family:'JetBrains Mono',monospace}
.page{max-width:720px;margin:0 auto;background:var(--paper);border:1px solid var(--hair);
  padding:36px 44px 30px}
.mast{text-align:center;border-bottom:2.5px solid var(--ink);padding-bottom:13px}
.mast .name{font-size:31px;font-weight:700;letter-spacing:.5px}
.mast .tag{font-size:10px;color:var(--mut);letter-spacing:3px;text-transform:uppercase;margin-top:4px}
.dateline{display:flex;justify-content:space-between;font-size:10px;color:var(--mut);
  letter-spacing:1.5px;text-transform:uppercase;border-bottom:1px solid var(--hair);
  padding:7px 2px;margin-bottom:26px}
.sechdr{font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--ox);
  font-weight:600;border-top:1px solid var(--ink);padding-top:8px;margin:32px 0 14px;
  display:flex;justify-content:space-between}
.sechdr .n{color:#b7ad9c}
.caption{font-size:11px;font-style:italic;color:var(--mut);margin-top:6px}
.prose{font-size:13.5px;line-height:1.68;color:#2e2a24;margin:10px 0 18px}
.loading{padding:60px 0;text-align:center;font-style:italic;color:var(--mut)}
.err{padding:40px;text-align:center;color:var(--ox)}
.foot{border-top:2.5px solid var(--ink);margin-top:30px;padding-top:10px;display:flex;
  justify-content:space-between;flex-wrap:wrap;gap:6px;font-size:10px;color:var(--mut);
  letter-spacing:1px;text-transform:uppercase}
.foot a{color:var(--ox);text-decoration:none}
@media(max-width:640px){.page{padding:24px 18px}.mast .name{font-size:24px}}
.bias-line{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;margin-bottom:6px}
.bias-k{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--ox);font-weight:600}
.bias-v{font-size:34px;font-weight:700}
.chip{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;padding:3px 10px;
  border:1px solid;position:relative;top:-5px}
.stale{font-size:11px;font-style:italic;color:var(--ox);margin-bottom:8px}
.lede{font-size:15px;line-height:1.65;color:#2e2a24;margin-bottom:16px}
.statrow{display:grid;grid-template-columns:repeat(4,1fr);border-top:1px solid var(--hair);
  border-bottom:1px solid var(--hair);margin-bottom:20px}
.stat{padding:9px 10px;border-right:1px solid var(--hair)}
.stat:last-child{border-right:none}
.stat .k{font-size:8.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--mut)}
.stat .v{font-size:15px;font-weight:600;font-variant-numeric:tabular-nums;margin-top:2px}
@media(max-width:640px){.statrow{grid-template-columns:1fr 1fr}.stat:nth-child(2){border-right:none}}
.flowpath{stroke-dasharray:6 8;animation:march 1.2s linear infinite}
@keyframes march{to{stroke-dashoffset:-14}}
@media(prefers-reduced-motion:reduce){.flowpath{animation:none}}
.flownode{fill:var(--panel);stroke:var(--ink);stroke-width:1.1}
.flowtxt{font-size:10px;fill:var(--ink);font-family:'Source Serif 4',Georgia,serif}
.flowamt{font-family:'JetBrains Mono',monospace;font-size:9px;font-weight:600}
.chartblock{margin-bottom:6px}
.chartblock .ttl{font-size:13px;font-weight:600;margin-bottom:2px}
.chartwrap{position:relative;height:230px;background:var(--panel);border:1px solid var(--hair);padding:8px}
.subtoggle{display:inline-flex;gap:0;margin:0 0 8px}
.subtoggle button{font-family:'Source Serif 4',Georgia,serif;font-size:11px;padding:3px 12px;
  background:var(--paper);border:1px solid var(--hair);color:var(--mut);cursor:pointer}
.subtoggle button.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.tr-grid{display:grid;grid-template-columns:1.25fr 1fr;gap:18px;align-items:start}
@media(max-width:640px){.tr-grid{grid-template-columns:1fr}}
.bigstat{text-align:center;padding:10px 0 2px}
.bigstat .v{font-size:30px;font-weight:700}
.bigstat .k{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--mut);margin-top:2px}
.rf-table{width:100%;border-collapse:collapse;font-size:11px;margin-top:8px}
.rf-table th{text-align:right;font-size:8.5px;letter-spacing:1px;text-transform:uppercase;
  color:var(--mut);border-bottom:1px solid var(--ink);padding:4px 6px;font-weight:600}
.rf-table td{text-align:right;padding:4px 6px;border-bottom:1px solid var(--hair);
  font-variant-numeric:tabular-nums}
.rf-table th:first-child,.rf-table td:first-child{text-align:left}
.ledgerlink{font-size:12px;font-style:italic;color:var(--ox);cursor:pointer;
  background:none;border:none;font-family:inherit;padding:0}
#ledger-wrap{max-height:340px;overflow-y:auto;border:1px solid var(--hair);margin-top:8px}
details.uth{border:1px solid var(--hair);background:var(--panel);padding:10px 14px;margin-top:8px}
details.uth summary{font-size:12px;font-weight:600;cursor:pointer;color:var(--sec)}
.mini-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px}
@media(max-width:640px){.mini-grid{grid-template-columns:1fr}}
.mini-grid .mt{font-size:11px;font-weight:600;margin-bottom:4px}
.mini-wrap{position:relative;height:120px;background:var(--paper);border:1px solid var(--hair);padding:4px}
</style>
</head>
<body>
<div class="page">
  <div class="mast">
    <div class="name">Reserve Flow</div>
    <div class="tag">Daily Treasury Flow Research</div>
  </div>
  <div class="dateline">
    <span id="dl-date">&nbsp;</span><span id="dl-issue">&nbsp;</span><span class="mono">DTS T+1</span>
  </div>
  <div class="loading" id="loader">Loading today's issue&hellip;</div>
  <section id="sec-today" hidden></section>
  <section id="sec-data" hidden></section>
  <section id="sec-track" hidden></section>
  <section id="sec-hood" hidden></section>
  <div class="foot" id="foot" hidden>
    <span>Source: US Treasury DTS</span>
    <span>Reserve Flow Analytics</span>
    <span><a href="https://reserveflow.substack.com" target="_blank" rel="noopener">Subscribe for the daily note &rarr;</a></span>
  </div>
</div>
<script>
'use strict';
const C = { paper:'#faf6ef', panel:'#f5f0e6', hair:'#d8d0c2', ink:'#1c1a17',
            sec:'#4a453d', mut:'#6b6459', ox:'#8c2332', grn:'#3f6d4e' };
const MINUS = '−';
function fmtB(n, dp=1){ const s = n<0 ? MINUS : '+'; return s+'$'+Math.abs(n).toFixed(dp)+'B'; }
function md2b(s){ return (s||'').replace(/\*\*(.+?)\*\*/g,'<b>$1</b>'); }
function regimeColor(r){ return r==='Supportive'?C.grn : r==='Restrictive'?C.ox : C.mut; }
function longDate(iso){ return new Date(iso+'T12:00:00Z').toLocaleDateString('en-US',
  {weekday:'long',year:'numeric',month:'long',day:'numeric',timeZone:'UTC'}); }
const serifFont = {family:"'Source Serif 4',Georgia,serif"};
const monoFont  = {family:"'JetBrains Mono',monospace"};

async function loadAll(){
  const j = async (u) => { const r = await fetch(u+'?v='+Date.now()); if(!r.ok) throw new Error(u); return r.json(); };
  const t = async (u) => { try { const r = await fetch(u+'?v='+Date.now()); if(!r.ok) return null; return r.text(); } catch(e) { return null; } };
  const [viz, pos, sigTxt, sigRet, spx] = await Promise.all([
    j('viz_data.json'),
    j('positioning_today.json').catch(()=>null),
    t('signal_log.jsonl'),
    j('signal_returns.json').catch(()=>null),
    j('spx_series.json').catch(()=>null),
  ]);
  const signalLog = (sigTxt||'').trim().split('\n').filter(Boolean).map(l=>JSON.parse(l));
  return { viz, pos, signalLog, signalReturns: sigRet, spx };
}

function regimeStreak(log){
  if(!log.length) return 0;
  const r = log[log.length-1].regime; let n = 0;
  for(let i=log.length-1;i>=0 && log[i].regime===r;i--) n++;
  return n;
}

function renderToday(D){
  const el = document.getElementById('sec-today');
  const meta = D.viz.meta, cards = D.viz.cards, rep = D.viz.report || {};
  const pos = D.pos;
  const rc = regimeColor(meta.regime);
  const biasTxt = pos ? pos.bias.charAt(0)+pos.bias.slice(1).toLowerCase() : meta.regime;
  const conv = pos ? pos.conviction : '';
  const stale = pos && pos.as_of < meta.latest;
  const streak = regimeStreak(D.signalLog);
  const tga5 = (D.viz.narrative && D.viz.narrative.tga_5d != null) ? D.viz.narrative.tga_5d : null;

  // 20d flow sums for the map
  const d20 = D.viz.daily.slice(-20);
  const sum = k => d20.reduce((s,d)=>s+(d[k]||0),0);
  const cfi20 = sum('cfi'), rec20 = sum('taxes')+sum('tariffs');
  const spend20 = cfi20 + rec20;
  const iss20 = sum('bills')+sum('coupon');
  const tgaChg = d20[d20.length-1].tga - d20[0].tga;   // >0 build, <0 drawdown
  const w = v => Math.max(1.5, Math.min(9, Math.abs(v)/40)); // stroke width per $B

  el.innerHTML = `
  <div class="bias-line">
    <span class="bias-k">Today's Bias</span>
    <span class="bias-v">${biasTxt}</span>
    <span class="chip" style="color:${rc};border-color:${rc}">${meta.regime}</span>
    ${conv?`<span class="mono" style="font-size:11px;color:var(--mut)">conviction: ${conv}</span>`:''}
  </div>
  ${stale?`<div class="stale">Positioning as of ${pos.as_of}; DTS data through ${meta.latest}.</div>`:''}
  <p class="lede">${md2b((rep.executive_summary||'').split('. ').slice(0,3).join('. ')+'.')}</p>
  <div class="statrow">
    <div class="stat"><div class="k">CFI 20d avg</div>
      <div class="v mono" style="color:${cards.avg_20d_cfi>=0?C.grn:C.ox}">${fmtB(cards.avg_20d_cfi)}/d</div></div>
    <div class="stat"><div class="k">CFI 5d avg</div>
      <div class="v mono" style="color:${cards.avg_5d_cfi>=0?C.grn:C.ox}">${fmtB(cards.avg_5d_cfi)}/d</div></div>
    <div class="stat"><div class="k">TGA ${tga5!=null?'5d &Delta;':'level'}</div>
      <div class="v mono">${tga5!=null?fmtB(tga5):'$'+cards.tga_level.toFixed(0)+'B'}</div></div>
    <div class="stat"><div class="k">Regime streak</div>
      <div class="v mono">${streak} days</div></div>
  </div>
  <svg viewBox="0 0 640 130" style="width:100%;display:block" role="img"
       aria-label="Flow of funds over the last 20 sessions">
    <rect class="flownode" x="8" y="46" width="110" height="40" rx="2"/>
    <text class="flowtxt" x="63" y="63" text-anchor="middle">TREASURY</text>
    <text class="flowamt" x="63" y="76" text-anchor="middle" fill="${C.ink}">spend $${spend20.toFixed(0)}B</text>
    <rect class="flownode" x="262" y="46" width="116" height="40" rx="2"/>
    <text class="flowtxt" x="320" y="63" text-anchor="middle">PRIVATE SECTOR</text>
    <text class="flowamt" x="320" y="76" text-anchor="middle"
      fill="${cfi20>=0?C.grn:C.ox}">net ${fmtB(cfi20,0)}</text>
    <rect class="flownode" x="516" y="8" width="112" height="34" rx="2"/>
    <text class="flowtxt" x="572" y="23" text-anchor="middle">NET ISSUANCE</text>
    <text class="flowamt" x="572" y="36" text-anchor="middle" fill="${C.ox}">${fmtB(iss20,0)}</text>
    <rect class="flownode" x="516" y="90" width="112" height="34" rx="2"/>
    <text class="flowtxt" x="572" y="105" text-anchor="middle">TGA ${tgaChg<0?'DRAWDOWN':'BUILD'}</text>
    <text class="flowamt" x="572" y="118" text-anchor="middle" fill="${C.ox}">${fmtB(Math.abs(tgaChg),0)}</text>
    <path class="flowpath" d="M118,58 L262,58" stroke="${C.grn}" fill="none" stroke-width="${w(spend20)}"/>
    <path class="flowpath" d="M262,76 L118,76" stroke="${C.ox}" fill="none" stroke-width="${w(rec20)}"/>
    <path class="flowpath" d="M516,25 C450,30 410,44 378,54" stroke="${C.mut}" fill="none" stroke-width="${w(iss20)}"/>
    <path class="flowpath" d="${tgaChg<0?'M516,107 C450,102 410,88 378,80':'M378,80 C410,88 450,102 516,107'}"
      stroke="${C.mut}" fill="none" stroke-width="${w(tgaChg)}"/>
    <text class="flowamt" x="168" y="50" fill="${C.grn}">spending &rarr;</text>
    <text class="flowamt" x="160" y="92" fill="${C.ox}">&larr; receipts $${rec20.toFixed(0)}B</text>
  </svg>
  <p class="caption">Flow of funds, last 20 sessions. Line weight scales with dollar size;
    the gap between spending and receipts is financed at right. Receipts here = taxes + tariffs.</p>`;
}
const charts = {};
const AXIS = (title) => ({
  x:{grid:{display:false},border:{color:C.hair},
     ticks:{font:{...serifFont,size:10},color:C.mut,maxRotation:0,autoSkip:true,maxTicksLimit:9}},
  y:{grid:{color:'#e9e2d4'},border:{display:false},
     ticks:{font:{...monoFont,size:10},color:C.mut},
     title:title?{display:true,text:title,color:C.mut,font:{...serifFont,size:10,style:'italic'}}:undefined}
});
const TOOLTIP = {backgroundColor:C.ink,titleColor:C.paper,bodyColor:C.paper,cornerRadius:2,
  padding:10,titleFont:{...monoFont,size:11},bodyFont:{...monoFont,size:11},displayColors:false};

function renderDataSection(D){
  const el = document.getElementById('sec-data');
  const rep = D.viz.report||{};
  el.innerHTML = `
  <div class="sechdr"><span>The Data</span><span class="n">II</span></div>
  <div class="chartblock"><div class="ttl">Daily net fiscal flows</div>
    <div class="chartwrap"><canvas id="ch-daily"></canvas></div>
    <p class="caption">Core fiscal injection per session, last ${D.viz.daily.length} sessions, with 20-day average.</p>
  </div>
  <p class="prose">${md2b(rep.what_changed||'')}</p>
  <div class="chartblock"><div class="ttl">Cumulative injection &middot; FY${D.viz.meta.fiscal_year} vs FY${D.viz.meta.fiscal_year-1}</div>
    <div class="subtoggle"><button id="tg-cum" class="on">Cumulative</button><button id="tg-gap">YoY gap</button></div>
    <div class="chartwrap"><canvas id="ch-cum"></canvas></div>
  </div>
  <p class="prose">${md2b(rep.base_case||'')}</p>`;

  // daily bars + 20d line
  const days = D.viz.daily;
  const roll = days.map((_,i)=> i<19 ? null :
    +(days.slice(i-19,i+1).reduce((s,d)=>s+d.cfi,0)/20).toFixed(2));
  charts.daily = new Chart(document.getElementById('ch-daily'),{
    data:{labels:days.map(d=>d.date.slice(5)),datasets:[
      {type:'bar',data:days.map(d=>d.cfi),
       backgroundColor:days.map(d=>d.cfi>=0?C.grn+'55':C.ox+'55'),
       borderColor:days.map(d=>d.cfi>=0?C.grn:C.ox),borderWidth:{top:1}},
      {type:'line',data:roll,borderColor:C.ink,borderWidth:1.5,pointRadius:0,tension:.3}]},
    options:{animation:false,responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{legend:{display:false},tooltip:{...TOOLTIP,callbacks:{
        label:c=>c.datasetIndex===0?('CFI '+fmtB(c.parsed.y)):('20d avg '+fmtB(c.parsed.y))}}},
      scales:AXIS('$B / session')}
  });

  // cumulative vs prior year + gap toggle
  const fy = String(D.viz.meta.fiscal_year), py = String(D.viz.meta.fiscal_year-1);
  const cur = D.viz.cumulative[fy]||[], prv = D.viz.cumulative[py]||[];
  const labels = (prv.length>=cur.length?prv:cur).map(m=>m.month);
  const mk = (mode) => {
    if(charts.cum) charts.cum.destroy();
    const gap = cur.map((m,i)=> prv[i] ? +(m.cum_cfi-prv[i].cum_cfi).toFixed(1) : null);
    charts.cum = new Chart(document.getElementById('ch-cum'),
      mode==='gap' ? {
        type:'bar',
        data:{labels:labels.slice(0,cur.length),datasets:[{data:gap,
          backgroundColor:gap.map(v=>v>=0?C.grn+'55':C.ox+'55'),
          borderColor:gap.map(v=>v>=0?C.grn:C.ox),borderWidth:{top:1}}]},
        options:{animation:false,responsive:true,maintainAspectRatio:false,
          plugins:{legend:{display:false},tooltip:{...TOOLTIP,callbacks:{
            label:c=>'YoY gap '+fmtB(c.parsed.y)}}},scales:AXIS('$B vs prior FY')}
      } : {
        type:'line',
        data:{labels,datasets:[
          {label:'FY'+fy,data:cur.map(m=>m.cum_cfi),borderColor:C.ox,borderWidth:2,
           pointRadius:0,tension:.25,fill:{target:'origin',above:C.ox+'12'}},
          {label:'FY'+py,data:prv.map(m=>m.cum_cfi),borderColor:C.mut,borderWidth:1.3,
           borderDash:[4,4],pointRadius:0,tension:.25}]},
        options:{animation:false,responsive:true,maintainAspectRatio:false,
          interaction:{mode:'index',intersect:false},
          plugins:{legend:{display:true,labels:{font:{...serifFont,size:11},color:C.sec,
            boxWidth:18,boxHeight:2}},tooltip:{...TOOLTIP,callbacks:{
            label:c=>c.dataset.label+' '+fmtB(c.parsed.y)}}},
          scales:AXIS('$B cumulative')}
      });
  };
  mk('cum');
  const bC=document.getElementById('tg-cum'), bG=document.getElementById('tg-gap');
  bC.onclick=()=>{bC.classList.add('on');bG.classList.remove('on');mk('cum');};
  bG.onclick=()=>{bG.classList.add('on');bC.classList.remove('on');mk('gap');};
}

function renderTrackRecord(D){
  const el = document.getElementById('sec-track');
  const sum = D.signalReturns && D.signalReturns.summary;
  const perf = sum ? sum.regime_performance : null;
  const tt = D.viz.timing_trades && D.viz.timing_trades.track_record;
  const pct = v => v==null ? 'n/a' : v.toFixed(1)+'%';

  let tableRows = '';
  if(perf) for(const r of ['Supportive','Neutral','Restrictive']){
    const p = perf[r]; if(!p) continue;
    tableRows += `<tr><td style="color:${regimeColor(r)};font-weight:600">${r}
      <span style="color:var(--mut);font-weight:400">(n=${p.count})</span></td>
      <td class="mono">${pct(p.avg_spx_5d)}</td><td class="mono">${pct(p.avg_spx_10d)}</td>
      <td class="mono">${pct(p.avg_spx_20d)}</td></tr>`;
  }
  const spread = perf && perf.Supportive && perf.Restrictive
    ? (perf.Supportive.avg_spx_20d - perf.Restrictive.avg_spx_20d) : null;

  el.innerHTML = `
  <div class="sechdr"><span>Track Record</span><span class="n">III</span></div>
  <div class="tr-grid">
    <div><div class="ttl" style="font-size:13px;font-weight:600">Fiscal regime vs S&amp;P 500</div>
      <div class="chartwrap" style="height:240px"><canvas id="ch-link"></canvas></div>
      <p class="caption">20-day average injection (left) against SPX (right).
        Background bands mark the logged regime: green supportive, red restrictive.</p></div>
    <div>
      ${spread!=null?`<div class="bigstat"><div class="v mono" style="color:${spread>=0?C.grn:C.ox}">
        ${(spread>=0?'+':MINUS)+Math.abs(spread).toFixed(1)}%</div>
        <div class="k">Supportive minus restrictive &middot; avg 20d fwd SPX</div></div>`:''}
      <table class="rf-table"><thead><tr><th>Regime</th><th>5d</th><th>10d</th><th>20d</th></tr></thead>
      <tbody>${tableRows||'<tr><td colspan="4" style="font-style:italic">signal_returns.json unavailable</td></tr>'}</tbody></table>
      <p class="caption">Average forward SPX return after each logged regime state.
        ${sum?`${sum.total_signals} signals logged.`:''}
        Association, not causation.</p>
      ${tt?`<p class="caption" style="margin-top:10px">Timing system: ${tt.n_winners}/${tt.n_closed} closed trades
        positive, ${tt.mean_return_pct>=0?'+':''}${tt.mean_return_pct}% mean return, avg hold ${Math.round(tt.avg_days_held)} days.</p>`:''}
    </div>
  </div>
  <p class="prose" style="margin-top:12px">Every signal logged since ${sum?sum.date_range.first:'inception'},
    graded against forward returns. <button class="ledgerlink" id="ledger-btn">Full ledger &rarr;</button></p>
  <div id="ledger-wrap" hidden></div>`;

  // linkage chart from signal_log + spx_series
  const log = D.signalLog, spx = D.spx||{};
  const keys = Object.keys(spx).sort();
  const near = d => { if(spx[d]!==undefined) return spx[d];
    let lo=0,hi=keys.length-1,best=null;
    while(lo<=hi){const m=(lo+hi)>>1; if(keys[m]<=d){best=keys[m];lo=m+1;}else hi=m-1;}
    return best?spx[best]:null; };
  const bands = {id:'bands',beforeDraw(ch){
    const {ctx,chartArea:a,scales:{x}} = ch; if(!a) return;
    log.forEach((e,i)=>{
      if(e.regime==='Neutral') return;
      const x0 = x.getPixelForValue(i-0.5), x1 = x.getPixelForValue(i+0.5);
      ctx.fillStyle = e.regime==='Supportive' ? 'rgba(63,109,78,0.10)' : 'rgba(140,35,50,0.08)';
      ctx.fillRect(x0, a.top, x1-x0, a.bottom-a.top);
    });
  }};
  charts.link = new Chart(document.getElementById('ch-link'),{
    type:'line',
    data:{labels:log.map(e=>e.date),datasets:[
      {data:log.map(e=>+(e.net_fiscal_injection_20d/1000).toFixed(2)),yAxisID:'y',
       borderColor:C.ink,borderWidth:1.5,pointRadius:0,tension:.3},
      {data:log.map(e=>near(e.date)),yAxisID:'y1',
       borderColor:C.ox,borderWidth:1.5,pointRadius:0,tension:.2}]},
    options:{animation:false,responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{legend:{display:false},tooltip:{...TOOLTIP,callbacks:{
        label:c=>c.datasetIndex===0?('CFI 20d '+fmtB(c.parsed.y)+'/d'):('SPX '+c.parsed.y.toFixed(0))}}},
      scales:{
        x:{grid:{display:false},border:{color:C.hair},
           ticks:{font:{...serifFont,size:10},color:C.mut,maxRotation:0,autoSkip:true,maxTicksLimit:8,
             callback(v){const d=this.getLabelForValue(v);return d.slice(0,7);}}},
        y:{position:'left',grid:{color:'#e9e2d4'},border:{display:false},
           ticks:{font:{...monoFont,size:10},color:C.mut,callback:v=>v+'B/d'}},
        y1:{position:'right',grid:{display:false},border:{display:false},
           ticks:{font:{...monoFont,size:10},color:C.ox}}}},
    plugins:[bands]
  });

  // ledger toggle: last 60 entries, newest first
  document.getElementById('ledger-btn').onclick = () => {
    const w = document.getElementById('ledger-wrap');
    if(!w.hidden){ w.hidden = true; return; }
    if(!w.innerHTML){
      const rows = log.slice(-60).reverse().map(e=>`<tr>
        <td class="mono">${e.date}</td>
        <td style="color:${regimeColor(e.regime)};text-align:left">${e.regime}</td>
        <td style="text-align:left">${e.regime_momentum||''}</td>
        <td class="mono">$${(e.tga_level||0).toFixed(0)}B</td>
        <td style="text-align:left">${e.tga_trend||''}</td>
        <td style="text-align:left">${e.composite_label||''}</td></tr>`).join('');
      w.innerHTML = `<table class="rf-table"><thead><tr><th style="text-align:left">Date</th>
        <th style="text-align:left">Regime</th><th style="text-align:left">Momentum</th>
        <th>TGA</th><th style="text-align:left">Trend</th><th style="text-align:left">Composite</th>
        </tr></thead><tbody>${rows}</tbody></table>`;
    }
    w.hidden = false;
  };
}
function setupUnderHood(D){
  const el = document.getElementById('sec-hood');
  el.innerHTML = `
  <div class="sechdr"><span>Under the Hood</span><span class="n">IV</span></div>
  <details class="uth" id="uth-comp">
    <summary>Receipts &amp; spending composition &middot; taxes, transfers, interest, tariffs</summary>
    <div class="mini-grid">
      ${['taxes','hh','interest','tariffs'].map(k=>`<div>
        <div class="mt">${{taxes:'Tax receipts',hh:'Household transfers',
          interest:'Interest payments',tariffs:'Tariff receipts'}[k]}</div>
        <div class="mini-wrap"><canvas id="mini-${k}"></canvas></div></div>`).join('')}
    </div>
    <p class="caption">Monthly totals, FY${D.viz.meta.fiscal_year} bars vs FY${D.viz.meta.fiscal_year-1} dashed.</p>
  </details>
  <details class="uth" id="uth-iss">
    <summary>Issuance mix &middot; bills vs coupons, last 12 weeks</summary>
    <div class="chartwrap" style="height:180px;margin-top:12px"><canvas id="ch-iss"></canvas></div>
    <p class="caption">Net weekly settlement: positive = cash drained to fund issuance.</p>
  </details>`;

  const fy = String(D.viz.meta.fiscal_year), py = String(D.viz.meta.fiscal_year-1);
  const cur = D.viz.cumulative[fy]||[], prv = D.viz.cumulative[py]||[];

  document.getElementById('uth-comp').addEventListener('toggle', function once(ev){
    if(!ev.target.open || charts.mini_taxes) return;
    for(const k of ['taxes','hh','interest','tariffs']){
      charts['mini_'+k] = new Chart(document.getElementById('mini-'+k),{
        data:{labels:prv.map(m=>m.month),datasets:[
          {type:'bar',data:cur.map(m=>m[k]),backgroundColor:C.grn+'44',
           borderColor:C.grn,borderWidth:{top:1}},
          {type:'line',data:prv.map(m=>m[k]),borderColor:C.mut,borderWidth:1.2,
           borderDash:[4,4],pointRadius:0,tension:.25}]},
        options:{animation:false,responsive:true,maintainAspectRatio:false,
          plugins:{legend:{display:false},tooltip:{...TOOLTIP,callbacks:{
            label:c=>(c.datasetIndex===0?'FY'+fy+' ':'FY'+py+' ')+fmtB(c.parsed.y,0)}}},
          scales:{x:{grid:{display:false},border:{color:C.hair},
              ticks:{font:{...serifFont,size:8.5},color:C.mut}},
            y:{grid:{display:false},border:{display:false},
              ticks:{font:{...monoFont,size:8.5},color:C.mut,maxTicksLimit:4}}}}
      });
    }
  });

  document.getElementById('uth-iss').addEventListener('toggle', function(ev){
    if(!ev.target.open || charts.iss) return;
    const wk = D.viz.weekly||[];
    charts.iss = new Chart(document.getElementById('ch-iss'),{
      type:'bar',
      data:{labels:wk.map(w=>w.week.replace('20','').replace('-W','w')),datasets:[
        {label:'Bills',data:wk.map(w=>w.bills),backgroundColor:C.mut+'66',borderColor:C.mut,borderWidth:{top:1}},
        {label:'Coupons',data:wk.map(w=>w.coupon),backgroundColor:C.ox+'55',borderColor:C.ox,borderWidth:{top:1}}]},
      options:{animation:false,responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:true,labels:{font:{...serifFont,size:11},color:C.sec,boxWidth:12}},
          tooltip:{...TOOLTIP,callbacks:{label:c=>c.dataset.label+' '+fmtB(c.parsed.y)}}},
        scales:{x:{stacked:true,grid:{display:false},border:{color:C.hair},
            ticks:{font:{...monoFont,size:9},color:C.mut}},
          y:{stacked:true,grid:{color:'#e9e2d4'},border:{display:false},
            ticks:{font:{...monoFont,size:10},color:C.mut}}}}
    });
  });
}

async function main(){
  let D;
  try { D = await loadAll(); }
  catch(e){ document.getElementById('loader').outerHTML =
    '<div class="err">Could not load dashboard data ('+e.message+'). Serve this directory over HTTP.</div>'; return; }
  window.DATA = D;
  document.getElementById('dl-date').textContent = longDate(D.viz.meta.latest);
  document.getElementById('dl-issue').textContent = 'Issue No. '+D.signalLog.length;
  document.getElementById('loader').hidden = true;
  ['sec-today','sec-data','sec-track','sec-hood','foot'].forEach(id=>document.getElementById(id).hidden=false);
  if(typeof renderToday==='function') renderToday(D);
  if(typeof renderDataSection==='function') renderDataSection(D);
  if(typeof renderTrackRecord==='function') renderTrackRecord(D);
  if(typeof setupUnderHood==='function') setupUnderHood(D);
}
main();
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>DTS Flow-of-Funds Dashboard</title>
<link rel="stylesheet" href="rfa-design-system.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
/* ── Page-specific overrides (DTS Dashboard) ── */

/* Header — matches RFA header pattern */
.dts-header{position:relative;padding:var(--sp-10) 0 var(--sp-8);margin-bottom:var(--sp-8);border-bottom:1px solid var(--border);overflow:hidden;background:radial-gradient(circle at 10% 80%,rgba(6,182,212,0.08),transparent 40%),radial-gradient(circle at 90% 20%,rgba(59,130,246,0.06),transparent 40%);text-align:center}
.dts-header::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:0.5}
.cat{font-size:var(--type-caption);color:var(--accent);text-transform:uppercase;letter-spacing:3px;margin-bottom:var(--sp-2)}
h1{font-family:var(--font-heading);font-size:var(--text-3xl);font-weight:800;letter-spacing:-1px;background:linear-gradient(135deg,#fff 30%,var(--text-secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:var(--sp-1)}
.subtitle{font-size:var(--type-body);color:var(--text-secondary);margin-bottom:0;font-family:var(--font-mono)}

/* Cards grid */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:var(--sp-4);margin-bottom:var(--sp-8)}
.cards .card{text-align:center}
.cards .card{padding:var(--sp-6) var(--sp-5)}

/* Toggle buttons — alias to design system btn/btn-group */
.toggles{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:24px}
.tbtn{padding:var(--sp-2) var(--sp-5);border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg-surface);color:var(--text-secondary);cursor:pointer;font-size:var(--type-body-sm);font-weight:600;font-family:var(--font-body);transition:var(--transition-fast)}
.tbtn:hover{border-color:var(--border-hover);color:var(--text-primary)}
.tbtn.active{background:var(--accent-bg);color:var(--text-primary);border-color:var(--accent-border)}

/* Chart panels */
.panel{background:var(--bg-surface);border-radius:var(--radius-md);border:1px solid var(--border);padding:var(--sp-6) var(--sp-5);margin-bottom:20px;display:none}
.panel.active{display:block}
.panel-title{font-size:var(--type-heading);font-weight:600;color:var(--text-primary);margin-bottom:4px}
.panel-sub{font-size:var(--type-body-sm);color:var(--text-secondary);margin-bottom:16px;line-height:1.5}
.chart-wrap-sm{height:240px}

/* Highlight utilities */
.highlight{font-weight:600}
.hl-pos{color:var(--green)}
.hl-neg{color:var(--red)}
.hl-a1{color:var(--accent)}
.hl-a2{color:var(--yellow)}

/* Transmission chain */
.chain{background:var(--bg-surface);border-radius:var(--radius-md);padding:var(--sp-5) var(--sp-6);border:1px solid var(--border);margin-bottom:20px}
.chain-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:16px}
.chain-item{display:flex;align-items:flex-start;gap:12px}
.chain-bar{width:4px;min-height:52px;border-radius:2px;flex-shrink:0;margin-top:2px}
.chain-from{font-size:var(--type-body-sm);font-weight:600;color:var(--text-primary)}
.chain-val{font-size:var(--type-heading);font-weight:700;margin:2px 0}
.chain-detail{font-size:var(--type-body-sm);color:var(--text-secondary)}

/* Scorecard table */
.sc-table{width:100%;border-collapse:collapse;font-size:var(--type-body-sm)}
.sc-table th{text-align:left;padding:10px 8px;border-bottom:1px solid var(--border);color:var(--text-secondary);font-weight:600;font-size:var(--type-caption);text-transform:uppercase;letter-spacing:.5px}
.sc-table th:not(:first-child){text-align:right}
.sc-table td{padding:10px 8px;border-bottom:1px solid var(--border-subtle);color:var(--text-primary)}
.sc-table td:not(:first-child){text-align:right}
.sc-table tr:hover{background:rgba(255,255,255,0.02)}

/* Monthly table */
.mt-table{width:100%;border-collapse:collapse;font-size:var(--type-body-sm)}
.mt-table th{text-align:right;padding:8px 6px;border-bottom:1px solid var(--border);color:var(--text-secondary);font-weight:600;font-size:var(--type-caption);text-transform:uppercase;letter-spacing:.5px}
.mt-table th:first-child{text-align:left}
.mt-table td{padding:8px 6px;border-bottom:1px solid var(--border-subtle);color:var(--text-primary);text-align:right}
.mt-table td:first-child{text-align:left;color:var(--text-primary);font-weight:500}

/* Calendar */
.cal-item{display:flex;gap:12px;padding:8px 0;border-bottom:1px solid var(--border-subtle)}
.cal-date{min-width:90px;font-weight:600;color:var(--accent);font-size:var(--type-body-sm)}
.cal-event{font-size:var(--type-body-sm);color:var(--text-primary)}

/* Mini title */
.mini-title{font-size:var(--type-body-sm);font-weight:600;color:var(--text-primary);margin-bottom:8px}

/* Footer */
.footer{font-size:var(--type-caption);color:var(--text-dim);text-align:center;padding-top:var(--sp-4);margin-top:var(--sp-2)}

/* Report */
.rpt{background:var(--bg-surface);border-radius:var(--radius-md);padding:var(--sp-5) var(--sp-6);border:1px solid var(--border);margin-bottom:16px}
.rpt-h2{font-size:var(--type-heading);font-weight:700;color:var(--text-primary);margin:0 0 12px}
.rpt-h3{font-size:var(--type-heading);font-weight:600;color:var(--accent);margin:16px 0 8px}
.rpt-p{font-size:var(--type-body);color:var(--text-primary);line-height:1.7;margin-bottom:10px}
.rpt-ul{margin:8px 0 12px 20px;font-size:var(--type-body);color:var(--text-primary);line-height:1.8}
.rpt-ul li{margin-bottom:4px}
.rpt-map{width:100%;border-collapse:collapse;font-size:var(--type-body-sm);margin:8px 0}
.rpt-map th{text-align:left;padding:10px 12px;border-bottom:1px solid var(--border);color:var(--text-secondary);font-weight:600;font-size:var(--type-caption);text-transform:uppercase;letter-spacing:.5px}
.rpt-map td{padding:10px 12px;border-bottom:1px solid var(--border-subtle)}
.rpt-map td:nth-child(2){color:var(--text-primary);font-weight:600}
.rpt-fred{display:block;padding:10px 14px;background:var(--accent-bg);border-radius:var(--radius-sm);border:1px solid var(--accent-border);margin-bottom:8px;text-decoration:none;transition:var(--transition-fast)}
.rpt-fred:hover{background:rgba(6,182,212,0.15);border-color:rgba(6,182,212,0.3)}
.rpt-fred-title{font-size:var(--type-body-sm);font-weight:600;color:var(--accent)}
.rpt-fred-reason{font-size:var(--type-body-sm);color:var(--text-secondary);margin-top:2px}
.rpt-fred-url{font-size:var(--type-caption);color:var(--text-dim);margin-top:2px;word-break:break-all}
.copy-btn{padding:10px 24px;border-radius:var(--radius-sm);border:1px solid var(--accent-border);background:rgba(6,182,212,0.2);color:var(--text-primary);cursor:pointer;font-size:var(--type-body);font-weight:600;font-family:var(--font-body);transition:var(--transition-fast);margin-bottom:20px}
.copy-btn:hover{background:rgba(6,182,212,0.35)}
.copy-btn.copied{border-color:var(--green);background:var(--green-bg);color:var(--green)}
.signal-box{background:rgba(255,255,255,0.03);border-radius:10px;padding:14px 18px;border:1px solid var(--border);margin-bottom:10px}
.signal-title{font-size:var(--type-body);font-weight:600;color:var(--yellow);margin-bottom:6px}

/* Signal Log */
.sl-health{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.sl-health .card-value{font-size:var(--type-heading)}
.sl-table{width:100%;border-collapse:collapse;font-size:var(--type-body-sm);font-family:var(--font-mono)}
.sl-table th{text-align:left;padding:8px 6px;border-bottom:1px solid var(--border);color:var(--text-secondary);font-weight:600;font-size:var(--type-caption);text-transform:uppercase;letter-spacing:.5px;position:sticky;top:0;background:var(--bg-base);z-index:1}
.sl-table td{padding:7px 6px;border-bottom:1px solid var(--border-subtle);color:var(--text-primary);white-space:nowrap}
.sl-table tr:hover{background:rgba(255,255,255,0.02)}
.sl-wrap{max-height:520px;overflow-y:auto;border-radius:var(--radius-md);border:1px solid var(--border)}
.sl-badge{display:inline-block;padding:2px 8px;border-radius:var(--radius-xs);font-size:var(--type-caption);font-weight:600}
.sl-sup{background:var(--green-bg);color:var(--green)}
.sl-res{background:var(--red-bg);color:var(--red)}
.sl-neu{background:var(--accent-bg);color:var(--accent)}
.sl-gap{margin-top:12px}
.sl-gap-toggle{display:inline-flex;align-items:center;gap:6px;cursor:pointer;font-size:var(--type-body-sm);color:var(--text-secondary);padding:6px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg-surface);transition:var(--transition-fast)}
.sl-gap-toggle:hover{background:var(--bg-surface-hover);color:var(--text-primary)}
.sl-gap-toggle .sl-gap-count{color:var(--red);font-weight:700;font-family:var(--font-mono)}
.sl-gap-toggle .sl-gap-arrow{transition:transform .2s;font-size:var(--type-caption)}
.sl-gap-toggle.open .sl-gap-arrow{transform:rotate(90deg)}
.sl-gap-chips{display:none;flex-wrap:wrap;gap:6px;margin-top:8px;padding:10px;border-radius:var(--radius-sm);background:var(--bg-surface);border:1px solid var(--border)}
.sl-gap-chips.open{display:flex}
.sl-gap-chip{display:inline-block;padding:3px 8px;border-radius:var(--radius-xs);font-size:var(--type-caption);font-family:var(--font-mono);color:var(--text-secondary);background:var(--bg-surface);border:1px solid var(--border);cursor:pointer;transition:var(--transition-fast);text-decoration:none}
.sl-gap-chip:hover{background:var(--green-bg);color:var(--green);border-color:rgba(16,185,129,0.3)}
.sl-gap-chip::after{content:'\2197';margin-left:4px;font-size:var(--type-caption);opacity:0;transition:opacity .15s}
.sl-gap-chip:hover::after{opacity:1}
.sl-section{margin-top:28px}
.sl-section-title{font-size:var(--type-heading);font-weight:600;color:var(--text-primary);margin-bottom:4px}
.sl-section-sub{font-size:var(--type-body-sm);color:var(--text-secondary);margin-bottom:14px}
.rt-table{width:100%;border-collapse:collapse;font-size:var(--type-body-sm)}
.rt-table th{text-align:left;padding:10px 8px;border-bottom:1px solid var(--border);color:var(--text-secondary);font-weight:600;font-size:var(--type-caption);text-transform:uppercase;letter-spacing:.5px}
.rt-table th:not(:first-child){text-align:right}
.rt-table td{padding:10px 8px;border-bottom:1px solid var(--border-subtle);color:var(--text-primary)}
.rt-table td:not(:first-child){text-align:right;font-family:var(--font-mono);font-size:var(--type-body-sm)}
.rt-table tr:hover{background:rgba(255,255,255,0.02)}
.rt-pending{color:var(--text-dim);font-style:italic;font-family:var(--font-body)}

/* Technicals */
.tech-tooltip{position:absolute;pointer-events:none;background:rgba(15,15,19,0.95);border:1px solid rgba(255,255,255,0.15);border-radius:var(--radius-sm);padding:10px 14px;font-size:var(--type-body-sm);font-family:var(--font-mono);color:var(--text-primary);z-index:10;display:none;white-space:nowrap}
.tech-tooltip .tt-date{font-weight:700;color:var(--text-primary);margin-bottom:4px}
.tech-tooltip .tt-row{display:flex;justify-content:space-between;gap:16px}
.tech-tooltip .tt-label{color:var(--text-secondary)}

/* Hero Gauge — dominant top-of-page visual */
.gauge-hero{margin-bottom:var(--sp-8);text-align:center}
.gauge-hero .gauge-score-big{font-size:var(--type-hero);font-weight:800;font-family:var(--font-mono);line-height:1;letter-spacing:-2px;margin-bottom:var(--sp-1)}
.gauge-hero .gauge-label-text{font-size:var(--type-heading);font-weight:600;margin-bottom:var(--sp-4)}
.gauge-hero .gauge-bar-wrap{height:24px;border-radius:12px;max-width:600px;margin:0 auto var(--sp-2)}
.gauge-hero .gauge-marker{height:32px;top:-4px;width:4px}
.gauge-hero .gauge-labels{display:flex;justify-content:space-between;max-width:600px;margin:0 auto var(--sp-6);font-size:var(--type-caption);color:var(--text-dim)}

/* Verdict line — one sentence summary below hero */
.verdict{text-align:center;font-size:var(--type-body);color:var(--text-secondary);margin-bottom:var(--sp-8);line-height:1.6;max-width:700px;margin-left:auto;margin-right:auto}
.verdict strong{color:var(--text-primary);font-weight:600}

/* Gauge components row — below cards */
.gauge-components-row{background:var(--bg-surface);border-radius:var(--radius-md);padding:var(--sp-5) var(--sp-6);border:1px solid var(--border);margin-bottom:var(--sp-8)}
.gauge-components-row .gauge-comp-title{font-size:var(--type-caption);font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:var(--sp-4);text-align:center}
.gauge-components{display:grid;grid-template-columns:repeat(6,1fr);gap:var(--sp-3);margin-bottom:var(--sp-4)}
.gauge-component{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:var(--radius-sm);padding:var(--sp-4);text-align:center;cursor:pointer;transition:var(--transition-fast);display:grid;grid-template-rows:2.4em 6px 1.4em auto;gap:var(--sp-1);align-content:start}
.gauge-component:hover{background:var(--bg-surface-hover);border-color:var(--border-hover)}
.gc-name{font-size:var(--type-caption);color:var(--text-secondary);text-transform:uppercase;letter-spacing:.5px;line-height:1.2;align-self:end}
.gc-minibar{height:6px;border-radius:3px;position:relative;overflow:hidden;align-self:center}
.gc-minibar-bg{position:absolute;inset:0;border-radius:3px;background:rgba(255,255,255,0.06)}
.gc-minibar-fill{position:absolute;top:0;height:100%;border-radius:3px;transition:width .6s ease}
.gc-score{font-size:var(--type-heading);font-weight:700;font-family:var(--font-mono);line-height:1}
.gc-detail{font-size:var(--type-caption);color:var(--text-secondary)}
.gauge-disclaimer{font-size:var(--type-caption);color:var(--text-dim);line-height:1.5;text-align:center;margin-top:var(--sp-2)}

/* Legacy gauge-wrap kept for backward compat */
.gauge-wrap{background:var(--bg-surface);border-radius:var(--radius-md);padding:var(--sp-5) var(--sp-6);border:1px solid var(--border);margin-bottom:28px}
.gauge-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px}
.gauge-title{font-size:var(--type-caption);font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:1.5px}
.gauge-score{font-size:var(--type-heading-lg);font-weight:700;font-family:var(--font-mono)}
.gauge-labels-old{display:flex;justify-content:space-between;font-size:var(--type-caption);color:var(--text-dim);margin-bottom:2px}
.gauge-reading{font-size:var(--type-heading);font-weight:600;margin-bottom:16px}
.rpt-highlight{animation:highlight 1.5s ease}

/* Rel. Strength */
.rs-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:20px}
.rs-pair-sel{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:16px}
.rs-pair-btn{padding:5px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg-surface);color:var(--text-secondary);cursor:pointer;font-size:var(--type-body-sm);font-weight:600;font-family:var(--font-body);transition:var(--transition-fast)}
.rs-pair-btn:hover{border-color:var(--border-hover)}
.rs-pair-btn.active{background:var(--accent-bg);color:var(--text-primary);border-color:var(--accent-border)}
.rs-table{width:100%;border-collapse:collapse;font-size:var(--type-body-sm)}
.rs-table th{text-align:left;padding:10px 8px;border-bottom:1px solid var(--border);color:var(--text-secondary);font-weight:600;font-size:var(--type-caption);text-transform:uppercase;letter-spacing:.5px}
.rs-table th:not(:first-child){text-align:right}
.rs-table td{padding:10px 8px;border-bottom:1px solid var(--border-subtle);color:var(--text-primary)}
.rs-table td:not(:first-child){text-align:right;font-family:var(--font-mono);font-size:var(--type-body-sm)}
.rs-table tr:hover{background:rgba(255,255,255,0.02)}
.rs-signal{display:inline-block;padding:2px 8px;border-radius:var(--radius-xs);font-size:var(--type-caption);font-weight:600}
.rs-ow{background:var(--green-bg);color:var(--green)}
.rs-uw{background:var(--red-bg);color:var(--red)}
.rs-mix{background:var(--accent-bg);color:var(--accent)}
.rs-aligned{color:var(--green)}.rs-divergent{color:var(--red)}.rs-neutral-align{color:var(--text-secondary)}
.rs-assets{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.rs-assets span{display:inline-block;padding:3px 10px;border-radius:var(--radius-xs);font-size:var(--type-body-sm);font-weight:600;font-family:var(--font-mono)}
.rs-assets .ow{background:rgba(16,185,129,0.15);color:var(--green);border:1px solid rgba(16,185,129,0.3)}
.rs-assets .uw{background:rgba(239,68,68,0.15);color:var(--red);border:1px solid rgba(239,68,68,0.3)}
/* Trade idea indicator */
.trade-dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px;cursor:pointer;transition:var(--transition-fast);vertical-align:middle}
.trade-dot.active{background:var(--green);box-shadow:0 0 6px rgba(16,185,129,0.5);animation:pulse 2s infinite}
.trade-dot.inactive{background:rgba(255,255,255,0.1);cursor:default}
.trade-panel{display:none;padding:16px 12px;background:rgba(16,185,129,0.05);border-left:3px solid var(--green);margin:0}
.trade-panel.open{display:table-row}
.trade-panel td{padding:16px 12px !important;border-bottom:1px solid rgba(16,185,129,0.15) !important}
.trade-panel .tp-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.trade-panel .tp-section{font-size:var(--type-body-sm);color:var(--text-primary);line-height:1.7}
.trade-panel .tp-label{color:var(--text-secondary);font-size:var(--type-caption);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;font-weight:600}
.trade-panel .tp-val{font-family:var(--font-mono);font-size:var(--type-body-sm);color:var(--text-primary)}
.trade-panel .tp-row{display:flex;justify-content:space-between;padding:2px 0}
.trade-panel .tp-note{font-size:var(--type-caption);color:var(--text-dim);margin-top:8px;font-style:italic}
.trade-panel .tp-close{float:right;background:none;border:1px solid var(--border);color:var(--text-secondary);padding:2px 8px;border-radius:var(--radius-xs);cursor:pointer;font-size:var(--type-caption)}
.trade-panel .tp-close:hover{border-color:var(--border-hover);color:var(--text-primary)}

/* Market Narrative */
.narr-wrap{background:var(--bg-surface);border-radius:var(--radius-md);padding:var(--sp-4) var(--sp-5);border:1px solid var(--border);margin-bottom:20px}
.narr-header{display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none}
.narr-title{font-size:var(--type-caption);color:var(--text-secondary);text-transform:uppercase;letter-spacing:1.5px;font-weight:600}
.narr-toggle{font-size:var(--type-caption);color:var(--text-dim);transition:transform .2s}
.narr-header:hover .narr-title{color:var(--text-primary)}
.narr-dominant{font-size:var(--type-heading);font-weight:700;color:var(--text-primary);margin:8px 0 4px}
.narr-meta{font-size:var(--type-caption);color:var(--text-dim);margin-bottom:12px}
.narr-body{overflow:hidden;transition:max-height .3s ease}
.narr-body.collapsed{max-height:0 !important}
.narr-topic{margin-bottom:10px}
.narr-topic-header{display:flex;align-items:center;gap:10px;margin-bottom:3px}
.narr-topic-name{font-size:var(--type-body-sm);font-weight:600;color:var(--text-primary);min-width:180px}
.narr-bar-wrap{flex:1;height:8px;border-radius:4px;background:rgba(255,255,255,0.04);overflow:hidden}
.narr-bar{height:100%;border-radius:4px;transition:width .6s ease}
.narr-topic-pct{font-size:var(--type-body-sm);color:var(--text-secondary);font-family:var(--font-mono);min-width:40px;text-align:right}
.narr-headlines{margin:2px 0 0 190px;font-size:var(--type-caption);color:var(--text-dim);line-height:1.6}
.narr-headlines li{list-style:none;padding-left:10px;position:relative}
.narr-headlines li::before{content:'\2022';position:absolute;left:0;color:var(--text-dim)}
@media(max-width:720px){
  .narr-topic-name{min-width:100px}.narr-headlines{margin-left:0}
  .gauge-hero .gauge-score-big{font-size:var(--type-hero-mobile);letter-spacing:-1px}
  .gauge-hero .gauge-label-text{font-size:var(--type-body)}
  .gauge-components{grid-template-columns:repeat(2,1fr)}
}

/* Light mode overrides */
[data-theme="light"] .dts-header { background: radial-gradient(circle at 10% 80%, rgba(8,145,178,0.06), transparent 40%), radial-gradient(circle at 90% 20%, rgba(37,99,235,0.04), transparent 40%); }
[data-theme="light"] .dts-header::after { background: linear-gradient(90deg, transparent, var(--accent), transparent); }
</style>
</head>
<body>
<button class="theme-toggle" onclick="toggleTheme()" title="Toggle dark/light mode">
  <span id="theme-icon">&#9790;</span> <span id="theme-label">Dark</span>
</button>
<div class="container" id="app">
  <div class="loading" id="loader">Loading dashboard data…</div>
</div>

<script>
const P = {pos:'#10b981',neg:'#ef4444',a1:'#06b6d4',a2:'#f59e0b',a3:'#ef4444',a4:'#3b82f6',a5:'#60a5fa',a6:'#34d399',muted:'#94A3B8',bg:'#0f0f13',grid:'rgba(255,255,255,0.06)'};
const fmt = v => `$${v.toFixed(1)}B`;
const fmtS = v => `${v>=0?'+':''}${v.toFixed(1)}B`;
const pct = v => v===null||v===undefined?'n/a':`${v>=0?'+':''}${v.toFixed(1)}%`;
const shortD = d => {const p=d.split('-');return p[1]+'/'+p[2];};

function clr(v){return v>=0?P.pos:P.neg}

const chartDefaults = {
  responsive:true, maintainAspectRatio:false,
  plugins:{legend:{display:false},tooltip:{
    backgroundColor:'#0f0f13',borderColor:'rgba(255,255,255,0.1)',borderWidth:1,
    titleFont:{family:"'JetBrains Mono',monospace",size:12,weight:'bold'},
    bodyFont:{family:"'JetBrains Mono',monospace",size:12},
    titleColor:'#FAFAFA',bodyColor:'#FAFAFA',
    cornerRadius:8,padding:12,
    callbacks:{label:ctx=>`${ctx.dataset.label}: ${fmt(ctx.parsed.y??ctx.parsed.x)}`}
  }},
  scales:{x:{grid:{display:false},ticks:{font:{family:"'JetBrains Mono',monospace",size:11},color:P.muted},border:{display:false}},
          y:{grid:{color:P.grid},ticks:{font:{family:"'JetBrains Mono',monospace",size:11},color:P.muted,callback:v=>`${v}B`},border:{display:false}}}
};

function mergeOpts(overrides){
  return JSON.parse(JSON.stringify({...chartDefaults,...overrides,plugins:{...chartDefaults.plugins,...(overrides.plugins||{})},scales:{...chartDefaults.scales,...(overrides.scales||{})}}));
}

let charts = {};
function destroyChart(id){if(charts[id]){charts[id].destroy();delete charts[id];}}

function gaugeColor(score){
  if(score>=60) return '#059669';
  if(score>=30) return P.pos;
  if(score>=10) return '#34d399';
  if(score>=-10) return P.muted;
  if(score>=-30) return '#f87171';
  if(score>=-60) return P.neg;
  return '#dc2626';
}

function renderGaugeHero(G){
  const pct = ((G.score + 100) / 200 * 100).toFixed(1);
  const scoreClr = gaugeColor(G.score);
  return `<div class="gauge-hero">
    <div class="gauge-score-big" style="color:${scoreClr}">${G.score>0?'+':''}${G.score}</div>
    <div class="gauge-label-text" style="color:${scoreClr}">${G.label}</div>
    <div class="gauge-bar-wrap">
      <div class="gauge-marker" style="left:${pct}%"></div>
    </div>
    <div class="gauge-labels"><span>Bearish</span><span>Neutral</span><span>Bullish</span></div>
  </div>`;
}

function renderGaugeComponents(G){
  const comps = G.components.map(c => {
    const cClr = c.weighted >= 0 ? P.pos : P.neg;
    const barLeft = c.score >= 0 ? 50 : (50 + c.score / 2);
    const barWidth = Math.abs(c.score) / 2;
    return `<div class="gauge-component" data-view="${c.view}" ${c.scroll?`data-scroll="${c.scroll}"`:''}>
      <div class="gc-name">${c.name === 'Regime Momentum' ? 'Regime Mom.' : c.name}</div>
      <div class="gc-minibar">
        <div class="gc-minibar-bg"></div>
        <div class="gc-minibar-fill" style="left:${barLeft}%;width:${barWidth}%;background:${cClr}"></div>
      </div>
      <div class="gc-score" style="color:${cClr}">${c.weighted>0?'+':''}${c.weighted}</div>
      <div class="gc-detail">${c.detail}</div>
    </div>`;
  }).join('');

  return `<div class="gauge-components-row">
    <div class="gauge-comp-title mono">Score Breakdown</div>
    <div class="gauge-components">${comps}</div>
    <div class="gauge-disclaimer">Reflects fiscal flow conditions and speculative positioning, not investment advice. Based on DTS operational data + CFTC/FINRA signals.</div>
  </div>`;
}

// Position Recommendation hero card. Renders the variable Tier-1 overlay
// recommendation, broken out into baseline / overlay / total exposure +
// confluence checklist. Source: variable_overlay_backtest.py rule.
function renderPositionRecommendation(pr){
  if(!pr) return '';
  const isOpen = pr.tier1_open === true;
  const exposureColor = pr.total_exposure_pct > 100 ? '#10b981' : '#94A3B8';
  const stateLabel = isOpen ? 'TIER-1 ACTIVE' : 'BASELINE ONLY';
  const stateBadgeColor = isOpen ? '#10b981' : '#94A3B8';
  const stateBg = isOpen ? 'rgba(16,185,129,0.08)' : 'rgba(148,163,184,0.06)';

  // Headline numbers reflect ACTUAL CURRENT exposure, not hypothetical.
  // Confluence breakdown reflects ACTUAL CURRENT state of each signal.
  // The hypothetical "if Tier-1 fired today" goes in a separate footer block.
  let breakdown, confluenceCount, overlayPct, totalExposure, contextNote;
  let hypoNote = '';

  if(isOpen){
    // Active trade: numbers and breakdown reflect locked-in state at entry
    breakdown = pr.confluence_breakdown || {};
    confluenceCount = pr.confluence_count;
    overlayPct = pr.overlay_leverage_pct;
    totalExposure = pr.total_exposure_pct;
    contextNote = `Trade #${pr.open_trade_id} OPEN. Entered ${pr.entry_date} at $${pr.entry_price}, target $${pr.target_price}.`;
  } else {
    // No active trade: actual current state is 100% baseline, 0% overlay
    const hypo = pr.if_tier1_fired_today || {};
    const hypoBreakdown = hypo.confluence_breakdown || {};
    overlayPct = 0;
    totalExposure = 100;
    // Current confluence: count macro signals only (Tier-1 itself is not firing)
    confluenceCount = (hypoBreakdown.curve_inverted ? 1 : 0)
                    + (hypoBreakdown.credit_stressed ? 1 : 0)
                    + (hypoBreakdown.skew_elevated ? 1 : 0);
    breakdown = {
      tier1: false,  // Not firing right now
      curve_inverted: hypoBreakdown.curve_inverted === true,
      credit_stressed: hypoBreakdown.credit_stressed === true,
      skew_elevated: hypoBreakdown.skew_elevated === true,
      _curve_value: hypo.current_curve_t10y2y,
      _credit_z: hypo.current_credit_z,
      _skew_z: hypo.current_skew_z,
    };
    contextNote = `Tier-1 setup not currently firing. Hold baseline 100% buy-and-hold.`;
    hypoNote = `If Tier-1 were to fire today, current macro state (${hypo.confluence_count}/4 with Tier-1) would size the overlay at <strong>${hypo.overlay_leverage_pct}%</strong> for total exposure of <strong>${hypo.total_exposure_pct}% long</strong>.`;
  }

  const checks = [
    {key:'tier1', label:'Tier-1 firing (count=0 + VIX&ge;32)', currentNote:''},
    {key:'curve_inverted', label:'Curve inverted (T10Y2Y &lt; -0.25)',
      currentNote: breakdown._curve_value !== undefined && breakdown._curve_value !== null
                    ? `Current: ${breakdown._curve_value > 0 ? '+' : ''}${breakdown._curve_value.toFixed(2)}` : ''},
    {key:'credit_stressed', label:'Credit stressed (HYG/LQD z &le; -1)',
      currentNote: breakdown._credit_z !== undefined && breakdown._credit_z !== null
                    ? `Current z: ${breakdown._credit_z > 0 ? '+' : ''}${breakdown._credit_z.toFixed(2)}` : ''},
    {key:'skew_elevated', label:'SKEW elevated (z &ge; 0.5)',
      currentNote: breakdown._skew_z !== undefined && breakdown._skew_z !== null
                    ? `Current z: ${breakdown._skew_z > 0 ? '+' : ''}${breakdown._skew_z.toFixed(2)}` : ''},
  ];

  const checkRows = checks.map(c => {
    const fired = breakdown[c.key] === true;
    const dot = fired ? '#10b981' : '#475569';
    const txt = fired ? 'var(--text-primary)' : 'var(--text-secondary)';
    const mark = fired ? '&check;' : '&times;';
    return `<div style="display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--border-subtle)">
      <span style="display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:3px;background:${dot};color:white;font-size:11px;font-weight:700;flex-shrink:0">${mark}</span>
      <span style="flex:1;font-size:13px;color:${txt}">${c.label}</span>
      ${c.currentNote ? `<span class="mono" style="font-size:12px;color:var(--text-secondary)">${c.currentNote}</span>` : ''}
    </div>`;
  }).join('');

  const hv = pr.historical_validation || {};
  const validationNote = hv.var_rule_final_equity
    ? `Backtest 2009-2026 (n=${hv.trades_n}): $10k -> $${hv.var_rule_final_equity.toLocaleString()} via this rule, vs $${hv.buyhold_final_equity.toLocaleString()} pure buy-and-hold. Worst single-trade loss ${hv.max_single_trade_loss_pp}pp.`
    : '';

  return `<div style="background:var(--bg-surface);border:1px solid var(--accent-border);border-radius:var(--radius-md);padding:var(--sp-6);margin:var(--sp-6) 0;position:relative;overflow:hidden">
    <div style="position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,${exposureColor},transparent)"></div>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:var(--sp-4);flex-wrap:wrap">
      <div class="card-label mono" style="font-size:11px;letter-spacing:2px;color:var(--accent)">Position Recommendation</div>
      <span class="badge mono" style="background:${stateBg};color:${stateBadgeColor};padding:2px 10px;border-radius:3px;font-size:10px;letter-spacing:1px">${stateLabel}</span>
    </div>
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:var(--sp-4);margin-bottom:var(--sp-5)">
      <div>
        <div class="card-label mono" style="font-size:10px">Baseline</div>
        <div class="card-value mono" style="font-size:24px">${pr.baseline_pct}%</div>
      </div>
      <div>
        <div class="card-label mono" style="font-size:10px">Overlay</div>
        <div class="card-value mono" style="font-size:24px;color:${overlayPct > 0 ? '#10b981' : 'var(--text-secondary)'}">${overlayPct||0}%</div>
      </div>
      <div>
        <div class="card-label mono" style="font-size:10px">Total Long</div>
        <div class="card-value mono" style="font-size:28px;font-weight:800;color:${exposureColor}">${totalExposure}%</div>
      </div>
      <div>
        <div class="card-label mono" style="font-size:10px">Confluence</div>
        <div class="card-value mono" style="font-size:24px">${confluenceCount}/4</div>
      </div>
    </div>
    <div style="font-size:13px;color:var(--text-secondary);line-height:1.6;margin-bottom:var(--sp-4)">${contextNote}</div>
    <div style="background:var(--bg-deep);border-radius:var(--radius-sm);padding:var(--sp-4);margin-bottom:var(--sp-3)">
      <div class="card-label mono" style="font-size:10px;letter-spacing:1.5px;margin-bottom:8px">Current Signal State</div>
      ${checkRows}
    </div>
    ${hypoNote ? `<div style="background:rgba(6,182,212,0.04);border:1px solid rgba(6,182,212,0.15);border-radius:var(--radius-sm);padding:var(--sp-3) var(--sp-4);margin-bottom:var(--sp-3);font-size:12px;color:var(--text-secondary);line-height:1.6">
      <span class="mono" style="font-size:10px;letter-spacing:1px;color:var(--accent);text-transform:uppercase;display:block;margin-bottom:4px">If Tier-1 Fires Next</span>
      ${hypoNote}
    </div>` : ''}
    ${validationNote ? `<div style="font-size:11px;color:var(--text-dim);font-family:var(--font-mono);line-height:1.5">${validationNote}</div>` : ''}
  </div>`;
}

// Timing trade log panel: track record summary + open positions + recent
// closed trades. Source data: data/timing_trades.jsonl, exported via the
// timing_trades block in viz_data.json.
function renderTimingSystem(tt){
  if(!tt || !tt.track_record) {
    return '<div style="color:var(--text-secondary);padding:var(--sp-5)">No timing trade data available.</div>';
  }
  const tr = tt.track_record;
  const opens = tt.open || [];
  const pendings = tt.pending || [];
  const closed = tt.closed_recent || [];
  const rules = tt.rules || {};
  const hitColor = tr.hit_rate_pct >= 80 ? '#10b981' : tr.hit_rate_pct >= 60 ? '#fbbf24' : '#ef4444';

  // Track record summary (4 cards)
  const summary = `
  <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:var(--sp-4);margin-bottom:var(--sp-6)">
    <div style="background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:var(--sp-4);text-align:center">
      <div class="card-label mono" style="font-size:10px">Hit Rate</div>
      <div class="card-value mono" style="font-size:32px;font-weight:800;color:${hitColor}">${tr.hit_rate_pct.toFixed(1)}%</div>
      <div style="font-size:11px;color:var(--text-secondary)">${tr.n_winners} of ${tr.n_closed} winners</div>
    </div>
    <div style="background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:var(--sp-4);text-align:center">
      <div class="card-label mono" style="font-size:10px">Mean Return</div>
      <div class="card-value mono" style="font-size:32px;font-weight:800;color:#10b981">+${tr.mean_return_pct.toFixed(2)}%</div>
      <div style="font-size:11px;color:var(--text-secondary)">per closed trade</div>
    </div>
    <div style="background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:var(--sp-4);text-align:center">
      <div class="card-label mono" style="font-size:10px">Avg Hold</div>
      <div class="card-value mono" style="font-size:32px;font-weight:800">${tr.avg_days_held.toFixed(0)}</div>
      <div style="font-size:11px;color:var(--text-secondary)">trading days</div>
    </div>
    <div style="background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:var(--sp-4);text-align:center">
      <div class="card-label mono" style="font-size:10px">Best / Worst</div>
      <div class="mono" style="font-size:18px;font-weight:700;color:#10b981">+${tr.best_return_pct.toFixed(2)}%</div>
      <div class="mono" style="font-size:14px;color:${tr.worst_return_pct < 0 ? '#ef4444' : '#10b981'}">${tr.worst_return_pct > 0 ? '+' : ''}${tr.worst_return_pct.toFixed(2)}%</div>
    </div>
  </div>`;

  // Open positions table
  let openSection = '';
  if(opens.length > 0){
    const rows = opens.map(t => `
      <tr>
        <td>${t.trigger_date}</td>
        <td>${t.entry_date_actual||'n/a'}</td>
        <td class="mono">${t.entry_price ? '$'+t.entry_price.toFixed(2) : 'n/a'}</td>
        <td class="mono">${t.target_price ? '$'+t.target_price.toFixed(2) : 'n/a'}</td>
        <td>${t.max_hold_date||'n/a'}</td>
      </tr>`).join('');
    openSection = `
    <div style="background:var(--bg-surface);border:1px solid #10b981;border-radius:var(--radius-md);padding:var(--sp-5);margin-bottom:var(--sp-6)">
      <div class="card-label mono" style="margin-bottom:var(--sp-3);color:#10b981">Open Position${opens.length>1?'s':''} (${opens.length})</div>
      <table class="tr-table" style="width:100%">
        <thead><tr><th>Trigger</th><th>Entry Date</th><th>Entry $</th><th>Target $</th><th>Max-Hold</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  } else if (pendings.length > 0){
    const rows = pendings.map(t => `
      <tr>
        <td>${t.trigger_date}</td>
        <td>${t.entry_date_planned||'n/a'}</td>
        <td>Awaiting T+10 entry</td>
      </tr>`).join('');
    openSection = `
    <div style="background:var(--bg-surface);border:1px solid var(--accent-border);border-radius:var(--radius-md);padding:var(--sp-5);margin-bottom:var(--sp-6)">
      <div class="card-label mono" style="margin-bottom:var(--sp-3);color:var(--accent)">Pending Trade${pendings.length>1?'s':''} (${pendings.length})</div>
      <table class="tr-table" style="width:100%">
        <thead><tr><th>Trigger</th><th>Planned Entry</th><th>Status</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
  } else {
    openSection = `
    <div style="background:rgba(148,163,184,0.06);border:1px solid var(--border);border-radius:var(--radius-md);padding:var(--sp-4);margin-bottom:var(--sp-6);text-align:center;color:var(--text-secondary);font-size:13px">
      No open positions. Next trade fires when count=0 + VIX&ge;32 cluster appears.
    </div>`;
  }

  // Recent closed trades table
  const closedRows = closed.slice().reverse().map(t => {
    const ret = t.return_pct;
    const retColor = ret > 5 ? '#10b981' : ret > 0 ? '#34d399' : '#ef4444';
    const reasonBadge = t.exit_reason === 'target' ? 'badge-sup' : 'badge-neu';
    return `<tr>
      <td>${t.trigger_date}</td>
      <td>${t.entry_date_actual||'n/a'}</td>
      <td class="mono">${t.entry_price ? '$'+t.entry_price.toFixed(2) : 'n/a'}</td>
      <td>${t.exit_date||'n/a'}</td>
      <td class="mono">${t.exit_price ? '$'+t.exit_price.toFixed(2) : 'n/a'}</td>
      <td>${t.days_held||'n/a'}</td>
      <td><span class="badge ${reasonBadge}">${t.exit_reason||'n/a'}</span></td>
      <td class="mono" style="color:${retColor};font-weight:700">${ret > 0 ? '+' : ''}${ret.toFixed(2)}%</td>
    </tr>`;
  }).join('');

  const closedSection = closed.length > 0 ? `
  <div style="background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:var(--sp-5);margin-bottom:var(--sp-6)">
    <div class="card-label mono" style="margin-bottom:var(--sp-3)">Most Recent Closed Trades</div>
    <div style="overflow-x:auto">
      <table class="tr-table" style="width:100%;min-width:680px">
        <thead><tr><th>Trigger</th><th>Entry</th><th>Entry $</th><th>Exit</th><th>Exit $</th><th>Days</th><th>Reason</th><th>Return</th></tr></thead>
        <tbody>${closedRows}</tbody>
      </table>
    </div>
  </div>` : '';

  // Rules block
  const rulesBlock = `
  <div style="background:var(--bg-deep);border:1px solid var(--border-subtle);border-radius:var(--radius-md);padding:var(--sp-4);font-size:13px;line-height:1.7;color:var(--text-secondary)">
    <div class="card-label mono" style="margin-bottom:var(--sp-2);color:var(--accent)">Trade Rules</div>
    <div><strong style="color:var(--text-primary)">Trigger:</strong> ${rules.trigger||'count=0 AND VIX&ge;32'}</div>
    <div><strong style="color:var(--text-primary)">Entry:</strong> ${rules.entry||'T+10 trading days'}</div>
    <div><strong style="color:var(--text-primary)">Take-profit:</strong> +${rules.take_profit_pct||10}%</div>
    <div><strong style="color:var(--text-primary)">Max-hold:</strong> ${rules.max_hold_trading_days||120} trading days</div>
    ${rules.source ? `<div style="margin-top:6px;font-family:var(--font-mono);font-size:11px;color:var(--text-dim)">Source: ${rules.source}</div>` : ''}
  </div>`;

  return summary + openSection + closedSection + rulesBlock;
}

// Bias History panel: renders position_ledger.jsonl as a timeline ribbon
// (one cell per ledger entry) plus a table of recent rows with bias-change
// events highlighted. Source: data/position_ledger.jsonl, copied to dashboard
// dir nightly by run_daily_dts.sh.
function renderBiasHistory(entries){
  const target = document.getElementById('bias-history-content');
  if(!target) return;
  if(!entries || entries.length === 0){
    target.innerHTML = `
    <div style="background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:var(--sp-6);text-align:center;color:var(--text-secondary)">
      No ledger entries yet. The position ledger populates as the pipeline runs.
    </div>`;
    return;
  }

  // Sort chronologically (oldest first)
  entries.sort((a, b) => (a.computed_at || '').localeCompare(b.computed_at || ''));

  const biasColor = b => {
    switch(b){
      case 'LEVERAGED LONG': return '#10b981';
      case 'LONG':           return '#34d399';
      case 'NEUTRAL':        return '#94A3B8';
      case 'CAUTIOUS':       return '#fbbf24';
      case 'REDUCED':        return '#f97316';
      case 'SHORT':          return '#ef4444';
      default:               return '#475569';
    }
  };

  // Identify bias change events (where bias differs from prior row)
  const events = [];
  for(let i = 1; i < entries.length; i++){
    if(entries[i].bias !== entries[i-1].bias){
      events.push({
        from: entries[i-1].bias,
        to:   entries[i].bias,
        as_of: entries[i].as_of,
        computed_at: entries[i].computed_at,
        index: i,
      });
    }
  }

  // Timeline ribbon — one cell per entry, color by bias
  const ribbonCells = entries.map((e, i) => {
    const isChange = events.some(ev => ev.index === i);
    const border = isChange ? '2px solid white' : '1px solid rgba(255,255,255,0.05)';
    return `<div title="${e.as_of} • ${e.bias} (${e.conviction})"
      style="flex:1;min-width:8px;height:32px;background:${biasColor(e.bias)};border:${border};box-sizing:border-box"></div>`;
  }).join('');

  // Track-record summary
  const totalEntries = entries.length;
  const biasCounts = {};
  entries.forEach(e => { biasCounts[e.bias] = (biasCounts[e.bias] || 0) + 1; });
  const dominantBias = Object.entries(biasCounts).sort((a,b)=>b[1]-a[1])[0];
  const changeFreq = events.length / Math.max(1, totalEntries) * 100;

  // Recent table (last 30 entries, newest first)
  const recent = entries.slice(-30).reverse();
  const tableRows = recent.map((e, idx) => {
    // Did this row mark a change vs the row before it (in the chronological order)?
    const origIdx = entries.length - 1 - idx;  // index in chronological array
    const isChange = origIdx > 0 && entries[origIdx].bias !== entries[origIdx-1].bias;
    const rowBg = isChange ? 'rgba(6,182,212,0.08)' : 'transparent';
    const dateOnly = (e.as_of || '').split('T')[0];
    const computedShort = (e.computed_at || '').slice(11, 16);
    return `<tr style="background:${rowBg}">
      <td>${dateOnly}</td>
      <td class="mono" style="font-size:11px;color:var(--text-dim)">${computedShort}</td>
      <td><span class="mono" style="display:inline-block;padding:2px 8px;border-radius:3px;background:${biasColor(e.bias)};color:white;font-size:11px;font-weight:700">${e.bias}</span></td>
      <td class="mono">${e.conviction || 'n/a'}</td>
      <td>${e.fiscal_regime || 'n/a'}</td>
      <td>${e.tech_regime || 'n/a'}</td>
      <td>${e.rs_conviction || 'n/a'}</td>

    <div style="background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:var(--sp-4);text-align:center">

      <div class="mono" style="display:inline-block;font-size:18px;font-weight:700;padding:4px 12px;border-radius:4px;background:${biasColor(dominantBias[0])};color:white;margin-top:6px">${dominantBias[0]}</div>
      <div style="font-size:11px;color:var(--text-secondary);margin-top:4px">${dominantBias[1]} of ${totalEntries} runs</div>

      <div style="font-size:11px;color:var(--text-secondary);margin-top:4px">${entries[entries.length-1].as_of}</div>

  <div style="background:var(--bg-surface);border:1px solid var(--border);border-radius:var(--radius-md);padding:var(--sp-5);margin-bottom:var(--sp-5)">

    <div style="display:flex;width:100%;border-radius:4px;overflow:hidden">${ribbonCells}</div>

        `<span style="display:inline-flex;align-items:center;gap:5px"><span style="display:inline-block;width:10px;height:10px;background:${biasColor(b)};border-radius:2px"></span>${b}</span>`

// Today's Positioning: synthesises tech regime + RS conviction + Tier-1 status
// + macro confluence into a single daily action card. Renders into the
// #todays-trade-card placeholder once all data files (viz_data, technicals,
// rs_ratios) have loaded.
function renderTodaysTrade(){
  const D = window._vizData;
  const tech = window._techData;
  const rs = window._rsData;
  const target = document.getElementById('todays-trade-card');
  if(!target || !D) return;

  // Pull individual signals
  const pr = D.position_recommendation || {};
  const tier1Open = pr.tier1_open === true;
  const techRegime = (tech && tech.data && tech.data.length)
    ? tech.data[tech.data.length - 1].regime : null;  // 'bullish' / 'bearish'
  const techClose = (tech && tech.data && tech.data.length)
    ? tech.data[tech.data.length - 1].close : null;
  const techSma = (tech && tech.data && tech.data.length)
    ? tech.data[tech.data.length - 1].sma : null;

  const rsConvictionStr = rs && rs.summary ? rs.summary.conviction : '';
  const rsConvLevel = rsConvictionStr.toLowerCase().startsWith('high') ? 'high'
                    : rsConvictionStr.toLowerCase().startsWith('med')  ? 'medium'
                    : rsConvictionStr.toLowerCase().startsWith('low')  ? 'low'
                    : 'unknown';
  const rsTopOver = (rs && rs.summary && rs.summary.top_overweight) || [];
  const rsTopUnder = (rs && rs.summary && rs.summary.top_underweight) || [];
  const rsAlignedPairs = rs && rs.pairs
    ? rs.pairs.filter(p => p.regime_alignment === 'Aligned').length : 0;
  const rsTotalPairs = rs && rs.pairs ? rs.pairs.length : 0;

  const fiscalRegime = D.cards ? D.cards.regime : null;

  // Build signal-firing inventory
  const signals = [
    {label: `Fiscal regime: ${fiscalRegime || 'n/a'}`,
     fired: fiscalRegime === 'Supportive',
     neutral: fiscalRegime === 'Neutral',
     hint: fiscalRegime === 'Restrictive' ? 'macro headwind, but not a trade signal alone' : ''},
    {label: `Tech regime: ${techRegime ? techRegime.toUpperCase() : 'n/a'}`
            + (techClose && techSma ? ` (SPX ${techClose.toFixed(0)} vs SMA20 ${techSma.toFixed(0)})` : ''),
     fired: techRegime === 'bullish',
     hint: techRegime === 'bullish' ? 'trend confirms long bias' : 'trend caution; reduce conviction'},
    {label: `RS conviction: ${rsConvictionStr || 'n/a'}`,
     fired: rsConvLevel === 'high',
     neutral: rsConvLevel === 'medium',
     hint: rsAlignedPairs > 0 ? `${rsAlignedPairs}/${rsTotalPairs} pairs aligned with regime` : ''},
    {label: `Tier-1 panic-buy setup`,
     fired: tier1Open,
     hint: tier1Open ? 'discrete trade open: hold to TP or max-hold' : 'dormant; no leverage today'},
    {label: `Macro confluence (curve / credit / SKEW)`,
     fired: !tier1Open && pr.if_tier1_fired_today
            && pr.if_tier1_fired_today.confluence_count >= 3,
     neutral: !tier1Open && pr.if_tier1_fired_today
            && pr.if_tier1_fired_today.confluence_count === 2,
     hint: !tier1Open && pr.if_tier1_fired_today
            ? `${pr.if_tier1_fired_today.confluence_count - 1}/3 macro signals confirming`
            : ''},
  ];

  // Decide bias + conviction
  let bias = 'NEUTRAL', biasColor = '#94A3B8', conviction = 'low';
  if(tier1Open){
    bias = 'LEVERAGED LONG'; biasColor = '#10b981'; conviction = 'high';
  } else if(techRegime === 'bullish' && rsConvLevel === 'high'){
    bias = 'LONG'; biasColor = '#10b981'; conviction = 'medium';
  } else if(techRegime === 'bullish' && (rsConvLevel === 'medium' || rsConvLevel === 'low')){
    bias = 'LONG'; biasColor = '#34d399'; conviction = 'low-medium';
  } else if(techRegime === 'bearish' && rsConvLevel === 'high'){
    bias = 'CAUTIOUS'; biasColor = '#fbbf24'; conviction = 'medium';
  } else if(techRegime === 'bearish'){
    bias = 'REDUCED'; biasColor = '#f97316'; conviction = 'low';
  }

  // Build action recommendation
  let action;
  if(tier1Open){
    action = `Hold open Tier-1 trade #${pr.open_trade_id}. Total exposure ${pr.total_exposure_pct}% long (${pr.baseline_pct}% baseline + ${pr.overlay_leverage_pct}% overlay).`;
  } else if(bias === 'LONG'){
    action = `Hold 100% SPY baseline. No leveraged overlay (Tier-1 dormant). Apply RS pair tilts within the long position.`;
  } else if(bias === 'CAUTIOUS'){
    action = `Reduce baseline to 60-80% SPY. RS pair tilts may still work but at smaller size. Do not add leverage.`;
  } else if(bias === 'REDUCED'){
    action = `Reduce to 30-50% SPY baseline. Hold cash buffer for next Tier-1 setup.`;
  } else {
    action = `No high-conviction signal. Default 100% buy-and-hold.`;
  }

  // Pair recommendations from RS
  let pairBlock = '';
  if(rs && rs.pairs && rs.pairs.length){
    const overweightPairs = rs.pairs.filter(p =>
      p.signal === 'Overweight numerator' && p.regime_alignment === 'Aligned'
    ).slice(0, 4);
    const underweightPairs = rs.pairs.filter(p =>
      p.signal === 'Underweight numerator' && p.regime_alignment === 'Aligned'
    ).slice(0, 3);

    const owRows = overweightPairs.map(p => `
      <div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border-subtle);font-size:13px">
        <span style="font-family:var(--font-mono);color:#10b981;font-weight:600">${p.name}</span>
        <span style="color:var(--text-secondary);font-size:11px">${p.rationale ? p.rationale.split('—')[0].trim() : ''}</span>
        <span style="font-family:var(--font-mono);color:${p.roc_20d > 0 ? '#10b981' : '#ef4444'};font-size:12px">${p.roc_20d > 0 ? '+' : ''}${p.roc_20d.toFixed(1)}%</span>
      </div>`).join('');

    const uwRows = underweightPairs.map(p => `
      <div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border-subtle);font-size:13px">
        <span style="font-family:var(--font-mono);color:#ef4444;font-weight:600">${p.name}</span>
        <span style="color:var(--text-secondary);font-size:11px">${p.rationale ? p.rationale.split('—')[0].trim() : ''}</span>
        <span style="font-family:var(--font-mono);color:${p.roc_20d > 0 ? '#10b981' : '#ef4444'};font-size:12px">${p.roc_20d > 0 ? '+' : ''}${p.roc_20d.toFixed(1)}%</span>
      </div>`).join('');

    pairBlock = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-4);margin-top:var(--sp-4)">
      <div style="background:rgba(16,185,129,0.04);border:1px solid rgba(16,185,129,0.2);border-radius:var(--radius-sm);padding:var(--sp-3)">
        <div class="card-label mono" style="font-size:10px;color:#10b981;margin-bottom:6px">Overweight (RS leaders)</div>
        ${owRows || '<div style="color:var(--text-dim);font-size:12px">none aligned</div>'}
      </div>
      <div style="background:rgba(239,68,68,0.04);border:1px solid rgba(239,68,68,0.2);border-radius:var(--radius-sm);padding:var(--sp-3)">
        <div class="card-label mono" style="font-size:10px;color:#ef4444;margin-bottom:6px">Underweight / avoid</div>
        ${uwRows || '<div style="color:var(--text-dim);font-size:12px">none aligned</div>'}
      </div>
    </div>`;
  }

  // Triggers to watch
  const watchUp = tier1Open
    ? 'Trade target hit (close at +10%) or max-hold reached'
    : 'Tier-1 fires (count=0 + VIX&ge;32) → scale to 125-200% via overlay';
  const watchDown = bias === 'LONG'
    ? 'Tech regime flips to bearish OR RS conviction drops below medium → reduce baseline'
    : 'Continued weakness in trend + RS → further reduce or move to cash';

  // Render signal flags
  const flagRows = signals.map(s => {
    const dot = s.fired ? '#10b981' : s.neutral ? '#fbbf24' : '#475569';
    const mark = s.fired ? '&check;' : s.neutral ? '~' : '&times;';
    const txt = s.fired ? 'var(--text-primary)' : 'var(--text-secondary)';
    return `<div style="display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--border-subtle)">
      <span style="display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:3px;background:${dot};color:white;font-size:11px;font-weight:700;flex-shrink:0">${mark}</span>
      <span style="flex:1;font-size:13px;color:${txt}">${s.label}</span>
      ${s.hint ? `<span style="font-size:11px;color:var(--text-dim);font-style:italic">${s.hint}</span>` : ''}
    </div>`;
  }).join('');

  target.innerHTML = `
  <div style="background:linear-gradient(180deg,var(--bg-surface),var(--bg-deep));border:2px solid ${biasColor};border-radius:var(--radius-md);padding:var(--sp-6);margin:var(--sp-5) 0;position:relative;overflow:hidden">
    <div style="position:absolute;top:0;left:0;right:0;height:4px;background:${biasColor}"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:var(--sp-3);margin-bottom:var(--sp-4)">
      <div>
        <div class="card-label mono" style="font-size:11px;letter-spacing:2px;color:var(--accent)">Today's Positioning</div>
        <div style="font-size:36px;font-weight:800;color:${biasColor};font-family:var(--font-mono);line-height:1.1;margin-top:4px">${bias}</div>
      </div>
      <div style="text-align:right">
        <div class="card-label mono" style="font-size:10px">Conviction</div>
        <div style="font-size:24px;font-weight:700;font-family:var(--font-mono);color:var(--text-primary);text-transform:uppercase">${conviction}</div>
      </div>
    </div>
    <div style="background:rgba(6,182,212,0.06);border-left:3px solid var(--accent);border-radius:var(--radius-sm);padding:var(--sp-4);margin-bottom:var(--sp-4);font-size:14px;line-height:1.6;color:var(--text-primary)">
      <strong>Action:</strong> ${action}
    </div>
    <div style="background:var(--bg-deep);border-radius:var(--radius-sm);padding:var(--sp-4);margin-bottom:var(--sp-3)">
      <div class="card-label mono" style="font-size:10px;letter-spacing:1.5px;margin-bottom:8px">Signals</div>
      ${flagRows}
    </div>
    ${pairBlock}
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:var(--sp-3);margin-top:var(--sp-4);font-size:12px">
      <div style="background:rgba(16,185,129,0.04);border:1px solid rgba(16,185,129,0.15);border-radius:var(--radius-sm);padding:var(--sp-3)">
        <div class="card-label mono" style="font-size:10px;color:#10b981;margin-bottom:4px">Watch for upgrade</div>
        <div style="color:var(--text-secondary);line-height:1.5">${watchUp}</div>
      </div>
      <div style="background:rgba(239,68,68,0.04);border:1px solid rgba(239,68,68,0.15);border-radius:var(--radius-sm);padding:var(--sp-3)">
        <div class="card-label mono" style="font-size:10px;color:#ef4444;margin-bottom:4px">Watch for downgrade</div>
        <div style="color:var(--text-secondary);line-height:1.5">${watchDown}</div>
      </div>
    </div>
  </div>`;
}

    ${(()=>{

      const is5dAbove20d = c.avg_5d_cfi > c.avg_20d_cfi;
      const isMtdPositive = c.mtd_cfi > 0;
      const isYoYImproving = c.fytd_yoy_pct > -5; // within 5% of parity = inflecting
      const gap5v20 = (c.avg_5d_cfi - c.avg_20d_cfi).toFixed(2);
      const gapSign = gap5v20 >= 0 ? '+' : '';

      let conditions = [];
      if(c.regime === 'Restrictive'){
        conditions = [
          {label:'5d avg > 20d avg', met: is5dAbove20d,
           detail:`${fmt(c.avg_5d_cfi)}/d vs ${fmt(c.avg_20d_cfi)}/d  (gap: ${gapSign}${gap5v20}B/d)`},

          {label:'FYTD YoY within 5%', met: isYoYImproving,
           detail:`FYTD YoY: ${pct(c.fytd_yoy_pct)}`},
        ];
      } else if(c.regime === 'Supportive'){
        conditions = [
          {label:'5d avg < 20d avg', met: !is5dAbove20d,
           detail:`${fmt(c.avg_5d_cfi)}/d vs ${fmt(c.avg_20d_cfi)}/d  (gap: ${gapSign}${gap5v20}B/d)`},
          {label:'MTD injection < 0', met: !isMtdPositive,

          {label:'FYTD YoY deteriorating (<-5%)', met: c.fytd_yoy_pct < -5,
           detail:`FYTD YoY: ${pct(c.fytd_yoy_pct)}`},
        ];
      } else {
        conditions = [
          {label:'5d vs 20d avg', met: null,
           detail:`${fmt(c.avg_5d_cfi)}/d vs ${fmt(c.avg_20d_cfi)}/d  (gap: ${gapSign}${gap5v20}B/d)`},
          {label:'MTD injection', met: null,
           detail:`MTD: ${fmt(c.mtd_cfi)}B  (${isMtdPositive?'positive':'negative'})`},
          {label:'FYTD YoY', met: null,
           detail:`FYTD YoY: ${pct(c.fytd_yoy_pct)}`},
        ];
      }

      const metCount = conditions.filter(x=>x.met===true).length;
      const totalFlip = conditions.filter(x=>x.met!==null).length;
      const allMet = metCount === totalFlip && totalFlip > 0;
      const flipLabel = c.regime==='Restrictive'?'Restrictive \u2192 Neutral':c.regime==='Supportive'?'Supportive \u2192 Neutral':'Neutral \u2192 ?';

      const rows = conditions.map(cond=>{
        const icon = cond.met===null ? '<span style="color:#94A3B8">&#9679;</span>'
                   : cond.met ? '<span style="color:#10b981">&#10003;</span>'
                               : '<span style="color:#ef4444">&#10007;</span>';
        const labelClr = cond.met===null ? '#94A3B8' : cond.met ? '#10b981' : '#ef4444';
        return `<tr>
          <td style="padding:8px 12px;width:28px;text-align:center;font-size:15px">${icon}</td>
          <td style="padding:8px 12px;color:${labelClr};font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:600">${cond.label}</td>
          <td style="padding:8px 12px;color:#94A3B8;font-family:'JetBrains Mono',monospace;font-size:12px">${cond.detail}</td>
        </tr>`;
      }).join('');

      const summaryClr = allMet ? '#f59e0b' : '#94A3B8';
      const summaryText = allMet
        ? `<strong style="color:#f59e0b">&#9888; All flip conditions met</strong> &mdash; regime change signal active`
        : `${metCount} of ${totalFlip} flip conditions met &mdash; regime intact`;

      return `<div style="background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:8px;overflow:hidden;margin-bottom:16px">
        <div style="padding:10px 14px;border-bottom:1px solid rgba(255,255,255,0.07);font-size:11px;color:#94A3B8;font-family:'JetBrains Mono',monospace;letter-spacing:0.05em">
          CONDITIONS TO FLIP: ${flipLabel}
        </div>
        <table style="width:100%;border-collapse:collapse">${rows}</table>
        <div style="padding:10px 14px;border-top:1px solid rgba(255,255,255,0.07);font-size:12px;color:${summaryClr};font-family:'JetBrains Mono',monospace">
          ${summaryText}
        </div>
      </div>`;
    })()}

    <div class="cat mono" style="margin:20px 0 12px">How This Read Gets Invalidated</div>
    <div class="insight">
      ${c.regime==='Supportive'?
        'This call is invalidated if the 5d average drops below the 20d average for two consecutive sessions AND MTD net injection turns negative.':
        c.regime==='Restrictive'?
        'This call is invalidated if the 5d average rises above the 20d average for two consecutive sessions AND MTD injection improves to positive.':
        'This call shifts to Supportive if: 5d > 20d AND MTD > 0 AND YoY improving. Shifts to Restrictive if: MTD turns negative OR 5d falls below 20d by a widening margin.'}
      <br/><br/>If the FYTD YoY comparison on core fiscal injection changes sign, the entire fiscal stance read should be reassessed.
    </div>
  </div>

  <!-- SIGNAL LOG -->
  <div class="panel" id="panel-signals">
    <div class="panel-title">Signal Log — Track Record Builder</div>
    <div class="panel-sub">Every row is a timestamped snapshot of what the pipeline said that day. This is the evidence layer for the subscription product.</div>

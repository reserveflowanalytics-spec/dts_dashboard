// Wrap a ticker string with a tooltip span
function tickerTip(t){var d=ETF_DESC[t];return d?'<span title="'+t+' — '+d+'" style="cursor:help;border-bottom:1px dotted rgba(255,255,255,0.3)">'+t+'</span>':t;}
// Wrap a "NUM/DEN" pair name with tooltips on each ticker
function pairTip(name){var parts=name.split('/');return parts.map(tickerTip).join('/');}

function renderRelStrength(data){
  const el = document.getElementById('rs-content');
  if(!el) return;
  // Load live ETF prices from rs_ratios.json
  if(data && data.etf_prices) ETF_PRICES_USD = data.etf_prices;
  if(!data || !data.pairs || data.pairs.length === 0){
    el.innerHTML = '<div class="insight"><strong>No RS ratio data available.</strong> Run <code>python3 generate_rs_ratios.py</code> to generate rs_ratios.json.</div>';
    return;
  }

  const regimeClr = data.regime==='Supportive'?P.pos:data.regime==='Restrictive'?P.neg:P.a1;
  const momDir = data.fiscal_momentum >= 0 ? 'Positive' : 'Negative';
  const momClr = data.fiscal_momentum >= 0 ? P.pos : P.neg;
  const aligned = data.pairs.filter(p=>p.regime_alignment==='Aligned').length;
  const total = data.pairs.length;
  const s = data.summary || {};

  // Section A — Summary Cards
  let h = `<div class="rs-summary">
    <div class="card">
      <div class="card-label mono">Regime</div>
      <div class="card-value" style="color:${regimeClr}">${data.regime}</div>
      <div class="card-change mono" style="color:${regimeClr}">${data.tga_trend||''} TGA</div>
    </div>
    <div class="card">
      <div class="card-label mono">Fiscal Momentum</div>
      <div class="card-value mono" style="color:${momClr}">${data.fiscal_momentum>0?'+':''}${Number(data.fiscal_momentum).toLocaleString()}</div>
      <div class="card-change mono" style="color:${momClr}">5d CFI minus 20d CFI</div>
    </div>
    <div class="card">
      <div class="card-label mono">Pair Alignment</div>
      <div class="card-value mono">${aligned}/${total}</div>
      <div class="card-change mono" style="color:${aligned>=total*0.6?P.pos:aligned>=total*0.3?P.a2:P.neg}">${s.conviction?s.conviction.split('—')[0]:''}</div>
    </div>
    <div class="card">
      <div class="card-label mono">Generated</div>
      <div class="card-value" style="font-size:var(--type-body)">${data.generated||'—'}</div>
    </div>
  </div>`;

  // Asset chips
  if(s.top_overweight && s.top_overweight.length > 0){
    h += '<div style="margin-bottom:16px"><div class="mini-title">Overweight Tilt</div><div class="rs-assets">';
    s.top_overweight.forEach(a=>{ h += `<span class="ow">${tickerTip(a)}</span>`; });
    h += '</div></div>';
  }
  if(s.top_underweight && s.top_underweight.length > 0){
    h += '<div style="margin-bottom:20px"><div class="mini-title">Underweight Tilt</div><div class="rs-assets">';
    s.top_underweight.forEach(a=>{ h += `<span class="uw">${tickerTip(a)}</span>`; });
    h += '</div></div>';
  }

  // Section B — Chart with pair selector
  h += '<div class="mini-title">RS Ratio Chart</div>';
  h += '<div class="rs-pair-sel" id="rs-pair-selector">';
  data.pairs.forEach((p,i)=>{
    h += `<button class="rs-pair-btn${i===0?' active':''}" data-idx="${i}" title="${p.name.split('/').map(t=>t+' — '+(ETF_DESC[t]||t)).join('  |  ')}">${p.name}</button>`;
  });
  h += '</div>';
  h += '<div class="chart-wrap" style="height:320px"><canvas id="chart-relstrength"></canvas></div>';
  h += `<div class="legend" id="rs-legend">
    <span><span class="legend-dot" style="background:${P.a1}"></span>RS Ratio</span>
    <span><span class="legend-dot" style="background:${P.a2}"></span>SMA(20)</span>
    <span><span class="legend-dot" style="background:rgba(16,185,129,0.15)"></span>Supportive</span>
    <span><span class="legend-dot" style="background:rgba(239,68,68,0.15)"></span>Restrictive</span>
  </div>`;

  // Section C — Pair Ranking Table (scored and sorted by trade quality)
  // Score each pair: 5 conditions, each worth 1 point
  var scored = data.pairs.map(function(p, origIdx) {
    var score = 0;
    // 1. Fiscal correlation strength: |corr| > 0.3
    var corrPass = Math.abs(p.fiscal_corr_60d) > 0.3;
    if (corrPass) score++;
    // 2. Ratio vs SMA20: is the trend confirmed?
    var sig = p.signal || '';
    var isLongNum = sig.includes('Overweight') || sig.includes('Numerator favored');
    var isShortNum = sig.includes('Underweight') || sig.includes('Denominator favored');
    var smaPass = (isLongNum && p.current_ratio > p.sma20) || (isShortNum && p.current_ratio < p.sma20);
    if (smaPass) score++;
    // 3. ROC confirms direction: > 0 for long num, < 0 for short num
    var rocPass = (isLongNum && p.roc_20d > 0) || (isShortNum && p.roc_20d < 0);
    if (rocPass) score++;
    // 4. Regime alignment
    var alignPass = p.regime_alignment === 'Aligned';
    if (alignPass) score++;
    // 5. Validated backtest edge exists for this pair+direction
    var btIdea = getTradeIdea(p);
    var btPass = btIdea !== null;
    if (btPass) score++;
    var expectedNet = btIdea ? calcExpectedNet(btIdea, 3000) : null;
    var positiveEdge = expectedNet !== null && expectedNet > 0;
    return {p:p, origIdx:origIdx, score:score, corrPass:corrPass, smaPass:smaPass, rocPass:rocPass, alignPass:alignPass, btPass:btPass, btIdea:btIdea, expectedNet:expectedNet, positiveEdge:positiveEdge};
  });
  // Sort: highest score first, then by |fiscal_corr| as tiebreaker
  scored.sort(function(a, b) {
    if (b.score !== a.score) return b.score - a.score;
    return Math.abs(b.p.fiscal_corr_60d) - Math.abs(a.p.fiscal_corr_60d);
  });

  var GRN = '#10b981';
  var DIM = 'rgba(255,255,255,0.25)';

  h += '<div style="margin-top:28px;display:flex;align-items:center;justify-content:space-between">';
  h += '<div class="mini-title" style="margin-bottom:0">Pair Rankings by Trade Quality</div>';
  h += '<button id="rs-toggle-edge" class="rs-pair-btn active" style="font-size:var(--type-caption);padding:4px 10px">Tradeable</button>';
  h += '</div>';
  h += '<div style="overflow-x:auto"><table class="rs-table"><thead><tr>';
  h += '<th style="text-align:center">Score</th><th></th><th>Pair</th><th>Category</th><th>20d ROC</th><th>Ratio vs SMA20</th><th>60d Fiscal Corr</th><th>Signal</th><th>Aligned</th><th>Edge</th>';
  h += '</tr></thead><tbody>';
  scored.forEach(function(s, rank) {
    var p = s.p;
    var i = s.origIdx;
    var isTop = s.score >= 4;
    var rowDim = s.score <= 1 ? 'opacity:0.4;' : s.score === 2 ? 'opacity:0.55;' : s.score === 3 ? 'opacity:0.75;' : '';

    var vsma = p.current_ratio > p.sma20 ? 'Above' : 'Below';
    var vsmaClr = s.smaPass ? GRN : DIM;
    var corrClr = s.corrPass ? GRN : DIM;
    var rocClr = s.rocPass ? GRN : DIM;
    var alignClr = s.alignPass ? GRN : DIM;
    var btClr = s.btPass ? GRN : DIM;

    var sigCls = p.signal.includes('Overweight') || p.signal.includes('Numerator favored') ? 'rs-ow' : p.signal.includes('Underweight') || p.signal.includes('Denominator favored') ? 'rs-uw' : 'rs-mix';

    // Trade dot: only active if score >= 4 (at least 4 of 5 conditions met)
    var idea = s.score >= 4 ? s.btIdea : null;
    var dotCls = idea ? 'trade-dot active' : 'trade-dot inactive';
    var dotTitle = idea ? 'Click for trade idea (' + s.score + '/5)' : s.score + '/5 conditions met';

    // Score display: 5 filled dots
    var scoreDots = '';
    for (var d = 0; d < 5; d++) {
      scoreDots += '<span style="display:inline-block;width:7px;height:7px;margin:0 1px;'
        + 'background:' + (d < s.score ? GRN : 'rgba(255,255,255,0.1)') + ';border-radius:50%"></span>';
    }

    // Edge column: show backtest stats + net P&L indicator
    var edgeText;
    if (s.btPass) {
      var netStr = s.expectedNet !== null ? ' / \u00A3' + s.expectedNet.toFixed(0) : '';
      if (s.positiveEdge) {
        edgeText = '<span style="color:' + GRN + ';font-weight:600">+' + s.btIdea.mean.toFixed(1) + '% / ' + s.btIdea.hit.toFixed(0) + '%' + netStr + '</span>';
      } else {
        edgeText = '<span style="color:#ef4444;font-weight:600">+' + s.btIdea.mean.toFixed(1) + '% / ' + s.btIdea.hit.toFixed(0) + '%' + netStr + '</span>';
      }
    } else {
      edgeText = '<span style="color:' + DIM + '">—</span>';
    }

    // data-has-edge: 2=positive expectancy, 1=has idea but negative, 0=no idea
    var edgeAttr = s.positiveEdge ? 'data-has-edge="2"' : s.btPass ? 'data-has-edge="1"' : 'data-has-edge="0"';

    h += '<tr style="' + rowDim + '" ' + edgeAttr + '>'
      + '<td style="text-align:center;white-space:nowrap">' + scoreDots + '</td>'
      + '<td style="text-align:center;padding:10px 4px"><span class="' + dotCls + '" title="' + dotTitle + '" data-trade-idx="' + i + '"></span></td>'
      + '<td style="font-weight:600;color:' + (isTop ? 'var(--text-primary)' : 'var(--text-secondary)') + '">' + pairTip(p.name) + '</td>'
      + '<td style="color:' + (isTop ? 'var(--text-primary)' : DIM) + '">' + (p.category==='cross-asset'?'Cross-Asset':'Sector') + '</td>'
      + '<td style="color:' + rocClr + ';font-weight:' + (s.rocPass ? '600' : '400') + '">' + (p.roc_20d>=0?'+':'') + p.roc_20d.toFixed(1) + '%</td>'
      + '<td style="color:' + vsmaClr + ';font-weight:' + (s.smaPass ? '600' : '400') + '">' + vsma + '</td>'
      + '<td style="color:' + corrClr + ';font-weight:' + (s.corrPass ? '600' : '400') + '">' + (p.fiscal_corr_60d>0?'+':'') + p.fiscal_corr_60d.toFixed(3) + '</td>'
      + '<td><span class="rs-signal ' + sigCls + '">' + p.signal + '</span></td>'
      + '<td style="color:' + alignClr + ';font-weight:600">' + p.regime_alignment + '</td>'
      + '<td>' + edgeText + '</td>'
      + '</tr>';
    // Hidden expandable trade panel row (only for score >= 4 with validated idea)
    if (idea) {
      h += '<tr class="trade-panel" id="trade-panel-' + i + '"><td colspan="10">'
        + '<button class="tp-close" data-trade-idx="' + i + '">Close</button>'
        + buildTradePanel(idea, 3000)
        + '</td></tr>';
    }
  });
  h += '</tbody></table></div></div>';

  // Section D — Rotation Framework
  h += `<div class="insight" style="margin-top:24px">
    <strong>Trade Quality Score (5 conditions)</strong><br/>
    Each pair is scored on five conditions. <span style="color:#10b981">Green</span> = condition met. The trade idea dot activates at 4+ conditions. Lower-scored pairs are visually dimmed.<br/><br/>
    Columns are ordered by leading indicator preference (most leading nearest the pair name):<br/><br/>
    <strong>1. 20d ROC</strong> &#8212; momentum (leading). When ROC turns, the ratio is starting to move. First signal of a trend forming or reversing.<br/>
    <strong>2. Ratio vs SMA(20)</strong> &#8212; trend confirmation (lagging). Confirms the ROC move is sustained, not a false start.<br/>
    <strong>3. 60d Fiscal Corr</strong> &#8212; structural (slowest). |corr| > 0.3 means the pair responds meaningfully to fiscal flows. Sets <em>which</em> pair to watch.<br/>
    <strong>4. Regime Aligned</strong> &#8212; the fiscal regime supports the trade direction. Polarity is set by correlation sign: positive corr pairs align with Supportive (pro-cyclical), negative corr pairs align with Restrictive (counter-cyclical, e.g. GLD/SPY).<br/>
    <strong>5. Validated Edge</strong> &#8212; backtest (Jan 2023 &#8211; Mar 2026) confirms this pair+direction combo has a statistical edge. The Edge column shows net P&amp;L after IG spread + carry costs at current stake. <span style="color:#ef4444">Red = negative expectancy (costs exceed edge)</span>.<br/><br/>
    <span style="color:var(--text-dim)">This is a positioning framework, not investment advice. Only pairs with positive net expectancy after costs appear in "Tradeable only" view.</span>
  </div>`;

  el.innerHTML = h;

  // Wire pair selector buttons
  const btns = document.querySelectorAll('#rs-pair-selector .rs-pair-btn');
  btns.forEach(btn=>{
    btn.addEventListener('click',()=>{
      btns.forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      const idx = parseInt(btn.dataset.idx);
      renderRSChart(data.pairs[idx]);
    });
  });

  // Wire trade idea dots and close buttons
  document.querySelectorAll('.trade-dot.active').forEach(dot=>{
    dot.addEventListener('click',()=>{
      const idx = dot.dataset.tradeIdx;
      const panel = document.getElementById('trade-panel-' + idx);
      if (!panel) return;
      document.querySelectorAll('.trade-panel.open').forEach(p=>{
        if (p.id !== 'trade-panel-' + idx) p.classList.remove('open');
      });
      panel.classList.toggle('open');
    });
  });
  document.querySelectorAll('.tp-close').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const idx = btn.dataset.tradeIdx;
      const panel = document.getElementById('trade-panel-' + idx);
      if (panel) panel.classList.remove('open');
    });
  });

  // Wire tradeable-only toggle
  var toggleBtn = document.getElementById('rs-toggle-edge');
  if (toggleBtn) {
    var showAll = false; // start with tradeable only (positive expectancy)
    // Apply initial filter — hide no-edge and negative-expectancy rows
    document.querySelectorAll('.rs-table tbody tr[data-has-edge="0"], .rs-table tbody tr[data-has-edge="1"]').forEach(function(row) {
      row.style.display = 'none';
    });
    toggleBtn.addEventListener('click', function() {
      showAll = !showAll;
      toggleBtn.textContent = showAll ? 'Tradeable' : 'All pairs';
      toggleBtn.classList.toggle('active', !showAll);
      document.querySelectorAll('.rs-table tbody tr[data-has-edge="0"], .rs-table tbody tr[data-has-edge="1"]').forEach(function(row) {
        row.style.display = showAll ? '' : 'none';
      });
    });
  }

  // Render first pair chart
  renderRSChart(data.pairs[0]);
}

function renderRSChart(pair){
  destroyChart('relstrength');
  const canvas = document.getElementById('chart-relstrength');
  if(!canvas || !pair.series) return;

  const s = pair.series;
  const dates = s.dates.map(d=>{const p=d.split('-');return p[1]+'/'+p[2];});

  // Build regime background segments
  const regimeBg = s.regime.map(r=>r==='Supportive'?'rgba(16,185,129,0.08)':r==='Restrictive'?'rgba(239,68,68,0.08)':'rgba(255,255,255,0.02)');

  const ctx = canvas.getContext('2d');
  charts['relstrength'] = new Chart(ctx,{
    type:'line',
    data:{labels:dates,datasets:[
      {label:'RS Ratio',data:s.ratio,borderColor:P.a1,borderWidth:2.5,pointRadius:0,pointHoverRadius:4,
       pointHoverBackgroundColor:P.a1,tension:0.3,order:1},
      {label:'SMA(20)',data:s.sma20,borderColor:P.a2,borderWidth:1.5,borderDash:[6,3],pointRadius:0,
       pointHoverRadius:3,pointHoverBackgroundColor:P.a2,tension:0.3,order:2}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{legend:{display:false},tooltip:{
        backgroundColor:'#0f0f13',borderColor:'rgba(255,255,255,0.1)',borderWidth:1,
        titleFont:{family:"'JetBrains Mono',monospace",size:12,weight:'bold'},
        bodyFont:{family:"'JetBrains Mono',monospace",size:12},
        titleColor:'#FAFAFA',bodyColor:'#FAFAFA',cornerRadius:8,padding:12,
        callbacks:{label:c=>c.parsed.y!==null?`${c.dataset.label}: ${c.parsed.y.toFixed(4)}`:''}
      }},
      scales:{
        x:{grid:{display:false},ticks:{font:{family:"'JetBrains Mono',monospace",size:10},color:P.muted,maxRotation:0,autoSkip:true,maxTicksLimit:12},border:{display:false}},
        y:{grid:{color:P.grid},ticks:{font:{family:"'JetBrains Mono',monospace",size:11},color:P.muted,callback:v=>v.toFixed(2)},border:{display:false}}
      }
    },
    plugins:[{
      id:'regimeBands',
      beforeDraw(chart){
        const {ctx:c,chartArea:{top,bottom,left,right},scales:{x}} = chart;
        const regime = s.regime;
        if(!regime) return;
        regime.forEach((r,i)=>{
          const x0 = i===0?left:x.getPixelForValue(i)-((x.getPixelForValue(1)-x.getPixelForValue(0))/2);
          const x1 = i===regime.length-1?right:x.getPixelForValue(i)+((x.getPixelForValue(1)-x.getPixelForValue(0))/2);
          c.fillStyle = r==='Supportive'?'rgba(16,185,129,0.06)':r==='Restrictive'?'rgba(239,68,68,0.06)':'transparent';
          c.fillRect(x0,top,x1-x0,bottom-top);
        });
      }
    }]
  });
}

function renderNarrative(narr){
  const el = document.getElementById('narrative-section');
  if(!el||!narr||!narr.topics||!narr.topics.length) return;
  const barColors = [P.a1,P.a2,P.a3,P.a4,P.a5,P.a6,P.pos,P.neg,P.muted];
  const top5 = narr.topics.slice(0,5);
  const maxPct = top5[0]?top5[0].pct:1;
  const ts = narr.fetched_at?new Date(narr.fetched_at).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}):'';
  const topicsHtml = top5.map((t,i)=>{
    const barW = (t.pct/maxPct*100).toFixed(0);
    const c = barColors[i%barColors.length];
    const headlines = (t.sample_headlines||[]).slice(0,3).map(h=>`<li>${h}</li>`).join('');
    return `<div class="narr-topic">
      <div class="narr-topic-header">
        <span class="narr-topic-name">${t.topic}</span>
        <div class="narr-bar-wrap"><div class="narr-bar" style="width:${barW}%;background:${c}"></div></div>
        <span class="narr-topic-pct">${t.pct.toFixed(0)}%</span>
      </div>
      ${headlines?`<ul class="narr-headlines">${headlines}</ul>`:''}
    </div>`;
  }).join('');

  el.innerHTML = `<div class="narr-wrap">
    <div class="narr-header" onclick="this.parentElement.querySelector('.narr-body').classList.toggle('collapsed');this.querySelector('.narr-toggle').textContent=this.parentElement.querySelector('.narr-body').classList.contains('collapsed')?'\\u25B6':'\\u25BC'">
      <span class="narr-title mono">Market Narrative</span>
      <span class="narr-toggle">&#9660;</span>
    </div>
    <div class="narr-dominant">${narr.dominant||'No dominant narrative'}</div>
    <div class="narr-meta">${narr.total_headlines||0} headlines scanned${ts?' \u00B7 '+ts:''}</div>
    <div class="narr-body">
      ${topicsHtml}
    </div>
  </div>`;
}

// Load data and build
async function init(){
  try {
    const resp = await fetch('viz_data.json');
    if(!resp.ok) throw new Error('Could not load viz_data.json');
    const data = await resp.json();
    buildDashboard(data);
    try { renderTodaysTrade(); } catch(_){}

    // Load signal log (non-blocking — dashboard works without it)
    try {
      const slResp = await fetch('signal_log.jsonl');
      if(slResp.ok){
        const text = await slResp.text();
        const entries = text.trim().split('\n').filter(l=>l).map(l=>JSON.parse(l));
        window._signalLogData = entries;
        renderSignalLog(entries);
      } else {
        renderSignalLog([]);
      }
    } catch(slErr){
      console.warn('Signal log not available:', slErr.message);
      renderSignalLog([]);
    }

    // Load return attribution (non-blocking)
    try {
      const raResp = await fetch('signal_returns.json');
      if(raResp.ok){
        const raData = await raResp.json();
        window._returnData = raData;
        renderReturnAttribution(raData);
      }
    } catch(raErr){
      console.warn('Return attribution not available:', raErr.message);
    }

    // Load technicals data (non-blocking)
    try {
      const techResp = await fetch('technicals_data.json');
      if(techResp.ok){
        window._techData = await techResp.json();
        try { renderTodaysTrade(); } catch(_){}
      }
    } catch(techErr){
      console.warn('Technicals data not available:', techErr.message);
    }

    // Load RS ratios data (non-blocking)
    try {
      const rsResp = await fetch('rs_ratios.json');
      if(rsResp.ok){
        window._rsData = await rsResp.json();
        try { renderTodaysTrade(); } catch(_){}
      }
    } catch(rsErr){
      console.warn('RS ratios data not available:', rsErr.message);
    }

    // Load SPX series (non-blocking)
    try {
      const spxResp = await fetch('spx_series.json');
      if(spxResp.ok){
        window._spxData = await spxResp.json();
      }
    } catch(spxErr){
      console.warn('SPX series not available:', spxErr.message);
    }

    // Load position ledger for the Bias History panel (non-blocking)
    try {
      const plResp = await fetch('position_ledger.jsonl');
      if(plResp.ok){
        const text = await plResp.text();
        const entries = text.trim().split('\n').filter(l=>l).map(l=>JSON.parse(l));
        window._biasLedger = entries;
        renderBiasHistory(entries);
      } else {
        renderBiasHistory([]);
      }
    } catch(plErr){
      console.warn('Position ledger not available:', plErr.message);
      renderBiasHistory([]);
    }

    // Load market narrative (non-blocking)
    try {
      const narrResp = await fetch('narrative.json');
      if(narrResp.ok){
        const narrData = await narrResp.json();
        window._narrativeData = narrData;
        renderNarrative(narrData);
      }
    } catch(narrErr){
      console.warn('Narrative data not available:', narrErr.message);
    }
  } catch(e){
    document.getElementById('loader').innerHTML =
      '<div style="color:#ef4444">Failed to load viz_data.json</div><div style="color:#94A3B8;font-size:var(--type-body-sm);margin-top:8px">'+e.message+'<br/>Make sure viz_data.json is in the same directory as index.html</div>';
  }
}
init();

// Theme toggle
function toggleTheme() {
  const html = document.documentElement;
  const isLight = html.getAttribute('data-theme') === 'light';
  if (isLight) {
    html.removeAttribute('data-theme');
    document.getElementById('theme-icon').innerHTML = '&#9790;';
    document.getElementById('theme-label').textContent = 'Dark';
    localStorage.setItem('rfa-theme', 'dark');
  } else {
    html.setAttribute('data-theme', 'light');
    document.getElementById('theme-icon').innerHTML = '&#9788;';
    document.getElementById('theme-label').textContent = 'Light';
    localStorage.setItem('rfa-theme', 'light');
  }
}
(function() {
  var saved = localStorage.getItem('rfa-theme');
  if (saved === 'light') {
    document.documentElement.setAttribute('data-theme', 'light');
    var icon = document.getElementById('theme-icon');
    var label = document.getElementById('theme-label');
    if (icon) icon.innerHTML = '&#9788;';
    if (label) label.textContent = 'Light';
  }
})();

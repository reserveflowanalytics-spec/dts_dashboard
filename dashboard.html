    <div class="panel-sub">Discrete panic-buy setups: count=0 (4-pillar Fed action regime tightening) + VIX&ge;32 (extreme fear). Entry T+10 trading days, take-profit +10%, max-hold 120 trading days. Backtested 2009-2026.</div>
    ${renderTimingSystem(D.timing_trades)}
  </div>

  <!-- BIAS HISTORY -->
  <div class="panel" id="panel-bias-history">
    <div class="panel-title">Bias History — Position Ledger</div>
    <div class="panel-sub">Append-only log of every pipeline run, showing the synthesised bias call. Bias-change events are highlighted and trigger Telegram alerts.</div>
    <div id="bias-history-content"><div class="loading">Loading position ledger&hellip;</div></div>
  </div>

  <!-- REPORT -->
  <div class="panel" id="panel-report">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px">
      <div>
        <div class="panel-title">MacroPulse Pro Research Note</div>
        <div class="panel-sub" style="margin-bottom:0">Institutional macro synthesis generated from Treasury flow data. Operational framework consistent with Federal Reserve and US Treasury accounting as described in the DTS.</div>
      </div>
      <button class="copy-btn" id="copy-report-btn" onclick="copyReport()">Copy Report Text</button>
    </div>
    <div id="report-content"></div>
  </div>

  <!-- TECHNICALS -->
  <div class="panel" id="panel-technicals">
    <div class="panel-title">ES Technical Regime — H12 SMA(20) Trend</div>
    <div class="panel-sub">Daily RTH candles colored by SMA(20) regime. Cross-reference with the fiscal regime above — when both fundamentals and technicals align, conviction is highest.</div>
    <div class="chart-wrap" style="height:420px;position:relative"><canvas id="chart-technicals"></canvas></div>
    <div class="legend">
      <span><span class="legend-dot" style="background:#10b981"></span>Bullish (close &gt; SMA)</span>
      <span><span class="legend-dot" style="background:#ef4444"></span>Bearish (close &lt; SMA)</span>
      <span><span class="legend-dot" style="background:#f59e0b;border-radius:50%"></span>SMA(20)</span>
    </div>
    <div class="insight" id="tech-insight"><strong>No technicals data.</strong> Run <code>python generate_technicals.py</code> to create technicals_data.json.</div>
  </div>

  <!-- REL. STRENGTH -->
  <div class="panel" id="panel-relstrength">
    <div class="panel-title">Relative Strength Ratio Analysis</div>
    <div class="panel-sub">RS ratios ranked by fiscal flow correlation — connecting DTS regime signals to actionable asset rotation.</div>
    <div id="rs-content"><div class="loading">Loading RS ratio data…</div></div>
  </div>

  <!-- MARKET LINKAGE -->
  <div class="panel" id="panel-marketlink">
    <div class="panel-title">Fiscal Flow vs Market Linkage</div>
    <div class="panel-sub">Daily core fiscal injection (20d rolling avg) overlaid against S&amp;P 500. Shaded regions = fiscal regime. When both fiscal momentum and price trend align, conviction is highest.</div>
    <div class="chart-wrap" style="height:360px;position:relative"><canvas id="chart-marketlink"></canvas></div>
    <div class="legend" style="margin-top:10px">
      <span><span class="legend-dot" style="background:${P.a1}"></span>20d avg CFI (left, $B/d)</span>
      <span><span class="legend-dot" style="background:${P.a2};border-radius:50%"></span>SPX close (right)</span>
      <span style="display:inline-block;width:12px;height:8px;background:rgba(16,185,129,0.15);border-radius:2px;vertical-align:middle"></span><span style="font-size:var(--type-body-sm);color:var(--text-secondary);margin-left:4px">Supportive regime</span>
      <span style="display:inline-block;width:12px;height:8px;background:rgba(239,68,68,0.12);border-radius:2px;vertical-align:middle"></span><span style="font-size:var(--type-body-sm);color:var(--text-secondary);margin-left:4px">Restrictive regime</span>
    </div>
    <div class="insight" style="margin-top:16px">
      The fiscal injection channel (Treasury spending minus receipts) adds bank reserves to the private sector.
      Sustained positive net injection historically correlates with equity risk appetite.
      This chart tracks whether the current flow pace is aligned with or diverging from market direction.
      <strong>Divergences</strong> — strong SPX with deteriorating fiscal flows, or vice versa — are the signals worth watching.
    </div>
  </div>

  <div class="footer mono">Source: US Treasury Daily Treasury Statement via FiscalData API</div>
  `;

  // Wire toggles
  const switchTab = (view, scrollId) => {
    document.querySelectorAll('.tbtn[data-view]').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    const btn = document.querySelector(`.tbtn[data-view="${view}"]`);
    if(btn) btn.classList.add('active');
    const panel = document.getElementById('panel-'+view);
    if(panel) panel.classList.add('active');
    renderCharts(D, view);
    if(scrollId){
      setTimeout(()=>{
        const target = document.getElementById(scrollId);
        if(target){
          target.scrollIntoView({behavior:'smooth',block:'start'});
          target.classList.add('rpt-highlight');
          setTimeout(()=>target.classList.remove('rpt-highlight'),1500);
        }
      },100);
    }
  };

  document.querySelectorAll('.tbtn[data-view]').forEach(btn=>{
    btn.addEventListener('click',()=>switchTab(btn.dataset.view));
  });

  // Wire gauge component clicks
  document.querySelectorAll('.gauge-component[data-view]').forEach(gc=>{
    gc.addEventListener('click',()=>{
      switchTab(gc.dataset.view, gc.dataset.scroll||null);
    });
  });

  // Populate tables
  const scBody = document.getElementById('scorecard-body');
  D.scorecard.forEach(r=>{
    const yoyClr = r.yoy_pct===null?'':r.yoy_pct>=0?P.pos:P.neg;
    scBody.innerHTML += `<tr>
      <td>${r.label}</td>
      <td class="mono">${fmt(r.current)}</td>
      <td class="mono">${r.prior!==null?fmt(r.prior):'n/a'}</td>
      <td class="mono" style="color:${yoyClr}">${pct(r.yoy_pct)}</td>
    </tr>`;
  });

  const mtBody = document.getElementById('monthly-body');
  D.monthly_table.forEach(r=>{
    mtBody.innerHTML += `<tr>
      <td>${r.month}</td>
      <td class="mono" style="color:${clr(r.cfi)}">${r.cfi.toFixed(1)}</td>
      <td class="mono">${r.taxes.toFixed(1)}</td>
      <td class="mono">${r.tariffs.toFixed(1)}</td>
      <td class="mono">${r.refunds.toFixed(1)}</td>
      <td class="mono">${r.hh.toFixed(1)}</td>
      <td class="mono">${r.interest.toFixed(1)}</td>
      <td class="mono" style="color:${clr(-r.tga_delta)}">${r.tga_delta.toFixed(1)}</td>
    </tr>`;
  });

  // Transmission
  const tGrid = document.getElementById('transmission-grid');
  const tColors = [P.pos,P.neg,P.a1,P.a2];
  D.transmission.forEach((t,i)=>{
    const c = tColors[i]||P.a1;
    tGrid.innerHTML += `
    <div class="chain-item">
      <div class="chain-bar" style="background:${c}"></div>
      <div>
        <div class="chain-from">${t.from} &rarr; ${t.to}</div>
        <div class="chain-val mono" style="color:${c}">${fmt(t.value)}</div>
        <div class="chain-detail">${t.detail}</div>
      </div>
    </div>`;
  });

  // Calendar
  const calList = document.getElementById('calendar-list');
  D.calendar.forEach(e=>{
    calList.innerHTML += `<div class="cal-item"><span class="cal-date mono">${e.date}</span><span class="cal-event">${e.event}</span></div>`;
  });

  // Render default charts
  renderCharts(D, 'flows');

  // Render report
  if(D.report){ window._reportData = D.report; renderReport(D.report); }
}

function renderCharts(D, view){
  if(view==='flows' && !charts['flows']){
    const ctx = document.getElementById('chart-flows').getContext('2d');
    charts['flows'] = new Chart(ctx,{
      type:'bar',
      data:{
        labels:D.daily.map(d=>shortD(d.date)),
        datasets:[
          {type:'bar',label:'Core Fiscal Injection',data:D.daily.map(d=>d.cfi),
           backgroundColor:D.daily.map(d=>d.cfi>=0?P.pos+'D9':P.neg+'D9'),
           borderRadius:2,barPercentage:0.7,yAxisID:'y',order:2},
          {type:'line',label:'TGA Level',data:D.daily.map(d=>d.tga),
           borderColor:P.a2,borderWidth:2.5,pointRadius:0,pointHoverRadius:4,
           pointHoverBackgroundColor:P.a2,tension:0.3,yAxisID:'y1',order:1}
        ]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        interaction:{mode:'index',intersect:false},
        plugins:{legend:{display:false},tooltip:{
          backgroundColor:'#0f0f13',borderColor:'rgba(255,255,255,0.1)',borderWidth:1,
          titleFont:{family:"'JetBrains Mono',monospace",size:12,weight:'bold'},
          bodyFont:{family:"'JetBrains Mono',monospace",size:12},
          titleColor:'#FAFAFA',bodyColor:'#FAFAFA',cornerRadius:8,padding:12,
          callbacks:{label:ctx=>`${ctx.dataset.label}: ${fmt(ctx.parsed.y)}`}
        }},
        scales:{
          x:{grid:{display:false},ticks:{font:{family:"'JetBrains Mono',monospace",size:10},color:P.muted,maxRotation:0,autoSkip:true,maxTicksLimit:10},border:{display:false}},
          y:{position:'left',grid:{color:P.grid},ticks:{font:{family:"'JetBrains Mono',monospace",size:11},color:P.muted,callback:v=>v+'B'},border:{display:false}},
          y1:{position:'right',grid:{display:false},ticks:{font:{family:"'JetBrains Mono',monospace",size:11},color:P.a2+'99',callback:v=>'$'+v+'B'},border:{display:false}}
        }
      },
      plugins:[{
        id:'eventLines',
        afterDraw(chart){
          const {ctx,chartArea:{top,bottom,left,right}} = chart;
          const xScale = chart.scales.x;
          const dates = D.daily.map(d=>d.date);

          // CR / continuing resolution periods — update dates as needed
          // Each entry: {start:'YYYY-MM-DD', end:'YYYY-MM-DD', label:'short label'}
          // cr_periods comes from viz_data.json — maintained in analyze_dts_mmt_v2.py CR_PERIODS table
          const crPeriods = (D.cr_periods || []).map(p=>({start:p.start, end:p.end, label:p.label}));

          crPeriods.forEach(({start, end, label})=>{
            const startIdx = dates.findIndex(d=>d>=start);
            const endIdx   = dates.findLastIndex(d=>d<=end);
            if(startIdx < 0 || endIdx < 0 || startIdx > endIdx) return;
            const x0 = xScale.getPixelForValue(startIdx);
            const x1 = xScale.getPixelForValue(endIdx);
            ctx.save();
            ctx.fillStyle = 'rgba(251,191,36,0.06)';
            ctx.fillRect(x0, top, x1-x0, bottom-top);
            ctx.strokeStyle = 'rgba(251,191,36,0.2)';
            ctx.lineWidth = 1;
            ctx.setLineDash([3,3]);
            ctx.beginPath(); ctx.moveTo(x0,top); ctx.lineTo(x0,bottom); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(x1,top); ctx.lineTo(x1,bottom); ctx.stroke();
            ctx.setLineDash([]);
            ctx.fillStyle = 'rgba(251,191,36,0.6)';
            ctx.font = "9px 'JetBrains Mono',monospace";
            ctx.textAlign = 'left';
            ctx.fillText(label, x0+4, top+10);
            ctx.restore();
          });

          // Interest coupon and SSA payment event markers
          D.daily.forEach((d,i)=>{
            const isInterest = d.interest > 10;
            const isSSA      = d.hh_transfers > 25;
            if(!isInterest && !isSSA) return;
            const px = xScale.getPixelForValue(i);
            const color = isInterest ? P.a2 : P.pos;
            ctx.save();
            ctx.setLineDash([3,4]);
            ctx.strokeStyle = color+'66';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(px, top);
            ctx.lineTo(px, bottom);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.fillStyle = color+'CC';
            ctx.font = "10px 'JetBrains Mono',monospace";
            ctx.textAlign = 'center';
            ctx.fillText(isInterest ? '\u2605' : '\u25B2', px, top + 12);
            ctx.restore();
          });
        }
      }]
    });
  }

  if(view==='cumulative'){
    const months = ['Oct','Nov','Dec','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep'];
    const fy_cur = D.cumulative[String(D.meta.fiscal_year)]||[];
    const fy_prev = D.cumulative[String(D.meta.fiscal_year-1)]||[];

    // Init cumulative chart (lazy, once)
    if(!charts['cumulative']){
      const curData = months.map((_,i)=>{const r=fy_cur.find(x=>x.fm===i+1);return r?r.cum_cfi:null;});
      const prevData = months.map((_,i)=>{const r=fy_prev.find(x=>x.fm===i+1);return r?r.cum_cfi:null;});
      const ctx = document.getElementById('chart-cumulative').getContext('2d');
      charts['cumulative'] = new Chart(ctx,{
        type:'line',
        data:{labels:months,datasets:[
          {label:'FY'+D.meta.fiscal_year,data:curData,borderColor:P.a1,borderWidth:2.5,pointRadius:3,pointBackgroundColor:P.a1,
           backgroundColor:P.a1+'1F',fill:true,tension:0.3,spanGaps:false},
          {label:'FY'+(D.meta.fiscal_year-1),data:prevData,borderColor:P.muted,borderWidth:2,borderDash:[6,3],pointRadius:2,pointBackgroundColor:P.muted,
           backgroundColor:P.muted+'0F',fill:true,tension:0.3}
        ]},
        options:{responsive:true,maintainAspectRatio:false,
          plugins:{legend:{display:false},tooltip:{
            backgroundColor:'#0f0f13',borderColor:'rgba(255,255,255,0.1)',borderWidth:1,
            titleFont:{family:"'JetBrains Mono',monospace",size:12,weight:'bold'},bodyFont:{family:"'JetBrains Mono',monospace",size:12},
            titleColor:'#FAFAFA',bodyColor:'#FAFAFA',cornerRadius:8,padding:12,
            callbacks:{label:ctx=>ctx.parsed.y!==null?`${ctx.dataset.label}: ${fmt(ctx.parsed.y)}`:''}
          }},
          scales:{
            x:{grid:{display:false},ticks:{font:{family:"'JetBrains Mono',monospace",size:11},color:P.muted},border:{display:false}},
            y:{grid:{color:P.grid},ticks:{font:{family:"'JetBrains Mono',monospace",size:11},color:P.muted,callback:v=>'$'+v+'B'},border:{display:false}}
          }
        }
      });
    }

    // Wire sub-toggle (once)
    if(!charts['cumulative-wired']){
      charts['cumulative-wired'] = true;
      const btnCumul = document.getElementById('subview-cumul');
      const btnDelta = document.getElementById('subview-delta');
      const wrapCumul = document.getElementById('wrap-cumulative');
      const wrapDelta = document.getElementById('wrap-cumul-delta');
      const legend  = document.getElementById('cumul-legend');
      const title   = document.getElementById('cumul-title');
      const sub     = document.getElementById('cumul-sub');

      btnCumul.addEventListener('click',()=>{
        btnCumul.classList.add('active'); btnDelta.classList.remove('active');
        wrapCumul.style.display=''; wrapDelta.style.display='none';
        legend.style.display='';
        title.textContent='Cumulative Fiscal Injection \u2014 FY'+D.meta.fiscal_year+' vs FY'+(D.meta.fiscal_year-1);
        sub.textContent='Running total of core fiscal injection by fiscal month. The gap between lines shows YoY change in how much the government has added to the private sector.';
      });

      btnDelta.addEventListener('click',()=>{
        btnDelta.classList.add('active'); btnCumul.classList.remove('active');
        wrapDelta.style.display=''; wrapCumul.style.display='none';
        legend.style.display='none';
        title.textContent='YoY Gap \u2014 FY'+D.meta.fiscal_year+' minus FY'+(D.meta.fiscal_year-1)+' (by fiscal month)';
        sub.textContent='Green = current year running ahead of prior year. Red = running behind. A rising trend means the gap is closing \u2014 momentum improving.';

        // Init delta chart (lazy, once)
        if(!charts['cumul-delta']){
          const deltaData = months.map((_,i)=>{
            const cur  = fy_cur.find(x=>x.fm===i+1);
            const prev = fy_prev.find(x=>x.fm===i+1);
            return (cur && prev) ? +(cur.cum_cfi - prev.cum_cfi).toFixed(2) : null;
          });
          const ctx2 = document.getElementById('chart-cumul-delta').getContext('2d');
          charts['cumul-delta'] = new Chart(ctx2,{
            type:'bar',
            data:{labels:months,datasets:[
              {label:'YoY Gap',data:deltaData,
               backgroundColor:deltaData.map(v=>v===null?'transparent':v>=0?P.pos+'CC':P.neg+'CC'),
               borderRadius:4,barPercentage:0.5}
            ]},
            options:{responsive:true,maintainAspectRatio:false,
              plugins:{legend:{display:false},tooltip:{
                backgroundColor:'#0f0f13',borderColor:'rgba(255,255,255,0.1)',borderWidth:1,
                titleFont:{family:"'JetBrains Mono',monospace",size:12,weight:'bold'},bodyFont:{family:"'JetBrains Mono',monospace",size:12},
                titleColor:'#FAFAFA',bodyColor:'#FAFAFA',cornerRadius:8,padding:12,
                callbacks:{label:c=>{
                  const v=c.parsed.y;
                  if(v===null) return '';
                  return v>=0?`+${fmt(v)} ahead of prior year`:`${fmt(v)} behind prior year`;
                }}
              }},
              scales:{
                x:{grid:{display:false},ticks:{font:{family:"'JetBrains Mono',monospace",size:11},color:P.muted},border:{display:false}},
                y:{grid:{color:P.grid},ticks:{font:{family:"'JetBrains Mono',monospace",size:11},color:P.muted,callback:v=>(v>0?'+':'')+v+'B'},border:{display:false}}
              }
            }
          });
        }
      });
    }
  }

  if(view==='weekly' && !charts['weekly']){
    const ctx = document.getElementById('chart-weekly').getContext('2d');
    charts['weekly'] = new Chart(ctx,{
      type:'bar',
      data:{labels:D.weekly.map(w=>w.week),datasets:[
        {label:'Core Fiscal Injection',data:D.weekly.map(w=>w.cfi),
         backgroundColor:D.weekly.map(w=>w.cfi>=0?P.pos+'D9':P.neg+'D9'),borderRadius:4,barPercentage:0.4},
        {label:'Reserve Effect',data:D.weekly.map(w=>w.reserve),
         backgroundColor:D.weekly.map(w=>w.reserve>=0?P.a1+'99':P.a3+'99'),borderRadius:4,barPercentage:0.4}
      ]},
      options:{responsive:true,maintainAspectRatio:false,
        interaction:{mode:'index',intersect:false},
        plugins:{legend:{display:false},tooltip:{
          backgroundColor:'#0f0f13',borderColor:'rgba(255,255,255,0.1)',borderWidth:1,
          titleFont:{family:"'JetBrains Mono',monospace",size:12,weight:'bold'},bodyFont:{family:"'JetBrains Mono',monospace",size:12},
          titleColor:'#FAFAFA',bodyColor:'#FAFAFA',cornerRadius:8,padding:12,
          callbacks:{label:ctx=>`${ctx.dataset.label}: ${fmt(ctx.parsed.y)}`}
        }},
        scales:{
          x:{grid:{display:false},ticks:{font:{family:"'JetBrains Mono',monospace",size:10},color:P.muted,maxRotation:0},border:{display:false}},
          y:{grid:{color:P.grid},ticks:{font:{family:"'JetBrains Mono',monospace",size:11},color:P.muted,callback:v=>v+'B'},border:{display:false}}
        }
      }
    });
  }

  if(view==='composition' && !charts['comp-taxes']){
    const allMonths = ['Oct','Nov','Dec','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep'];
    const fy_cur = D.cumulative[String(D.meta.fiscal_year)]||[];
    const fy_prev = D.cumulative[String(D.meta.fiscal_year-1)]||[];
    const maxFm = fy_cur.reduce((m,x)=>Math.max(m,x.fm),0);
    const months = allMonths.slice(0, maxFm);
    const get = (arr,fm,key) => {const r=arr.find(x=>x.fm===fm);return r?r[key]:0;};
    const pairs = [
      {id:'comp-taxes',curKey:'taxes',prevKey:'taxes',color:P.neg},
      {id:'comp-hh',curKey:'hh',prevKey:'hh',color:P.pos},
      {id:'comp-interest',curKey:'interest',prevKey:'interest',color:P.a2},
      {id:'comp-tariffs',curKey:'tariffs',prevKey:'tariffs',color:P.a3},
    ];
    pairs.forEach(({id,curKey,prevKey,color})=>{
      const ctx = document.getElementById('chart-'+id).getContext('2d');
      charts[id] = new Chart(ctx,{
        type:'bar',
        data:{labels:months,datasets:[
          {label:'FY'+(D.meta.fiscal_year-1),data:months.map((_,i)=>get(fy_prev,i+1,prevKey)),
           backgroundColor:'rgba(255,255,255,0.12)',borderRadius:3,barPercentage:0.6},
          {label:'FY'+D.meta.fiscal_year,data:months.map((_,i)=>get(fy_cur,i+1,curKey)),
           backgroundColor:color+'D9',borderRadius:3,barPercentage:0.6}
        ]},
        options:{responsive:true,maintainAspectRatio:false,
          plugins:{legend:{display:false},tooltip:{
            backgroundColor:'#0f0f13',borderColor:'rgba(255,255,255,0.1)',borderWidth:1,
            titleFont:{family:"'JetBrains Mono',monospace",size:11},bodyFont:{family:"'JetBrains Mono',monospace",size:11},
            titleColor:'#FAFAFA',bodyColor:'#FAFAFA',cornerRadius:6,padding:10,
            callbacks:{label:ctx=>`${ctx.dataset.label}: ${fmt(ctx.parsed.y)}`}
          }},
          scales:{
            x:{grid:{display:false},ticks:{font:{family:"'JetBrains Mono',monospace",size:10},color:P.muted},border:{display:false}},
            y:{grid:{color:P.grid},ticks:{font:{family:"'JetBrains Mono',monospace",size:10},color:P.muted,callback:v=>v+'B'},border:{display:false}}
          }
        }
      });
    });

    // Tariff drain tracker — full 12-month trend for both FY years
    if(!charts['tariff-tracker']){
      const allMonthsFull = ['Oct','Nov','Dec','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep'];
      const allFm = Array.from({length:12},(_,i)=>i+1);
      const fy_cur_all = D.cumulative[String(D.meta.fiscal_year)]||[];
      const fy_prev_all = D.cumulative[String(D.meta.fiscal_year-1)]||[];
      const curTariffs = allFm.map(fm=>{ const r=fy_cur_all.find(x=>x.fm===fm); return r?r.tariffs:null; });
      const prevTariffs = allFm.map(fm=>{ const r=fy_prev_all.find(x=>x.fm===fm); return r?r.tariffs:null; });
      // Shade current-year bars amber; dim months with no data yet
      const curColors = curTariffs.map(v=>v!==null ? P.a2+'D9' : P.a2+'22');
      const ctxTT = document.getElementById('chart-tariff-tracker').getContext('2d');
      charts['tariff-tracker'] = new Chart(ctxTT,{
        type:'bar',
        data:{labels:allMonthsFull,datasets:[
          {label:'FY'+(D.meta.fiscal_year-1),data:prevTariffs,
           backgroundColor:'rgba(255,255,255,0.12)',borderRadius:3,barPercentage:0.6},
          {label:'FY'+D.meta.fiscal_year,data:curTariffs,
           backgroundColor:curColors,borderRadius:3,barPercentage:0.6}
        ]},
        options:{responsive:true,maintainAspectRatio:false,
          plugins:{
            legend:{display:true,labels:{color:P.muted,font:{family:"'JetBrains Mono',monospace",size:11}}},
            tooltip:{
              backgroundColor:'#0f0f13',borderColor:'rgba(255,255,255,0.1)',borderWidth:1,
              titleFont:{family:"'JetBrains Mono',monospace",size:11},bodyFont:{family:"'JetBrains Mono',monospace",size:11},
              titleColor:'#FAFAFA',bodyColor:'#FAFAFA',cornerRadius:6,padding:10,
              callbacks:{label:ctx=>ctx.parsed.y!==null?`${ctx.dataset.label}: ${fmt(ctx.parsed.y)}`:'no data yet'}
            }
          },
          scales:{
            x:{grid:{display:false},ticks:{font:{family:"'JetBrains Mono',monospace",size:10},color:P.muted},border:{display:false}},
            y:{grid:{color:P.grid},ticks:{font:{family:"'JetBrains Mono',monospace",size:11},color:P.muted,callback:v=>v+'B'},border:{display:false}}
          }
        }
      });
    }
  }

  if(view==='issuance' && !charts['issuance']){
    const barColors = [P.a1,P.a2,P.a3,P.pos,P.a4,P.muted];
    const ctx = document.getElementById('chart-issuance').getContext('2d');
    charts['issuance'] = new Chart(ctx,{
      type:'bar',
      data:{labels:D.debt_decomp.map(d=>d.name),datasets:[
        {label:'Net Issuance',data:D.debt_decomp.map(d=>d.net),
         backgroundColor:D.debt_decomp.map((_,i)=>(barColors[i]||P.a1)+'D9'),
         borderRadius:6,barPercentage:0.5}
      ]},
      options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',
        plugins:{legend:{display:false},tooltip:{
          backgroundColor:'#0f0f13',borderColor:'rgba(255,255,255,0.1)',borderWidth:1,
          titleFont:{family:"'JetBrains Mono',monospace",size:12,weight:'bold'},bodyFont:{family:"'JetBrains Mono',monospace",size:12},
          titleColor:'#FAFAFA',bodyColor:'#FAFAFA',cornerRadius:8,padding:12,
          callbacks:{label:ctx=>`Net: ${fmt(ctx.parsed.x)}`}
        }},
        scales:{
          x:{grid:{color:P.grid},ticks:{font:{family:"'JetBrains Mono',monospace",size:11},color:P.muted,callback:v=>'$'+v+'B'},border:{display:false}},
          y:{grid:{display:false},ticks:{font:{family:"'Inter',sans-serif",size:13,weight:600},color:'#FAFAFA'},border:{display:false}}
        }
      }
    });

    const ctx2 = document.getElementById('chart-billcoupon').getContext('2d');
    charts['billcoupon'] = new Chart(ctx2,{
      type:'bar',
      data:{labels:D.weekly.map(w=>w.week),datasets:[
        {label:'Bills (net)',data:D.weekly.map(w=>w.bills),backgroundColor:P.a1+'D9',borderRadius:3,barPercentage:0.4},
        {label:'Coupon (net)',data:D.weekly.map(w=>w.coupon),backgroundColor:P.a2+'D9',borderRadius:3,barPercentage:0.4}
      ]},
      options:{responsive:true,maintainAspectRatio:false,
        interaction:{mode:'index',intersect:false},
        plugins:{legend:{display:false},tooltip:{
          backgroundColor:'#0f0f13',borderColor:'rgba(255,255,255,0.1)',borderWidth:1,
          titleFont:{family:"'JetBrains Mono',monospace",size:11},bodyFont:{family:"'JetBrains Mono',monospace",size:11},
          titleColor:'#FAFAFA',bodyColor:'#FAFAFA',cornerRadius:6,padding:10,
          callbacks:{label:ctx=>`${ctx.dataset.label}: ${fmt(ctx.parsed.y)}`}
        }},
        scales:{
          x:{grid:{display:false},ticks:{font:{family:"'JetBrains Mono',monospace",size:10},color:P.muted,maxRotation:0},border:{display:false}},
          y:{grid:{color:P.grid},ticks:{font:{family:"'JetBrains Mono',monospace",size:10},color:P.muted,callback:v=>v+'B'},border:{display:false}}
        }
      }
    });
  }

  // Technicals — lazy render on first tab click
  if(view==='technicals' && !charts['technicals'] && window._techData){
    renderTechnicals(window._techData);
    charts['technicals'] = true;
  }

  if(view==='relstrength' && !charts['relstrength-init']){
    renderRelStrength(window._rsData || null);
    charts['relstrength-init'] = true;
  }

  if(view==='marketlink' && !charts['marketlink']){
    const spx = window._spxData || {};
    // Build aligned date array from daily data
    const dates = D.daily.map(d=>d.date);
    // 20d rolling average of CFI
    const cfiVals = D.daily.map(d=>d.cfi);
    const roll20 = cfiVals.map((_,i)=>{
      if(i < 19) return null;
      const slice = cfiVals.slice(i-19, i+1);
      return +(slice.reduce((s,v)=>s+v,0)/20).toFixed(2);
    });
    // SPX lookup — use same-day or nearest prior trading day
    const spxKeys = Object.keys(spx).sort();
    const getSpx = (date) => {
      if(spx[date] !== undefined) return spx[date];
      // find last key <= date
      const prior = spxKeys.filter(k=>k<=date);
      return prior.length ? spx[prior[prior.length-1]] : null;
    };
    const spxVals = dates.map(d=>getSpx(d));
    // Regime colors for background segments
    const regimeColors = D.daily.map(d=>{
      const sig = D.signal_log_latest || null;
      // Use day-level regime if available; fallback to overall regime
      const r = d.regime || D.meta.regime;
      return r==='Supportive'?'rgba(16,185,129,0.08)':r==='Restrictive'?'rgba(239,68,68,0.06)':'transparent';
    });
    const labels = dates.map(d=>shortD(d));
    const ctx = document.getElementById('chart-marketlink').getContext('2d');
    charts['marketlink'] = new Chart(ctx,{
      type:'line',
      data:{labels,datasets:[
        {label:'20d avg CFI',data:roll20,
         borderColor:P.a1,borderWidth:2.5,pointRadius:0,pointHoverRadius:4,
         pointHoverBackgroundColor:P.a1,tension:0.3,yAxisID:'y',spanGaps:false},
        {label:'SPX',data:spxVals,
         borderColor:P.a2,borderWidth:2,pointRadius:0,pointHoverRadius:4,
         pointHoverBackgroundColor:P.a2,tension:0.2,yAxisID:'y1'}
      ]},
      options:{
        responsive:true,maintainAspectRatio:false,
        interaction:{mode:'index',intersect:false},
        plugins:{legend:{display:false},tooltip:{
          backgroundColor:'#0f0f13',borderColor:'rgba(255,255,255,0.1)',borderWidth:1,
          titleFont:{family:"'JetBrains Mono',monospace",size:12,weight:'bold'},
          bodyFont:{family:"'JetBrains Mono',monospace",size:12},
          titleColor:'#FAFAFA',bodyColor:'#FAFAFA',cornerRadius:8,padding:12,
          callbacks:{label:c=>{
            if(c.datasetIndex===0) return c.parsed.y!==null?`CFI 20d avg: ${fmt(c.parsed.y)}/d`:'';
            return `SPX: ${c.parsed.y!==null?c.parsed.y.toFixed(0):'n/a'}`;
          }}
        }},
        scales:{
          x:{grid:{display:false},ticks:{font:{family:"'JetBrains Mono',monospace",size:10},color:P.muted,maxRotation:0,autoSkip:true,maxTicksLimit:10},border:{display:false}},
          y:{position:'left',grid:{color:P.grid},ticks:{font:{family:"'JetBrains Mono',monospace",size:11},color:P.a1+'99',callback:v=>v+'B/d'},border:{display:false},title:{display:true,text:'CFI 20d avg ($B/d)',color:P.a1+'99',font:{family:"'JetBrains Mono',monospace",size:10}}},
          y1:{position:'right',grid:{display:false},ticks:{font:{family:"'JetBrains Mono',monospace",size:11},color:P.a2+'99',callback:v=>v.toFixed(0)},border:{display:false},title:{display:true,text:'SPX',color:P.a2+'99',font:{family:"'JetBrains Mono',monospace",size:10}}}
        }
      },
      plugins:[{
        id:'regimeBands',
        beforeDraw(chart){
          const {ctx:c,chartArea:{top,bottom,left,right},scales:{x}} = chart;
          D.daily.forEach((d,i)=>{
            const r = d.regime || D.meta.regime;
            const fill = r==='Supportive'?'rgba(16,185,129,0.08)':r==='Restrictive'?'rgba(239,68,68,0.06)':null;
            if(!fill) return;
            const hw = i===0?0:(x.getPixelForValue(1)-x.getPixelForValue(0))/2;
            const x0 = i===0?left:x.getPixelForValue(i)-hw;
            const x1 = i===D.daily.length-1?right:x.getPixelForValue(i)+hw;
            c.fillStyle = fill;
            c.fillRect(x0,top,x1-x0,bottom-top);
          });
        }
      }]
    });
  }
}

// -- Report tab ---------------------------------------------------------------
function md(s){return (s||'').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');}

function renderReport(R){
  const el = document.getElementById('report-content');
  if(!el||!R) return;

  let h = '';

  // Framework
  if(R.framework){
    h += `<div class="rpt" style="border-color:rgba(6,182,212,0.2)">
      <div class="rpt-h2">Framework</div>
      <div class="rpt-p">${md(R.framework)}</div>
    </div>`;
  }

  // Executive Summary
  h += `<div class="rpt" id="rpt-exec">
    <div class="rpt-h2">Executive Summary</div>
    <div class="rpt-p">${md(R.executive_summary)}</div>
  </div>`;

  // What Changed This Week
  h += `<div class="rpt">
    <div class="rpt-h2">What Changed in the Last Week</div>
    <div class="rpt-p">${md(R.what_changed)}</div>
  </div>`;

  // MTD and FYTD Scorecard
  h += `<div class="rpt">
    <div class="rpt-h2">MTD and FYTD Scorecard</div>
    <ul class="rpt-ul">${R.scorecard_items.map(s=>`<li>${md(s)}</li>`).join('')}</ul>
  </div>`;

  // Drivers and Attribution
  h += `<div class="rpt">
    <div class="rpt-h2">Drivers and Attribution</div>
    <div class="rpt-p">${md(R.drivers)}</div>
  </div>`;

  // Key Data Signals
  if(R.signals && R.signals.length){
    h += `<div class="rpt">
      <div class="rpt-h2">Key Data Signals</div>
      ${R.signals.map(s=>`
        <div class="signal-box">
          <div class="signal-title">${s.title}</div>
          <div class="rpt-p" style="margin-bottom:0">${md(s.text)}</div>
        </div>
      `).join('')}
    </div>`;
  }

  // Regime Read and Forward Implications
  h += `<div class="rpt">
    <div class="rpt-h2">Regime Read and Forward Implications</div>
    <div class="rpt-p"><strong>Base case:</strong> ${md(R.base_case)}</div>
    <div class="rpt-p"><strong>Alternative scenario:</strong> ${md(R.alt_scenario)}</div>
    <div class="rpt-p"><strong>Falsification:</strong> ${md(R.falsification)}</div>
    ${R.forward_text?`<div class="rpt-h3">Things to Look Forward To</div><div class="rpt-p">${md(R.forward_text)}</div>`:''}
    ${R.forward_calendar&&R.forward_calendar.length?`
      <div class="rpt-h3">Upcoming Calendar</div>
      <ul class="rpt-ul">${R.forward_calendar.map(c=>`<li>${md(c)}</li>`).join('')}</ul>
    `:''}
  </div>`;

  // Market Mapping Layer
  h += `<div class="rpt" id="rpt-market-map">
    <div class="rpt-h2">Market Mapping Layer</div>
    <div class="rpt-p" style="margin-bottom:12px">Auto-derived from DTS transmission analysis. These are probabilistic biases based on the operational flow of reserves, not predictions. The interest income channel partially offsets any \"restrictive\" fiscal read at current rate levels.</div>
    <table class="rpt-map">
      <thead><tr><th>Asset Bucket</th><th>Probabilistic Bias</th><th>Reasoning</th></tr></thead>
      <tbody>${R.market_map.map(m=>`
        <tr><td>${m.asset}</td><td>${m.bias}</td><td style="color:var(--text-secondary);font-size:var(--type-body-sm)">${m.reason}</td></tr>
      `).join('')}</tbody>
    </table>
  </div>`;

  // ETF Sector Tilts
  if(R.etf_tilts && R.etf_tilts.items && R.etf_tilts.items.length){
    const tiltColor = (t) => t === 'overweight' ? 'var(--green)' : t === 'underweight' ? 'var(--red)' : 'var(--text-secondary)';
    const tiltBadge = (t) => `<span style="color:${tiltColor(t)};font-weight:600">${t.charAt(0).toUpperCase()+t.slice(1)}</span>`;
    const catIcon = (c) => ({'cyclical':'\u{1F4C8}','defensive':'\u{1F6E1}','safe-haven':'\u{1F4B0}','growth':'\u{1F680}','credit':'\u{1F4B3}'}[c]||'');
    const activeItems = R.etf_tilts.items.filter(t => t.tilt !== 'neutral');
    h += `<div class="rpt" id="rpt-etf-tilts">
      <div class="rpt-h2">ETF Sector Tilts</div>
      <div class="rpt-p" style="margin-bottom:12px">${R.etf_tilts.summary||''}</div>
      <table class="rpt-map">
        <thead><tr><th>Ticker</th><th>Name</th><th>Category</th><th>Tilt</th><th>Rationale</th></tr></thead>
        <tbody>${activeItems.map(t=>`
          <tr>
            <td style="font-weight:700;font-family:'JetBrains Mono',monospace">${t.ticker}</td>
            <td>${t.name}</td>
            <td>${catIcon(t.category)} ${t.category}</td>
            <td>${tiltBadge(t.tilt)}</td>
            <td style="color:var(--text-secondary);font-size:var(--type-body-sm)">${t.rationale}</td>
          </tr>
        `).join('')}</tbody>
      </table>
      ${R.etf_tilts.contrarian_watch && R.etf_tilts.contrarian_watch.length ?
        `<div class="rpt-p" style="margin-top:14px"><strong>Contrarian Watchlist:</strong> ${
          R.etf_tilts.contrarian_watch.map(w=>`<span style="font-weight:600">${w.ticker}</span> (${w.rationale})`).join(' · ')
        }</div>` : ''}
    </div>`;
  }

  // Speculative Positioning (COT)
  if(R.cot && R.cot.items && R.cot.items.length){
    const zColor = (z) => z > 1.5 ? 'var(--red)' : z > 1 ? 'var(--yellow)' : z < -1.5 ? 'var(--green)' : z < -1 ? 'var(--blue-bright)' : 'var(--text-secondary)';
    const sigBadge = (sig) => {
      const colors = {'Extreme Long':'var(--red)','Elevated Long':'var(--yellow)','Extreme Short':'var(--green)','Elevated Short':'var(--blue-bright)','Neutral':'var(--text-secondary)'};
      return `<span style="color:${colors[sig]||'var(--text-secondary)'};font-weight:600">${sig}</span>`;
    };
    h += `<div class="rpt" id="rpt-cot">
      <div class="rpt-h2">Speculative Positioning - Contrarian Indicator</div>
      <div class="rpt-p" style="margin-bottom:4px">CFTC Commitment of Traders (Traders in Financial Futures). Leveraged Funds = hedge funds &amp; CTAs - historically wrong at extremes.</div>
      <div class="rpt-p" style="margin-bottom:12px;font-size:var(--type-body-sm);color:var(--text-secondary)">Data as of: ${R.cot.data_date || 'N/A'} · Published weekly on Friday for prior Tuesday positions · Z-score >1.5 or <-1.5 = extreme</div>
      <table class="rpt-map">
        <thead><tr><th>Contract</th><th>Lev Net</th><th>Z-Score</th><th>%ile</th><th>1w Chg</th><th>Signal</th></tr></thead>
        <tbody>${R.cot.items.map(c=>`
          <tr>
            <td>${c.label}</td>
            <td style="font-family:'JetBrains Mono',monospace;font-size:var(--type-body-sm)">${(c.lev_net>0?'+':'')+c.lev_net.toLocaleString()}</td>
            <td style="color:${zColor(c.z_score)};font-weight:700;font-family:'JetBrains Mono',monospace">${c.z_score>0?'+':''}${c.z_score.toFixed(1)}</td>
            <td style="font-size:var(--type-body-sm)">${c.percentile.toFixed(0)}%</td>
            <td style="font-family:'JetBrains Mono',monospace;font-size:var(--type-body-sm);color:${c.weekly_change>0?'var(--green)':'var(--red)'}">${c.weekly_change>0?'+':''}${c.weekly_change.toLocaleString()}</td>
            <td>${sigBadge(c.signal)}</td>
          </tr>
        `).join('')}</tbody>
      </table>
      ${R.cot.narrative ? `<div class="rpt-p" style="margin-top:14px">${md(R.cot.narrative)}</div>` : ''}
    </div>`;
  }

  // Speculative Leverage (FINRA Margin Debt)
  if(R.margin && R.margin.margin_debt_bn != null){
    const M = R.margin;
    const mzColor = (z) => z > 1.5 ? 'var(--red)' : z > 1 ? 'var(--yellow)' : z < -1.5 ? 'var(--green)' : z < -1 ? 'var(--blue-bright)' : 'var(--text-secondary)';
    const mSigBadge = (sig) => {
      const colors = {'Extreme Leverage':'var(--red)','Elevated Leverage':'var(--yellow)','Extreme Deleveraging':'var(--green)','Reduced Leverage':'var(--blue-bright)','Normal':'var(--text-secondary)'};
      return `<span style="color:${colors[sig]||'var(--text-secondary)'};font-weight:600">${sig}</span>`;
    };
    const mFmt = (v,dp=1) => v != null ? (v>0?'+':'')+v.toFixed(dp) : 'N/A';
    h += `<div class="rpt" id="rpt-margin">
      <div class="rpt-h2">Speculative Leverage - FINRA Margin Debt</div>
      <div class="rpt-p" style="margin-bottom:4px">Aggregate debit balances in customer securities margin accounts. Proxy for speculative leverage — historically peaks near market tops.</div>
      <div class="rpt-p" style="margin-bottom:12px;font-size:var(--type-body-sm);color:var(--text-secondary)">Data as of: ${M.month || 'N/A'} · Published monthly ~3rd week of following month · Z-score vs trailing 24 months</div>
      <table class="rpt-map">
        <thead><tr><th>Metric</th><th>Value</th></tr></thead>
        <tbody>
          <tr><td>Margin Debt</td><td style="font-family:'JetBrains Mono',monospace;font-weight:700">$${M.margin_debt_bn.toFixed(1)}bn</td></tr>
          <tr><td>Net Balance (Free Credit − Debt)</td><td style="font-family:'JetBrains Mono',monospace;color:${M.net_margin_balance_bn < 0 ? 'var(--red)' : 'var(--green)'}">$${M.net_margin_balance_bn.toFixed(1)}bn</td></tr>
          <tr><td>Month-over-Month</td><td style="font-family:'JetBrains Mono',monospace;color:${M.mom_change_pct > 0 ? 'var(--red)' : 'var(--green)'}">${mFmt(M.mom_change_pct)}%</td></tr>
          <tr><td>Year-over-Year</td><td style="font-family:'JetBrains Mono',monospace;color:${M.yoy_change_pct > 0 ? 'var(--red)' : 'var(--green)'}">${mFmt(M.yoy_change_pct)}%</td></tr>
          <tr><td>3-Month Trend</td><td style="font-weight:600;color:${M.trend_3m==='Rising'?'var(--red)':M.trend_3m==='Falling'?'var(--green)':'var(--text-secondary)'}">${M.trend_3m}</td></tr>
          <tr><td>Z-Score (24m)</td><td style="color:${mzColor(M.z_score_24m)};font-weight:700;font-family:'JetBrains Mono',monospace">${mFmt(M.z_score_24m,2)}</td></tr>
          <tr><td>Percentile (24m)</td><td style="font-family:'JetBrains Mono',monospace">${M.percentile_24m != null ? M.percentile_24m.toFixed(0) : 'N/A'}%</td></tr>
          <tr><td>Signal</td><td>${mSigBadge(M.signal)}</td></tr>
        </tbody>
      </table>
      ${M.narrative ? `<div class="rpt-p" style="margin-top:14px">${md(M.narrative)}</div>` : ''}
    </div>`;
  }

  // FRED References
  if(R.fred_refs && R.fred_refs.length){
    h += `<div class="rpt" id="rpt-fred">
      <div class="rpt-h2">Suggested FRED Charts</div>
      <div class="rpt-p" style="margin-bottom:12px">Data-conditional references - include in your note where they add context to the current flow picture.</div>
      ${R.fred_refs.map(f=>`
        <a class="rpt-fred" href="${f.url}" target="_blank" rel="noopener">
          <div class="rpt-fred-title">${f.title}</div>
          <div class="rpt-fred-reason">${f.reason}</div>
          <div class="rpt-fred-url">${f.url}</div>
        </a>
      `).join('')}
    </div>`;
  }

  // Risks, Seasonality, and Data Caveats
  h += `<div class="rpt">
    <div class="rpt-h2">Risks, Seasonality, and Data Caveats</div>
    <ul class="rpt-ul">${R.caveats.map(c=>`<li>${c}</li>`).join('')}</ul>
  </div>`;

  el.innerHTML = h;
}

function copyReport(){
  const R = window._reportData;
  if(!R) return;

  // Build plain text version for LinkedIn
  let t = '';

  t += 'Drivers and Attribution\n\n';

  if(R.etf_tilts && R.etf_tilts.items && R.etf_tilts.items.length){

    t += (R.etf_tilts.summary || '') + '\n\n';

  if(R.cot && R.cot.items && R.cot.items.length){

    R.cot.items.forEach(c=>{

    });

  t += 'Risks, Seasonality, and Data Caveats\n\n';
  R.caveats.forEach(c=>{ t += '\u2022 ' + c + '\n'; });

  navigator.clipboard.writeText(t).then(()=>{

// ── Signal Log tab ──────────────────────────────────────────────────────────
function renderSignalLog(entries){
  const el = document.getElementById('signal-log-content');
  if(!el) return;

  if(!entries || entries.length === 0){
    el.innerHTML = `<div class="insight"><strong>No signal data yet.</strong> The signal log starts accumulating after the first daily pipeline run with log_daily_signal.py. Check that run_daily_dts.sh includes the logging step.</div>`;
    return;
  }

  // Sort newest first
  const sorted = [...entries].sort((a,b) => b.date.localeCompare(a.date));

  // Health metrics
  const totalDays = sorted.length;
  const newest = sorted[0].date;
  const oldest = sorted[sorted.length-1].date;

  // US Federal holidays — computed algorithmically for any year
  const usFederalHolidays = (year) => {
    const h = new Set();
    const obs = (m, d) => { // observed date: Mon if Sun, Fri if Sat
      const dt = new Date(year, m, d), dow = dt.getDay();
      if(dow===0) dt.setDate(d+1); else if(dow===6) dt.setDate(d-1);
      h.add(dt.toISOString().slice(0,10));
    };
    const nth = (m, wd, n) => { // nth weekday of month
      const dt = new Date(year, m, 1); let cnt=0;
      while(true){ if(dt.getDay()===wd&&++cnt===n) return dt.toISOString().slice(0,10); dt.setDate(dt.getDate()+1); }
    };
    const last = (m, wd) => { // last weekday of month
      const dt = new Date(year, m+1, 0);
      while(dt.getDay()!==wd) dt.setDate(dt.getDate()-1);
      return dt.toISOString().slice(0,10);
    };
    obs(0,1);           // New Year's Day
    h.add(nth(0,1,3));  // MLK Day (3rd Mon Jan)
    h.add(nth(1,1,3));  // Presidents' Day (3rd Mon Feb)
    h.add(last(4,1));   // Memorial Day (last Mon May)
    obs(5,19);          // Juneteenth
    obs(6,4);           // Independence Day
    h.add(nth(8,1,1));  // Labor Day (1st Mon Sep)
    h.add(nth(9,1,2));  // Columbus Day (2nd Mon Oct)
    obs(10,11);         // Veterans Day
    h.add(nth(10,4,4)); // Thanksgiving (4th Thu Nov)
    obs(11,25);         // Christmas
    return h;
  };

  // Gap detection — find missing business days (excluding weekends + US Federal holidays)
  const dateSet = new Set(sorted.map(e=>e.date));
  const gaps = [];
  if(totalDays > 1){
    const start = new Date(oldest+'T00:00:00');
    const end = new Date(newest+'T00:00:00');
    const usHolidays = new Set();
    for(let y=start.getFullYear(); y<=end.getFullYear(); y++){
      usFederalHolidays(y).forEach(d=>usHolidays.add(d));
    }
    for(let d = new Date(start); d <= end; d.setDate(d.getDate()+1)){
      const dow = d.getDay();
      if(dow===0||dow===6) continue; // skip weekends
      const ds = d.toISOString().slice(0,10);
      if(usHolidays.has(ds)) continue; // skip US Federal holidays
      if(!dateSet.has(ds)) gaps.push(ds);
    }
  }

  // Regime breakdown
  const regimeCounts = {};
  sorted.forEach(e => { regimeCounts[e.regime] = (regimeCounts[e.regime]||0) + 1; });

  // Days until Step 2 threshold
  const daysTo30 = Math.max(0, 30 - totalDays);

  const regimeBadge = (r) => {
    const cls = r==='Supportive'?'sl-sup':r==='Restrictive'?'sl-res':'sl-neu';
    return `<span class="sl-badge ${cls}">${r}</span>`;
  };

  const zClr = (z) => {
    if(z===null||z===undefined) return 'var(--text-dim)';
    if(z > 1.5) return '#ef4444';
    if(z > 1.0) return '#f59e0b';
    if(z < -1.5) return '#10b981';
    if(z < -1.0) return '#60a5fa';
    return 'var(--text-secondary)';
  };

  const fmtZ = (z) => {
    if(z===null||z===undefined) return '—';
    return (z>=0?'+':'')+z.toFixed(1);
  };

  let h = '';

  // Health cards
  h += `<div class="sl-health">
    <div class="card">
      <div class="card-label mono">Days Logged</div>
      <div class="card-value mono" style="color:${totalDays>=30?P.pos:P.a2}">${totalDays}</div>
      <div class="card-change mono" style="color:${daysTo30>0?'var(--yellow)':'var(--green)'}">${daysTo30>0?daysTo30+' to Step 2':'✓ Ready for Step 2'}</div>
    </div>
    <div class="card">
      <div class="card-label mono">Latest Entry</div>
      <div class="card-value mono">${newest}</div>
      <div class="card-change mono" style="color:var(--text-secondary)">Oldest: ${oldest}</div>
    </div>
    <div class="card">
      <div class="card-label mono">Gaps Detected</div>
      <div class="card-value mono" style="color:${gaps.length>0?P.neg:P.pos}">${gaps.length}</div>
      <div class="card-change mono" style="color:${gaps.length>0?'var(--red)':'var(--green)'}">${gaps.length>0?'Missing business days':'No gaps'}</div>
    </div>
    <div class="card">
      <div class="card-label mono">Regime Split</div>
      <div style="display:flex;flex-direction:column;gap:4px;font-size:var(--type-body)">${['Restrictive','Supportive','Neutral'].filter(r=>regimeCounts[r]).map(r=>`<div>${regimeBadge(r)} ${regimeCounts[r]}</div>`).join('')}</div>
    </div>
  </div>`;

  // Gap warning — collapsible chips with search links
  if(gaps.length > 0){
    const gapChips = gaps.map(d => {
      const q = encodeURIComponent(`US Treasury closed ${d} federal holiday`);
      return `<a class="sl-gap-chip" href="https://www.google.com/search?q=${q}" target="_blank" rel="noopener" title="Search why ${d} is missing">${d}</a>`;
    }).join('');
    h += `<div class="sl-gap">
      <span class="sl-gap-toggle" onclick="this.classList.toggle('open');this.nextElementSibling.classList.toggle('open')">
        <span class="sl-gap-arrow">▶</span>
        <span class="sl-gap-count">${gaps.length}</span> missing business days — click dates to search why
      </span>
      <div class="sl-gap-chips">${gapChips}</div>
    </div>`;
  }

  // Table
  h += `<div class="sl-wrap"><table class="sl-table">
    <thead><tr>
      <th>Date</th><th>Regime</th><th>Momentum</th>
      <th>TGA ($bn)</th><th>TGA Trend</th>
      <th>5d Inj ($M)</th><th>20d Inj ($M)</th>
      <th>Eq Bias</th><th>USD Bias</th>
      <th>SPX z</th><th>10Y z</th><th>2Y z</th><th>VIX z</th>
    </tr></thead>
    <tbody>`;

  sorted.forEach(e => {
    h += `<tr>
      <td style="color:var(--text-primary);font-weight:600">${e.date}</td>
      <td>${regimeBadge(e.regime)}</td>
      <td style="color:${e.regime_momentum==='Accelerating'?P.pos:e.regime_momentum==='Decelerating'?P.neg:P.muted}">${e.regime_momentum}</td>
      <td>${e.tga_level!==null?e.tga_level.toFixed(0):'—'}</td>
      <td style="color:${e.tga_trend==='Building'?P.neg:e.tga_trend==='Drawing'?P.pos:P.muted}">${e.tga_trend}</td>
      <td style="color:${(e.net_fiscal_injection_5d||0)>=0?P.pos:P.neg}">${e.net_fiscal_injection_5d!==null?e.net_fiscal_injection_5d.toLocaleString():'—'}</td>
      <td>${e.net_fiscal_injection_20d!==null?e.net_fiscal_injection_20d.toLocaleString():'—'}</td>
      <td style="font-size:var(--type-caption)">${e.market_map_equities||'—'}</td>
      <td style="font-size:var(--type-caption)">${e.market_map_usd||'—'}</td>
      <td style="color:${zClr(e.cot_sp500_zscore)};font-weight:700">${fmtZ(e.cot_sp500_zscore)}</td>
      <td style="color:${zClr(e.cot_10y_zscore)};font-weight:700">${fmtZ(e.cot_10y_zscore)}</td>
      <td style="color:${zClr(e.cot_2y_zscore)};font-weight:700">${fmtZ(e.cot_2y_zscore)}</td>
      <td style="color:${zClr(e.cot_vix_zscore)};font-weight:700">${fmtZ(e.cot_vix_zscore)}</td>
    </tr>`;
  });

  h += `</tbody></table></div>`;

  el.innerHTML = h;
}

// ── Return Attribution ─────────────────────────────────────────────────────
function renderReturnAttribution(data){
  const el = document.getElementById('return-attribution-content');
  if(!el) return;

  if(!data || !data.summary){
    el.innerHTML = '';
    return;
  }

  const S = data.summary;
  const scored = data.scored_signals || 0;
  const total = data.total_signals || 0;

  const fmtHr = (hr) => {
    if(!hr || hr.rate===null || hr.rate===undefined) return `<span class="rt-pending">pending</span>`;
    const clr = hr.rate >= 60 ? P.pos : hr.rate < 40 ? P.neg : P.muted;
    return `<span style="color:${clr};font-weight:700">${hr.rate.toFixed(0)}%</span> <span style="color:var(--text-dim);font-size:var(--type-caption)">(${hr.hits}/${hr.total})</span>`;
  };

  const fmtRet = (v, suffix='%') => {
    if(v===null||v===undefined) return `<span class="rt-pending">pending</span>`;
    const clr = v >= 0 ? P.pos : P.neg;
    return `<span style="color:${clr}">${v>=0?'+':''}${v.toFixed(2)}${suffix}</span>`;
  };

  let h = '';

  // Scoring progress
  h += `<div class="sl-section">
    <div class="sl-section-title">Return Attribution</div>
    <div class="sl-section-sub">Forward returns scored against each logged signal. Updated daily as new market closes arrive. Computed at: ${data.computed_at||'—'}</div>
  </div>`;

  h += `<div class="sl-health" style="margin-bottom:20px">
    <div class="card">
      <div class="card-label mono">Signals Scored (5d)</div>
      <div class="card-value mono" style="color:${scored>0?P.pos:P.a2}">${scored}/${total}</div>
      <div class="card-change mono" style="color:var(--text-secondary)">${total-scored} awaiting forward data</div>
    </div>
  </div>`;

  // Regime performance table
  const regimes = S.regime_performance || {};
  if(Object.keys(regimes).length > 0){
    h += `<div class="sl-section" style="margin-top:16px">
      <div class="sl-section-title">Regime → SPX Performance</div>
      <div class="sl-section-sub">When the pipeline called Supportive, did SPX go up? When Restrictive, did it go down?</div>
      <table class="rt-table">
        <thead><tr><th>Regime</th><th>Count</th><th>5d Avg</th><th>5d Hit</th><th>10d Avg</th><th>10d Hit</th><th>20d Avg</th><th>20d Hit</th></tr></thead>
        <tbody>`;

    for(const regime of ['Supportive','Neutral','Restrictive']){
      const p = regimes[regime];
      if(!p) continue;
      const badge = regime==='Supportive'?'sl-sup':regime==='Restrictive'?'sl-res':'sl-neu';
      h += `<tr>
        <td><span class="sl-badge ${badge}">${regime}</span> <span style="color:var(--text-dim);font-size:var(--type-body-sm)">(${p.count})</span></td>
        <td class="mono">${p.count}</td>
        <td>${fmtRet(p.avg_spx_5d)}</td><td>${fmtHr(p.hit_rate_5d)}</td>
        <td>${fmtRet(p.avg_spx_10d)}</td><td>${fmtHr(p.hit_rate_10d)}</td>
        <td>${fmtRet(p.avg_spx_20d)}</td><td>${fmtHr(p.hit_rate_20d)}</td>
      </tr>`;
    }
    h += `</tbody></table></div>`;
  }

  // Market map performance
  const maps = S.market_map_performance || {};
  if(Object.keys(maps).length > 0){
    const mapLabels = {equities:'Equities',usd:'USD',front_end:'Front-End Rates',term_premium:'Term Premium'};
    h += `<div class="sl-section" style="margin-top:24px">
      <div class="sl-section-title">Market Map Directional Calls</div>
      <div class="sl-section-sub">Hit rate when the pipeline made a directional bias call (excludes Neutral)</div>
      <table class="rt-table">
        <thead><tr><th>Asset</th><th>Directional Calls</th><th>5d Hit</th><th>10d Hit</th><th>20d Hit</th></tr></thead>
        <tbody>`;
    for(const [key, p] of Object.entries(maps)){
      h += `<tr>
        <td>${mapLabels[key]||key}</td>
        <td class="mono">${p.count}</td>
        <td>${fmtHr(p.hit_rate_5d)}</td>
        <td>${fmtHr(p.hit_rate_10d)}</td>
        <td>${fmtHr(p.hit_rate_20d)}</td>
      </tr>`;
    }
    h += `</tbody></table></div>`;
  }

  // COT contrarian performance
  const cots = S.cot_performance || {};
  if(Object.keys(cots).length > 0){
    h += `<div class="sl-section" style="margin-top:24px">
      <div class="sl-section-title">COT Contrarian Signals</div>
      <div class="sl-section-sub">Returns when leveraged funds hit extreme positioning (z-score ±1.5)</div>
      <table class="rt-table">
        <thead><tr><th>Contract / Signal</th><th>Count</th><th>5d Avg</th><th>5d Hit</th><th>10d Avg</th><th>10d Hit</th><th>20d Avg</th><th>20d Hit</th></tr></thead>
        <tbody>`;
    for(const [label, p] of Object.entries(cots)){
      const dispLabel = label.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
      h += `<tr>
        <td>${dispLabel} <span style="color:var(--text-dim);font-size:var(--type-caption)">(${p.signal})</span></td>
        <td class="mono">${p.count}</td>
        <td>${fmtRet(p.avg_ret_5d,'')}</td><td>${fmtHr(p.hit_rate_5d)}</td>
        <td>${fmtRet(p.avg_ret_10d,'')}</td><td>${fmtHr(p.hit_rate_10d)}</td>
        <td>${fmtRet(p.avg_ret_20d,'')}</td><td>${fmtHr(p.hit_rate_20d)}</td>
      </tr>`;
    }
    h += `</tbody></table></div>`;
  }

  // Combined performance
  const combined = S.combined_performance || {};
  if(Object.keys(combined).length > 0){
    h += `<div class="sl-section" style="margin-top:24px">
      <div class="sl-section-title">Combined Regime + COT (Premium Signals)</div>
      <div class="sl-section-sub">Highest conviction: fiscal regime AND contrarian positioning aligned</div>
      <table class="rt-table">
        <thead><tr><th>Setup</th><th>Count</th><th>5d Avg</th><th>5d Hit</th><th>10d Avg</th><th>10d Hit</th><th>20d Avg</th><th>20d Hit</th></tr></thead>
        <tbody>`;
    for(const [label, p] of Object.entries(combined)){
      h += `<tr>
        <td>${label}</td>
        <td class="mono">${p.count}</td>
        <td>${fmtRet(p.avg_spx_5d)}</td><td>${fmtHr(p.hit_rate_5d)}</td>
        <td>${fmtRet(p.avg_spx_10d)}</td><td>${fmtHr(p.hit_rate_10d)}</td>
        <td>${fmtRet(p.avg_spx_20d)}</td><td>${fmtHr(p.hit_rate_20d)}</td>
      </tr>`;
    }
    h += `</tbody></table></div>`;
  }

  // VIX-bucketed performance
  const vb = S.vix_bucketed || {};
  if(vb.labels && vb.buckets && vb.signals){
    const labels = vb.labels;
    const bk = vb.buckets;
    const sigs = vb.signals;

    // Bucket header with VIX ranges
    let bucketDesc = labels.map(l => {
      const b = bk[l];
      return b ? `${l.replace('_',' ')}: VIX ${b.vix_min}-${b.vix_max} (n=${b.count})` : l;
    }).join(' | ');

    h += `<div class="sl-section" style="margin-top:24px">
      <div class="sl-section-title">Signal Performance by VIX Environment</div>
      <div class="sl-section-sub">Same signals sliced by volatility regime at signal date. Expanding percentile buckets (no lookahead). ${bucketDesc}</div>`;

    // SPX direction table
    h += `<table class="rt-table" style="margin-top:12px">
      <thead><tr><th>Signal</th>`;
    for(const l of labels){
      const b = bk[l];
      h += `<th colspan="2">${l.replace('_',' ')} (VIX ~${b?b.vix_median:'?'})</th>`;
    }
    h += `</tr><tr><th></th>`;
    for(const l of labels){
      h += `<th>Hit Rate</th><th>Avg SPX</th>`;
    }
    h += `</tr></thead><tbody>`;

    // Row: SPX direction (unconditional)
    const spxd = sigs.spx_direction || {};
    for(const horizon of ['5d','10d','20d']){
      h += `<tr><td>SPX up (${horizon})</td>`;
      for(const l of labels){
        const d = spxd[l] || {};
        const rate = d[`spx_up_rate_${horizon}`];
        const avg = d[`avg_spx_${horizon}`];
        const n = d[`n_${horizon}`] || 0;
        if(rate !== null && rate !== undefined){
          const clr = rate >= 60 ? P.pos : rate < 40 ? P.neg : P.muted;
          h += `<td><span style="color:${clr};font-weight:700">${rate.toFixed(0)}%</span> <span style="color:var(--text-dim);font-size:var(--type-caption)">(${n})</span></td>`;
        } else {
          h += `<td class="rt-pending">pending</td>`;
        }
        h += `<td>${fmtRet(avg)}</td>`;
      }
      h += `</tr>`;
    }

    // Row: Tech bullish
    const tb = sigs.tech_bullish || {};
    for(const horizon of ['5d','10d','20d']){
      h += `<tr><td>Tech bullish (${horizon})</td>`;
      for(const l of labels){
        const d = tb[l] || {};
        const hr = d[`hit_rate_${horizon}`];
        const avg = d[`avg_spx_${horizon}`];
        h += `<td>${fmtHr(hr)}</td><td>${fmtRet(avg)}</td>`;
      }
      h += `</tr>`;
    }

    // Row: Tech bearish
    const tbr = sigs.tech_bearish || {};
    for(const horizon of ['5d','10d','20d']){
      h += `<tr><td>Tech bearish (${horizon})</td>`;
      for(const l of labels){
        const d = tbr[l] || {};
        const hr = d[`hit_rate_${horizon}`];
        const avg = d[`avg_spx_${horizon}`];
        h += `<td>${fmtHr(hr)}</td><td>${fmtRet(avg)}</td>`;
      }
      h += `</tr>`;
    }

    // Row: COT crowd short
    const cs = sigs.cot_crowd_short || {};
    for(const horizon of ['5d','10d','20d']){
      h += `<tr><td>COT crowd short (${horizon})</td>`;
      for(const l of labels){
        const d = cs[l] || {};
        const hr = d[`hit_rate_${horizon}`];
        const avg = d[`avg_spx_${horizon}`];
        h += `<td>${fmtHr(hr)}</td><td>${fmtRet(avg)}</td>`;
      }
      h += `</tr>`;
    }

    h += `</tbody></table></div>`;
  }

  // Empty state hint
  if(scored === 0){
    h += `<div class="insight" style="margin-top:16px">
      <strong>All returns pending.</strong> Forward returns fill in as trading days pass — 5d returns will appear first (after ~1 week of logging), then 10d and 20d. The FRED cache updates daily. Check back in a few days.
    </div>`;
  }

  el.innerHTML = h;
}

function renderTechnicals(techData){

  const insightEl = document.getElementById('tech-insight');
  if(!canvas || !techData || !techData.data || techData.data.length===0){
    if(insightEl) insightEl.innerHTML = '<strong>No technicals data.</strong> Run <code>python generate_technicals.py</code> to create technicals_data.json.';
    return;
  }

  const data = techData.data;
  const n = data.length;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;

  // Dimensions from parent container
  const rect = canvas.parentElement.getBoundingClientRect();
  const W = rect.width;
  const H = rect.height;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.scale(dpr, dpr);

  const mTop = 16, mBot = 36, mLeft = 60, mRight = 16;
  const cW = W - mLeft - mRight;
  const cH = H - mTop - mBot;

  // Price range with 3% padding
  let pMax = -Infinity, pMin = Infinity;
  data.forEach(d => { if(d.high > pMax) pMax = d.high; if(d.low < pMin) pMin = d.low; });
  const pad = (pMax - pMin) * 0.03;
  const yMax = pMax + pad, yMin = pMin - pad;
  const toY = p => mTop + cH * (1 - (p - yMin) / (yMax - yMin));

  // Candle geometry
  const slotW = cW / n;
  const bodyW = Math.max(1, Math.floor(slotW * 0.65));
  const toX = i => mLeft + slotW * i + slotW / 2;

  // Regime colors: Green=Bullish, Red=Bearish, Blue=Neutral
  const regClr = { bullish: '#10b981', bearish: '#ef4444', neutral: '#06b6d4' };

  // Date label spacing
  const labelStep = Math.max(1, Math.floor(n / 10));

  // ── Draw function (called for initial render + crosshair restore) ──
  function drawChart(){
    ctx.clearRect(0, 0, W, H);

    // Grid lines + y-axis price labels
    const nGrid = 6;
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';
    ctx.font = '11px "JetBrains Mono", monospace';
    for(let i = 0; i <= nGrid; i++){
      const price = yMin + (yMax - yMin) * i / nGrid;
      const y = toY(price);
      ctx.strokeStyle = 'rgba(255,255,255,0.06)';
      ctx.lineWidth = 1;
      ctx.setLineDash([]);
      ctx.beginPath(); ctx.moveTo(mLeft, y); ctx.lineTo(W - mRight, y); ctx.stroke();
      ctx.fillStyle = '#94A3B8';
      ctx.fillText(Math.round(price).toString(), mLeft - 8, y);
    }

    // Candles
    for(let i = 0; i < n; i++){
      const d = data[i];
      const x = toX(i);
      const color = regClr[d.regime] || regClr.neutral;

      // Wick
      ctx.strokeStyle = color;
      ctx.lineWidth = 1;
      ctx.setLineDash([]);
      ctx.beginPath(); ctx.moveTo(x, toY(d.high)); ctx.lineTo(x, toY(d.low)); ctx.stroke();

      // Body
      const bTop = toY(Math.max(d.open, d.close));
      const bBot = toY(Math.min(d.open, d.close));
      ctx.fillStyle = color;
      ctx.fillRect(x - bodyW / 2, bTop, bodyW, Math.max(1, bBot - bTop));
    }

    // SMA(20) line
    ctx.strokeStyle = '#f59e0b';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([]);
    ctx.beginPath();
    let started = false;
    for(let i = 0; i < n; i++){
      if(data[i].sma !== null){
        const x = toX(i);
        const y = toY(data[i].sma);
        if(!started){ ctx.moveTo(x, y); started = true; } else ctx.lineTo(x, y);
      }
    }
    ctx.stroke();

    // X-axis date labels
    ctx.fillStyle = '#94A3B8';
    ctx.font = '10px "JetBrains Mono", monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    for(let i = 0; i < n; i += labelStep){
      ctx.fillText(data[i].date.slice(5), toX(i), H - mBot + 8);
    }
  }

  // Initial draw
  drawChart();

  // Save rendered chart for fast crosshair restore
  const chartImg = ctx.getImageData(0, 0, canvas.width, canvas.height);

  // ── Tooltip + crosshair ──
  let tooltipDiv = canvas.parentElement.querySelector('.tech-tooltip');
  if(!tooltipDiv){
    tooltipDiv = document.createElement('div');
    tooltipDiv.className = 'tech-tooltip';
    canvas.parentElement.appendChild(tooltipDiv);
  }

  let lastIdx = -1;

  canvas.onmousemove = function(e){
    const r = canvas.getBoundingClientRect();
    const mx = e.clientX - r.left;
    const my = e.clientY - r.top;

    const idx = Math.floor((mx - mLeft) / slotW);
    if(idx < 0 || idx >= n || mx < mLeft || mx > W - mRight || my < mTop || my > H - mBot){
      tooltipDiv.style.display = 'none';
      if(lastIdx >= 0){ ctx.putImageData(chartImg, 0, 0); lastIdx = -1; }
      return;
    }

    if(idx !== lastIdx){
      lastIdx = idx;
      const d = data[idx];
      const chg = d.close - d.open;
      const chgPct = ((chg / d.open) * 100).toFixed(2);
      const regLabel = d.regime.charAt(0).toUpperCase() + d.regime.slice(1);
      const regColor = regClr[d.regime] || regClr.neutral;

      tooltipDiv.innerHTML =
        `<div class="tt-date">${d.date}</div>` +
        `<div class="tt-row"><span class="tt-label">O</span> <span>${d.open.toFixed(2)}</span></div>` +
        `<div class="tt-row"><span class="tt-label">H</span> <span>${d.high.toFixed(2)}</span></div>` +
        `<div class="tt-row"><span class="tt-label">L</span> <span>${d.low.toFixed(2)}</span></div>` +
        `<div class="tt-row"><span class="tt-label">C</span> <span style="color:${chg >= 0 ? P.pos : P.neg}">${d.close.toFixed(2)} (${chg >= 0 ? '+' : ''}${chgPct}%)</span></div>` +
        (d.sma !== null ? `<div class="tt-row"><span class="tt-label">SMA</span> <span style="color:#f59e0b">${d.sma.toFixed(2)}</span></div>` : '') +
        `<div class="tt-row"><span class="tt-label">Regime</span> <span style="color:${regColor};font-weight:700">${regLabel}</span></div>`;
      tooltipDiv.style.display = 'block';

      // Position tooltip — flip if near right edge
      const ttW = tooltipDiv.offsetWidth;
      let tx = toX(idx) + 12;
      if(tx + ttW > W - 10) tx = toX(idx) - ttW - 12;
      tooltipDiv.style.left = tx + 'px';
      tooltipDiv.style.top = Math.max(0, my - 60) + 'px';
    }

    // Restore chart image and draw crosshair
    ctx.putImageData(chartImg, 0, 0);
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    // Crosshair uses CSS-pixel coords (transform still active)
    const cx = toX(lastIdx);
    ctx.beginPath(); ctx.moveTo(cx, mTop); ctx.lineTo(cx, H - mBot); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(mLeft, my); ctx.lineTo(W - mRight, my); ctx.stroke();
    ctx.restore();
  };

  canvas.onmouseleave = function(){
    tooltipDiv.style.display = 'none';
    if(lastIdx >= 0){ ctx.putImageData(chartImg, 0, 0); lastIdx = -1; }
  };

  // ── Insight box ──
  if(insightEl){
    const latest = data[n - 1];
    const regLabel = latest.regime.charAt(0).toUpperCase() + latest.regime.slice(1);
    const regColor = regClr[latest.regime];

    // Streak count
    let streak = 1;
    for(let i = n - 2; i >= 0; i--){
      if(data[i].regime === latest.regime) streak++; else break;
    }

    // Last regime transition
    let transDate = null, transFrom = null, transTo = null;
    for(let i = n - 1; i > 0; i--){
      if(data[i].regime !== data[i - 1].regime){
        transDate = data[i].date;
        transFrom = data[i - 1].regime.charAt(0).toUpperCase() + data[i - 1].regime.slice(1);
        transTo = data[i].regime.charAt(0).toUpperCase() + data[i].regime.slice(1);
        break;
      }
    }

    // Regime breakdown
    const counts = { bullish: 0, bearish: 0 };
    data.forEach(d => { if(counts[d.regime] !== undefined) counts[d.regime]++; });

    let txt = `<strong style="color:${regColor}">Current: ${regLabel}</strong> — ${streak} consecutive day${streak > 1 ? 's' : ''}.`;
    if(transDate) txt += ` Last transition: ${transFrom} &rarr; ${transTo} on ${transDate}.`;
    txt += `<br/>${techData.lookback_days}-day breakdown: <span style="color:#10b981">${counts.bullish} bullish</span>, <span style="color:#ef4444">${counts.bearish} bearish</span>.`;
    if(latest.sma !== null){
      const diff = latest.close - latest.sma;
      txt += ` Close ${diff >= 0 ? 'above' : 'below'} SMA(20) by <span class="mono">${Math.abs(diff).toFixed(1)} pts</span>.`;
    }
    txt += `<br/>Generated: ${techData.generated_at || 'unknown'}.`;
    insightEl.innerHTML = txt;
  }
}

// Quick net-expectancy calc for a trade idea at given capital (no HTML)
function calcExpectedNet(idea, capital) {
  capital = capital || 3000;
  var marginUse = 0.60;
  var marginAvail = capital * marginUse;
  var num = idea.pair.numerator, den = idea.pair.denominator;
  var numProxy = STOCK_PROXY[num], denProxy = STOCK_PROXY[den];
  var numInfo = numProxy
    ? {spread:numProxy.spread, pts:numProxy.pts, margin:numProxy.margin}
    : (IG_ETF_INFO[num] || {spread:0.0015, pts:10000, margin:0.20});
  var denInfo = denProxy
    ? {spread:denProxy.spread, pts:denProxy.pts, margin:denProxy.margin}
    : (IG_ETF_INFO[den] || {spread:0.0015, pts:10000, margin:0.20});
  var MIN_STAKE = 0.24;
  var numMinExposure = numInfo.pts * MIN_STAKE;
  var denMinExposure = denInfo.pts * MIN_STAKE;
  var totalMinMargin = numMinExposure * (numInfo.margin||0.20) + denMinExposure * (denInfo.margin||0.20);
  var scaleFactor = (totalMinMargin > 0) ? Math.max(1, marginAvail / totalMinMargin) : 1;
  if (marginAvail < totalMinMargin) scaleFactor = 1;
  var numStake = Math.floor(MIN_STAKE * scaleFactor * 100) / 100;
  var denStake = Math.floor(MIN_STAKE * scaleFactor * 100) / 100;
  if (numStake < MIN_STAKE) numStake = MIN_STAKE;
  if (denStake < MIN_STAKE) denStake = MIN_STAKE;
  var numExposure = numInfo.pts * numStake;
  var denExposure = denInfo.pts * denStake;
  var totalSpreadCost = (numStake * numInfo.pts * numInfo.spread * 2) + (denStake * denInfo.pts * denInfo.spread * 2);
  var carryCost = (numExposure + denExposure) * IG_COSTS.carry_daily * idea.horizon;
  var totalCost = totalSpreadCost + carryCost;
  var expectedGross = ((numExposure + denExposure) / 2) * (idea.mean / 100);
  return expectedGross - totalCost;
}

function getTradeIdea(pair) {
  const sig = pair.signal || '';
  const isLongNum = sig.includes('Overweight') || sig.includes('Numerator favored');
  const isShortNum = sig.includes('Underweight') || sig.includes('Denominator favored');
  const dir = isLongNum ? 'long_num' : isShortNum ? 'short_num' : null;
  if (!dir) return null;
  const key = pair.name + '|' + dir;
  const idea = TRADE_IDEAS[key];
  if (!idea) return null;
  const numBlock = STOCK_PROXY[pair.numerator] ? null : IG_UNAVAIL[pair.numerator];
  const denBlock = STOCK_PROXY[pair.denominator] ? null : IG_UNAVAIL[pair.denominator];
  return {...idea, dir, numBlock, denBlock, pair};
}

function buildTradePanel(idea, capital) {
  capital = capital || 2993;
  const marginUse = 0.60;
  const marginAvail = capital * marginUse;

  var num = idea.pair.numerator, den = idea.pair.denominator;
  // Use stock proxy if available, otherwise fall back to index/commodity instrument
  var numProxy = STOCK_PROXY[num];
  var denProxy = STOCK_PROXY[den];
  var numTicker = numProxy ? numProxy.ticker : num;
  var denTicker = denProxy ? denProxy.ticker : den;
  var numInfo = numProxy
    ? {cls:'US Stock',spread:numProxy.spread,ig:numProxy.name,igCode:numProxy.ticker,pts:numProxy.pts,margin:numProxy.margin}
    : (IG_ETF_INFO[num] || {cls:'US Other',spread:0.0015,pts:10000,margin:0.20,ig:num,igCode:num});
  var denInfo = denProxy
    ? {cls:'US Stock',spread:denProxy.spread,ig:denProxy.name,igCode:denProxy.ticker,pts:denProxy.pts,margin:denProxy.margin}
    : (IG_ETF_INFO[den] || {cls:'US Other',spread:0.0015,pts:10000,margin:0.20,ig:den,igCode:den});

  // ── Sizing from IG minimum stake (0.24 £/pt) ──
  var MIN_STAKE = 0.24;
  var numMarginRate = numInfo.margin || 0.20;
  var denMarginRate = denInfo.margin || 0.20;
  var numPricePts = numInfo.pts;
  var denPricePts = denInfo.pts;

  // Minimum margin needed at 0.24/pt per leg
  // exposure = price (pts) * stake (£/pt)
  var numMinExposure = numPricePts * MIN_STAKE;
  var denMinExposure = denPricePts * MIN_STAKE;
  var numMinMargin = numMinExposure * numMarginRate;
  var denMinMargin = denMinExposure * denMarginRate;
  var totalMinMargin = numMinMargin + denMinMargin;
  var minCapital = Math.ceil(totalMinMargin / marginUse);

  // Scale up from minimum if capital allows
  var scaleFactor = (totalMinMargin > 0) ? Math.max(1, marginAvail / totalMinMargin) : 1;
  var insufficientCapital = marginAvail < totalMinMargin;
  if (insufficientCapital) scaleFactor = 1; // show minimum stakes even if over budget

  var numStake = Math.floor(MIN_STAKE * scaleFactor * 100) / 100;
  var denStake = Math.floor(MIN_STAKE * scaleFactor * 100) / 100;
  if (numStake < MIN_STAKE) numStake = MIN_STAKE;
  if (denStake < MIN_STAKE) denStake = MIN_STAKE;

  var numExposure = numPricePts * numStake;
  var denExposure = denPricePts * denStake;

  // Use IG prices (points) for stake calc, yfinance USD for display
  var numPriceUSD = numProxy ? (numInfo.pts / 100) : (ETF_PRICES_USD[num] || (numInfo.pts / 100));
  var denPriceUSD = denProxy ? (denInfo.pts / 100) : (ETF_PRICES_USD[den] || (denInfo.pts / 100));

  // Spread cost per leg: stake (£/pt) * spread (pts) * 2 (round-trip)
  var numSpreadPts = numPricePts * numInfo.spread;
  var denSpreadPts = denPricePts * denInfo.spread;
  var numSpreadCost = numStake * numSpreadPts * 2;
  var denSpreadCost = denStake * denSpreadPts * 2;
  var totalSpreadCost = numSpreadCost + denSpreadCost;

  var carryCost = (numExposure + denExposure) * IG_COSTS.carry_daily * idea.horizon;
  var totalCost = totalSpreadCost + carryCost;
  var expectedGross = ((numExposure + denExposure) / 2) * (idea.mean / 100);
  var expectedNet = expectedGross - totalCost;
  var actualMarginUsed = numExposure * numMarginRate + denExposure * denMarginRate;
  var freeMargin = capital - actualMarginUsed;
  var totalExposure = numExposure + denExposure;
  var bufferPct = freeMargin > 0 ? (freeMargin / totalExposure * 100).toFixed(1) : '0';

  var numDir, denDir;
  if (idea.dir === 'long_num') { numDir = 'Long'; denDir = 'Short'; }
  else { numDir = 'Short'; denDir = 'Long'; }

  var blocked = '';
  if (idea.numBlock) blocked += '<div style="color:#ef4444;font-size:var(--type-caption);margin-top:6px">' + num + ' (' + numTicker + '): ' + idea.numBlock + '</div>';
  if (idea.denBlock) blocked += '<div style="color:#ef4444;font-size:var(--type-caption);margin-top:6px">' + den + ' (' + denTicker + '): ' + idea.denBlock + '</div>';

  var negBanner = expectedNet <= 0
    ? '<div style="background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.3);border-radius:6px;padding:8px 12px;margin-bottom:10px;font-size:var(--type-body-sm);color:#ef4444;font-weight:600">NEGATIVE EXPECTANCY — costs (\u00A3' + totalCost.toFixed(0) + ') exceed expected gross P&L (\u00A3' + expectedGross.toFixed(0) + '). Not tradeable at this stake.</div>'
    : '';

  return negBanner + '<div class="tp-grid">'
    + '<div class="tp-section">'
    + '<div class="tp-label">Trade Structure</div>'
    + '<div class="tp-row"><span>Direction</span><span class="tp-val">' + numDir + ' ' + numTicker + (numProxy ? ' <span style="color:var(--text-dim)">(' + num + ')</span>' : '') + ' / ' + denDir + ' ' + denTicker + (denProxy ? ' <span style="color:var(--text-dim)">(' + den + ')</span>' : '') + '</span></div>'
    + '<div class="tp-row"><span>IG instruments</span><span class="tp-val">' + numInfo.igCode + (numProxy ? ' <span style="color:var(--text-dim)">' + numProxy.name + '</span>' : '') + ' / ' + denInfo.igCode + (denProxy ? ' <span style="color:var(--text-dim)">' + denProxy.name + '</span>' : '') + '</span></div>'
    + '<div class="tp-row"><span>Hold period</span><span class="tp-val">' + idea.horizon + ' trading days</span></div>'
    + '<div class="tp-row"><span>Backtest mean return</span><span class="tp-val" style="color:#10b981">+' + idea.mean.toFixed(2) + '%</span></div>'
    + '<div class="tp-row"><span>Backtest hit rate</span><span class="tp-val">' + idea.hit.toFixed(1) + '%</span></div>'
    + '<div class="tp-note">' + idea.note + '</div>'
    + blocked
    + '</div>'
    + '<div class="tp-section">'
    + '<div class="tp-label">IG Spread Bet Ticket' + (insufficientCapital ? ' <span style="color:#ef4444">— needs \u00A3' + minCapital.toLocaleString() + '+ capital</span>' : ' (\u00A3' + capital.toLocaleString() + ' capital)') + '</div>'
    + '<div class="tp-row" style="margin-bottom:6px"><span>Min account balance (0.24/pt both legs, 60% margin use)</span><span class="tp-val' + (insufficientCapital ? '" style="color:#ef4444"' : '"') + '>\u00A3' + minCapital.toLocaleString() + '</span></div>'
    + '<table style="width:100%;border-collapse:collapse;font-size:var(--type-body-sm);margin-bottom:8px">'
    + '<thead><tr style="border-bottom:1px solid rgba(255,255,255,0.1)">'
    + '<th style="text-align:left;padding:4px 0;color:var(--text-secondary);font-size:var(--type-caption)">LEG</th>'
    + '<th style="text-align:left;padding:4px 0;color:var(--text-secondary);font-size:var(--type-caption)">DIR</th>'

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>DTS Flow-of-Funds Dashboard</title>
<link rel="stylesheet" href="rfa-design-system.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
/* ── Page-specific overrides (DTS Dashboard) ── */

/* Header — matches RFA header pattern */
.dts-header{position:relative;padding:var(--sp-10) 0 var(--sp-8);margin-bottom:var(--sp-8);border-bottom:1px solid var(--border);overflow:hidden;background:radial-gradient(circle at 10% 80%,rgba(6,182,212,0.08),transparent 40%),radial-gradient(circle at 90% 20%,rgba(59,130,246,0.06),transparent 40%);text-align:center}
.dts-header::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:0.5}
.cat{font-size:var(--type-caption);color:var(--accent);text-transform:uppercase;letter-spacing:3px;margin-bottom:var(--sp-2)}
h1{font-family:var(--font-heading);font-size:var(--text-3xl);font-weight:800;letter-spacing:-1px;background:linear-gradient(135deg,#fff 30%,var(--text-secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:var(--sp-1)}
.subtitle{font-size:var(--type-body);color:var(--text-secondary);margin-bottom:0;font-family:var(--font-mono)}

/* Cards grid */
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:var(--sp-4);margin-bottom:var(--sp-8)}
.cards .card{text-align:center}
.cards .card{padding:var(--sp-6) var(--sp-5)}

/* Toggle buttons — alias to design system btn/btn-group */
.toggles{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:24px}
.tbtn{padding:var(--sp-2) var(--sp-5);border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg-surface);color:var(--text-secondary);cursor:pointer;font-size:var(--type-body-sm);font-weight:600;font-family:var(--font-body);transition:var(--transition-fast)}
.tbtn:hover{border-color:var(--border-hover);color:var(--text-primary)}
.tbtn.active{background:var(--accent-bg);color:var(--text-primary);border-color:var(--accent-border)}

/* Chart panels */
.panel{background:var(--bg-surface);border-radius:var(--radius-md);border:1px solid var(--border);padding:var(--sp-6) var(--sp-5);margin-bottom:20px;display:none}
.panel.active{display:block}
.panel-title{font-size:var(--type-heading);font-weight:600;color:var(--text-primary);margin-bottom:4px}
.panel-sub{font-size:var(--type-body-sm);color:var(--text-secondary);margin-bottom:16px;line-height:1.5}
.chart-wrap-sm{height:240px}

/* Highlight utilities */
.highlight{font-weight:600}
.hl-pos{color:var(--green)}
.hl-neg{color:var(--red)}
.hl-a1{color:var(--accent)}
.hl-a2{color:var(--yellow)}

/* Transmission chain */
.chain{background:var(--bg-surface);border-radius:var(--radius-md);padding:var(--sp-5) var(--sp-6);border:1px solid var(--border);margin-bottom:20px}
.chain-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:16px}
.chain-item{display:flex;align-items:flex-start;gap:12px}
.chain-bar{width:4px;min-height:52px;border-radius:2px;flex-shrink:0;margin-top:2px}
.chain-from{font-size:var(--type-body-sm);font-weight:600;color:var(--text-primary)}
.chain-val{font-size:var(--type-heading);font-weight:700;margin:2px 0}
.chain-detail{font-size:var(--type-body-sm);color:var(--text-secondary)}

/* Scorecard table */
.sc-table{width:100%;border-collapse:collapse;font-size:var(--type-body-sm)}
.sc-table th{text-align:left;padding:10px 8px;border-bottom:1px solid var(--border);color:var(--text-secondary);font-weight:600;font-size:var(--type-caption);text-transform:uppercase;letter-spacing:.5px}
.sc-table th:not(:first-child){text-align:right}
.sc-table td{padding:10px 8px;border-bottom:1px solid var(--border-subtle);color:var(--text-primary)}
.sc-table td:not(:first-child){text-align:right}
.sc-table tr:hover{background:rgba(255,255,255,0.02)}

/* Monthly table */
.mt-table{width:100%;border-collapse:collapse;font-size:var(--type-body-sm)}
.mt-table th{text-align:right;padding:8px 6px;border-bottom:1px solid var(--border);color:var(--text-secondary);font-weight:600;font-size:var(--type-caption);text-transform:uppercase;letter-spacing:.5px}
.mt-table th:first-child{text-align:left}
.mt-table td{padding:8px 6px;border-bottom:1px solid var(--border-subtle);color:var(--text-primary);text-align:right}
.mt-table td:first-child{text-align:left;color:var(--text-primary);font-weight:500}

/* Calendar */
.cal-item{display:flex;gap:12px;padding:8px 0;border-bottom:1px solid var(--border-subtle)}
.cal-date{min-width:90px;font-weight:600;color:var(--accent);font-size:var(--type-body-sm)}
.cal-event{font-size:var(--type-body-sm);color:var(--text-primary)}

/* Mini title */
.mini-title{font-size:var(--type-body-sm);font-weight:600;color:var(--text-primary);margin-bottom:8px}

/* Footer */
.footer{font-size:var(--type-caption);color:var(--text-dim);text-align:center;padding-top:var(--sp-4);margin-top:var(--sp-2)}

/* Report */
.rpt{background:var(--bg-surface);border-radius:var(--radius-md);padding:var(--sp-5) var(--sp-6);border:1px solid var(--border);margin-bottom:16px}
.rpt-h2{font-size:var(--type-heading);font-weight:700;color:var(--text-primary);margin:0 0 12px}
.rpt-h3{font-size:var(--type-heading);font-weight:600;color:var(--accent);margin:16px 0 8px}
.rpt-p{font-size:var(--type-body);color:var(--text-primary);line-height:1.7;margin-bottom:10px}
.rpt-ul{margin:8px 0 12px 20px;font-size:var(--type-body);color:var(--text-primary);line-height:1.8}
.rpt-ul li{margin-bottom:4px}
.rpt-map{width:100%;border-collapse:collapse;font-size:var(--type-body-sm);margin:8px 0}
.rpt-map th{text-align:left;padding:10px 12px;border-bottom:1px solid var(--border);color:var(--text-secondary);font-weight:600;font-size:var(--type-caption);text-transform:uppercase;letter-spacing:.5px}
.rpt-map td{padding:10px 12px;border-bottom:1px solid var(--border-subtle)}
.rpt-map td:nth-child(2){color:var(--text-primary);font-weight:600}
.rpt-fred{display:block;padding:10px 14px;background:var(--accent-bg);border-radius:var(--radius-sm);border:1px solid var(--accent-border);margin-bottom:8px;text-decoration:none;transition:var(--transition-fast)}
.rpt-fred:hover{background:rgba(6,182,212,0.15);border-color:rgba(6,182,212,0.3)}
.rpt-fred-title{font-size:var(--type-body-sm);font-weight:600;color:var(--accent)}
.rpt-fred-reason{font-size:var(--type-body-sm);color:var(--text-secondary);margin-top:2px}
.rpt-fred-url{font-size:var(--type-caption);color:var(--text-dim);margin-top:2px;word-break:break-all}
.copy-btn{padding:10px 24px;border-radius:var(--radius-sm);border:1px solid var(--accent-border);background:rgba(6,182,212,0.2);color:var(--text-primary);cursor:pointer;font-size:var(--type-body);font-weight:600;font-family:var(--font-body);transition:var(--transition-fast);margin-bottom:20px}
.copy-btn:hover{background:rgba(6,182,212,0.35)}
.copy-btn.copied{border-color:var(--green);background:var(--green-bg);color:var(--green)}
.signal-box{background:rgba(255,255,255,0.03);border-radius:10px;padding:14px 18px;border:1px solid var(--border);margin-bottom:10px}
.signal-title{font-size:var(--type-body);font-weight:600;color:var(--yellow);margin-bottom:6px}

/* Signal Log */
.sl-health{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:20px}
.sl-health .card-value{font-size:var(--type-heading)}
.sl-table{width:100%;border-collapse:collapse;font-size:var(--type-body-sm);font-family:var(--font-mono)}
.sl-table th{text-align:left;padding:8px 6px;border-bottom:1px solid var(--border);color:var(--text-secondary);font-weight:600;font-size:var(--type-caption);text-transform:uppercase;letter-spacing:.5px;position:sticky;top:0;background:var(--bg-base);z-index:1}
.sl-table td{padding:7px 6px;border-bottom:1px solid var(--border-subtle);color:var(--text-primary);white-space:nowrap}
.sl-table tr:hover{background:rgba(255,255,255,0.02)}
.sl-wrap{max-height:520px;overflow-y:auto;border-radius:var(--radius-md);border:1px solid var(--border)}
.sl-badge{display:inline-block;padding:2px 8px;border-radius:var(--radius-xs);font-size:var(--type-caption);font-weight:600}
.sl-sup{background:var(--green-bg);color:var(--green)}
.sl-res{background:var(--red-bg);color:var(--red)}
.sl-neu{background:var(--accent-bg);color:var(--accent)}
.sl-gap{margin-top:12px}
.sl-gap-toggle{display:inline-flex;align-items:center;gap:6px;cursor:pointer;font-size:var(--type-body-sm);color:var(--text-secondary);padding:6px 10px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg-surface);transition:var(--transition-fast)}
.sl-gap-toggle:hover{background:var(--bg-surface-hover);color:var(--text-primary)}
.sl-gap-toggle .sl-gap-count{color:var(--red);font-weight:700;font-family:var(--font-mono)}
.sl-gap-toggle .sl-gap-arrow{transition:transform .2s;font-size:var(--type-caption)}
.sl-gap-toggle.open .sl-gap-arrow{transform:rotate(90deg)}
.sl-gap-chips{display:none;flex-wrap:wrap;gap:6px;margin-top:8px;padding:10px;border-radius:var(--radius-sm);background:var(--bg-surface);border:1px solid var(--border)}
.sl-gap-chips.open{display:flex}
.sl-gap-chip{display:inline-block;padding:3px 8px;border-radius:var(--radius-xs);font-size:var(--type-caption);font-family:var(--font-mono);color:var(--text-secondary);background:var(--bg-surface);border:1px solid var(--border);cursor:pointer;transition:var(--transition-fast);text-decoration:none}
.sl-gap-chip:hover{background:var(--green-bg);color:var(--green);border-color:rgba(16,185,129,0.3)}
.sl-gap-chip::after{content:'\2197';margin-left:4px;font-size:var(--type-caption);opacity:0;transition:opacity .15s}
.sl-gap-chip:hover::after{opacity:1}
.sl-section{margin-top:28px}
.sl-section-title{font-size:var(--type-heading);font-weight:600;color:var(--text-primary);margin-bottom:4px}
.sl-section-sub{font-size:var(--type-body-sm);color:var(--text-secondary);margin-bottom:14px}
.rt-table{width:100%;border-collapse:collapse;font-size:var(--type-body-sm)}
.rt-table th{text-align:left;padding:10px 8px;border-bottom:1px solid var(--border);color:var(--text-secondary);font-weight:600;font-size:var(--type-caption);text-transform:uppercase;letter-spacing:.5px}
.rt-table th:not(:first-child){text-align:right}
.rt-table td{padding:10px 8px;border-bottom:1px solid var(--border-subtle);color:var(--text-primary)}
.rt-table td:not(:first-child){text-align:right;font-family:var(--font-mono);font-size:var(--type-body-sm)}
.rt-table tr:hover{background:rgba(255,255,255,0.02)}
.rt-pending{color:var(--text-dim);font-style:italic;font-family:var(--font-body)}

/* Technicals */
.tech-tooltip{position:absolute;pointer-events:none;background:rgba(15,15,19,0.95);border:1px solid rgba(255,255,255,0.15);border-radius:var(--radius-sm);padding:10px 14px;font-size:var(--type-body-sm);font-family:var(--font-mono);color:var(--text-primary);z-index:10;display:none;white-space:nowrap}
.tech-tooltip .tt-date{font-weight:700;color:var(--text-primary);margin-bottom:4px}
.tech-tooltip .tt-row{display:flex;justify-content:space-between;gap:16px}
.tech-tooltip .tt-label{color:var(--text-secondary)}

/* Hero Gauge — dominant top-of-page visual */
.gauge-hero{margin-bottom:var(--sp-8);text-align:center}
.gauge-hero .gauge-score-big{font-size:var(--type-hero);font-weight:800;font-family:var(--font-mono);line-height:1;letter-spacing:-2px;margin-bottom:var(--sp-1)}
.gauge-hero .gauge-label-text{font-size:var(--type-heading);font-weight:600;margin-bottom:var(--sp-4)}
.gauge-hero .gauge-bar-wrap{height:24px;border-radius:12px;max-width:600px;margin:0 auto var(--sp-2)}
.gauge-hero .gauge-marker{height:32px;top:-4px;width:4px}
.gauge-hero .gauge-labels{display:flex;justify-content:space-between;max-width:600px;margin:0 auto var(--sp-6);font-size:var(--type-caption);color:var(--text-dim)}

/* Verdict line — one sentence summary below hero */
.verdict{text-align:center;font-size:var(--type-body);color:var(--text-secondary);margin-bottom:var(--sp-8);line-height:1.6;max-width:700px;margin-left:auto;margin-right:auto}
.verdict strong{color:var(--text-primary);font-weight:600}

/* Gauge components row — below cards */
.gauge-components-row{background:var(--bg-surface);border-radius:var(--radius-md);padding:var(--sp-5) var(--sp-6);border:1px solid var(--border);margin-bottom:var(--sp-8)}
.gauge-components-row .gauge-comp-title{font-size:var(--type-caption);font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:var(--sp-4);text-align:center}
.gauge-components{display:grid;grid-template-columns:repeat(6,1fr);gap:var(--sp-3);margin-bottom:var(--sp-4)}
.gauge-component{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:var(--radius-sm);padding:var(--sp-4);text-align:center;cursor:pointer;transition:var(--transition-fast);display:grid;grid-template-rows:2.4em 6px 1.4em auto;gap:var(--sp-1);align-content:start}
.gauge-component:hover{background:var(--bg-surface-hover);border-color:var(--border-hover)}
.gc-name{font-size:var(--type-caption);color:var(--text-secondary);text-transform:uppercase;letter-spacing:.5px;line-height:1.2;align-self:end}
.gc-minibar{height:6px;border-radius:3px;position:relative;overflow:hidden;align-self:center}
.gc-minibar-bg{position:absolute;inset:0;border-radius:3px;background:rgba(255,255,255,0.06)}
.gc-minibar-fill{position:absolute;top:0;height:100%;border-radius:3px;transition:width .6s ease}
.gc-score{font-size:var(--type-heading);font-weight:700;font-family:var(--font-mono);line-height:1}
.gc-detail{font-size:var(--type-caption);color:var(--text-secondary)}
.gauge-disclaimer{font-size:var(--type-caption);color:var(--text-dim);line-height:1.5;text-align:center;margin-top:var(--sp-2)}

/* Legacy gauge-wrap kept for backward compat */
.gauge-wrap{background:var(--bg-surface);border-radius:var(--radius-md);padding:var(--sp-5) var(--sp-6);border:1px solid var(--border);margin-bottom:28px}
.gauge-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:14px}
.gauge-title{font-size:var(--type-caption);font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:1.5px}
.gauge-score{font-size:var(--type-heading-lg);font-weight:700;font-family:var(--font-mono)}
.gauge-labels-old{display:flex;justify-content:space-between;font-size:var(--type-caption);color:var(--text-dim);margin-bottom:2px}
.gauge-reading{font-size:var(--type-heading);font-weight:600;margin-bottom:16px}
.rpt-highlight{animation:highlight 1.5s ease}

/* Rel. Strength */
.rs-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:12px;margin-bottom:20px}
.rs-pair-sel{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:16px}
.rs-pair-btn{padding:5px 12px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg-surface);color:var(--text-secondary);cursor:pointer;font-size:var(--type-body-sm);font-weight:600;font-family:var(--font-body);transition:var(--transition-fast)}
.rs-pair-btn:hover{border-color:var(--border-hover)}
.rs-pair-btn.active{background:var(--accent-bg);color:var(--text-primary);border-color:var(--accent-border)}
.rs-table{width:100%;border-collapse:collapse;font-size:var(--type-body-sm)}
.rs-table th{text-align:left;padding:10px 8px;border-bottom:1px solid var(--border);color:var(--text-secondary);font-weight:600;font-size:var(--type-caption);text-transform:uppercase;letter-spacing:.5px}
.rs-table th:not(:first-child){text-align:right}
.rs-table td{padding:10px 8px;border-bottom:1px solid var(--border-subtle);color:var(--text-primary)}
.rs-table td:not(:first-child){text-align:right;font-family:var(--font-mono);font-size:var(--type-body-sm)}
.rs-table tr:hover{background:rgba(255,255,255,0.02)}
.rs-signal{display:inline-block;padding:2px 8px;border-radius:var(--radius-xs);font-size:var(--type-caption);font-weight:600}
.rs-ow{background:var(--green-bg);color:var(--green)}
.rs-uw{background:var(--red-bg);color:var(--red)}
.rs-mix{background:var(--accent-bg);color:var(--accent)}
.rs-aligned{color:var(--green)}.rs-divergent{color:var(--red)}.rs-neutral-align{color:var(--text-secondary)}
.rs-assets{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
.rs-assets span{display:inline-block;padding:3px 10px;border-radius:var(--radius-xs);font-size:var(--type-body-sm);font-weight:600;font-family:var(--font-mono)}
.rs-assets .ow{background:rgba(16,185,129,0.15);color:var(--green);border:1px solid rgba(16,185,129,0.3)}
.rs-assets .uw{background:rgba(239,68,68,0.15);color:var(--red);border:1px solid rgba(239,68,68,0.3)}
/* Trade idea indicator */
.trade-dot{display:inline-block;width:10px;height:10px;border-radius:50%;margin-right:6px;cursor:pointer;transition:var(--transition-fast);vertical-align:middle}
.trade-dot.active{background:var(--green);box-shadow:0 0 6px rgba(16,185,129,0.5);animation:pulse 2s infinite}
.trade-dot.inactive{background:rgba(255,255,255,0.1);cursor:default}
.trade-panel{display:none;padding:16px 12px;background:rgba(16,185,129,0.05);border-left:3px solid var(--green);margin:0}
.trade-panel.open{display:table-row}
.trade-panel td{padding:16px 12px !important;border-bottom:1px solid rgba(16,185,129,0.15) !important}
.trade-panel .tp-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.trade-panel .tp-section{font-size:var(--type-body-sm);color:var(--text-primary);line-height:1.7}
.trade-panel .tp-label{color:var(--text-secondary);font-size:var(--type-caption);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;font-weight:600}
.trade-panel .tp-val{font-family:var(--font-mono);font-size:var(--type-body-sm);color:var(--text-primary)}
.trade-panel .tp-row{display:flex;justify-content:space-between;padding:2px 0}
.trade-panel .tp-note{font-size:var(--type-caption);color:var(--text-dim);margin-top:8px;font-style:italic}
.trade-panel .tp-close{float:right;background:none;border:1px solid var(--border);color:var(--text-secondary);padding:2px 8px;border-radius:var(--radius-xs);cursor:pointer;font-size:var(--type-caption)}
.trade-panel .tp-close:hover{border-color:var(--border-hover);color:var(--text-primary)}

/* Market Narrative */
.narr-wrap{background:var(--bg-surface);border-radius:var(--radius-md);padding:var(--sp-4) var(--sp-5);border:1px solid var(--border);margin-bottom:20px}
.narr-header{display:flex;justify-content:space-between;align-items:center;cursor:pointer;user-select:none}
.narr-title{font-size:var(--type-caption);color:var(--text-secondary);text-transform:uppercase;letter-spacing:1.5px;font-weight:600}
.narr-toggle{font-size:var(--type-caption);color:var(--text-dim);transition:transform .2s}
.narr-header:hover .narr-title{color:var(--text-primary)}
.narr-dominant{font-size:var(--type-heading);font-weight:700;color:var(--text-primary);margin:8px 0 4px}
.narr-meta{font-size:var(--type-caption);color:var(--text-dim);margin-bottom:12px}
.narr-body{overflow:hidden;transition:max-height .3s ease}
.narr-body.collapsed{max-height:0 !important}
.narr-topic{margin-bottom:10px}
.narr-topic-header{display:flex;align-items:center;gap:10px;margin-bottom:3px}
.narr-topic-name{font-size:var(--type-body-sm);font-weight:600;color:var(--text-primary);min-width:180px}
.narr-bar-wrap{flex:1;height:8px;border-radius:4px;background:rgba(255,255,255,0.04);overflow:hidden}
.narr-bar{height:100%;border-radius:4px;transition:width .6s ease}
.narr-topic-pct{font-size:var(--type-body-sm);color:var(--text-secondary);font-family:var(--font-mono);min-width:40px;text-align:right}
.narr-headlines{margin:2px 0 0 190px;font-size:var(--type-caption);color:var(--text-dim);line-height:1.6}
.narr-headlines li{list-style:none;padding-left:10px;position:relative}
.narr-headlines li::before{content:'\2022';position:absolute;left:0;color:var(--text-dim)}
@media(max-width:720px){
  .narr-topic-name{min-width:100px}.narr-headlines{margin-left:0}
  .gauge-hero .gauge-score-big{font-size:var(--type-hero-mobile);letter-spacing:-1px}
  .gauge-hero .gauge-label-text{font-size:var(--type-body)}
  .gauge-components{grid-template-columns:repeat(2,1fr)}
}

/* Light mode overrides */
[data-theme="light"] .dts-header { background: radial-gradient(circle at 10% 80%, rgba(8,145,178,0.06), transparent 40%), radial-gradient(circle at 90% 20%, rgba(37,99,235,0.04), transparent 40%); }
[data-theme="light"] .dts-header::after { background: linear-gradient(90deg, transparent, var(--accent), transparent); }
</style>
</head>
<body>
<button class="theme-toggle" onclick="toggleTheme()" title="Toggle dark/light mode">
  <span id="theme-icon">&#9790;</span> <span id="theme-label">Dark</span>
</button>
<div class="container" id="app">
  <div class="loading" id="loader">Loading dashboard data…</div>
</div>

<script>
const P = {pos:'#10b981',neg:'#ef4444',a1:'#06b6d4',a2:'#f59e0b',a3:'#ef4444',a4:'#3b82f6',a5:'#60a5fa',a6:'#34d399',muted:'#94A3B8',bg:'#0f0f13',grid:'rgba(255,255,255,0.06)'};
const fmt = v => `$${v.toFixed(1)}B`;
const fmtS = v => `${v>=0?'+':''}${v.toFixed(1)}B`;
const pct = v => v===null||v===undefined?'n/a':`${v>=0?'+':''}${v.toFixed(1)}%`;
const shortD = d => {const p=d.split('-');return p[1]+'/'+p[2];};

function clr(v){return v>=0?P.pos:P.neg}

const chartDefaults = {
  responsive:true, maintainAspectRatio:false,
  plugins:{legend:{display:false},tooltip:{
    backgroundColor:'#0f0f13',borderColor:'rgba(255,255,255,0.1)',borderWidth:1,
    titleFont:{family:"'JetBrains Mono',monospace",size:12,weight:'bold'},
    bodyFont:{family:"'JetBrains Mono',monospace",size:12},
    titleColor:'#FAFAFA',bodyColor:'#FAFAFA',
    cornerRadius:8,padding:12,
    callbacks:{label:ctx=>`${ctx.dataset.label}: ${fmt(ctx.parsed.y??ctx.parsed.x)}`}
  }},
  scales:{x:{grid:{display:false},ticks:{font:{family:"'JetBrains Mono',monospace",size:11},color:P.muted},border:{display:false}},
          y:{grid:{color:P.grid},ticks:{font:{family:"'JetBrains Mono',monospace",size:11},color:P.muted,callback:v=>`${v}B`},border:{display:false}}}
};

function mergeOpts(overrides){
  return JSON.parse(JSON.stringify({...chartDefaults,...overrides,plugins:{...chartDefaults.plugins,...(overrides.plugins||{})},scales:{...chartDefaults.scales,...(overrides.scales||{})}}));
}

let charts = {};
function destroyChart(id){if(charts[id]){charts[id].destroy();delete charts[id];}}

function gaugeColor(score){
  if(score>=60) return '#059669';
  if(score>=30) return P.pos;
  if(score>=10) return '#34d399';
  if(score>=-10) return P.muted;
  if(score>=-30) return '#f87171';
  if(score>=-60) return P.neg;
  return '#dc2626';
}

function renderGaugeHero(G){
  const pct = ((G.score + 100) / 200 * 100).toFixed(1);
  const scoreClr = gaugeColor(G.score);
  return `<div class="gauge-hero">
    <div class="gauge-score-big" style="color:${scoreClr}">${G.score>0?'+':''}${G.score}</div>
    <div class="gauge-label-text" style="color:${scoreClr}">${G.label}</div>
    <div class="gauge-bar-wrap">
      <div class="gauge-marker" style="left:${pct}%"></div>
    </div>
    <div class="gauge-labels"><span>Bearish</span><span>Neutral</span><span>Bullish</span></div>
  </div>`;
}

function renderGaugeComponents(G){
  const comps = G.components.map(c => {
    const cClr = c.weighted >= 0 ? P.pos : P.neg;
    const barLeft = c.score >= 0 ? 50 : (50 + c.score / 2);
    const barWidth = Math.abs(c.score) / 2;
    return `<div class="gauge-component" data-view="${c.view}" ${c.scroll?`data-scroll="${c.scroll}"`:''}>
      <div class="gc-name">${c.name === 'Regime Momentum' ? 'Regime Mom.' : c.name}</div>
      <div class="gc-minibar">
        <div class="gc-minibar-bg"></div>
        <div class="gc-minibar-fill" style="left:${barLeft}%;width:${barWidth}%;background:${cClr}"></div>
      </div>
      <div class="gc-score" style="color:${cClr}">${c.weighted>0?'+':''}${c.weighted}</div>
      <div class="gc-detail">${c.detail}</div>
    </div>`;
  }).join('');

  return `<div class="gauge-components-row">
    <div class="gauge-comp-title mono">Score Breakdown</div>
    <div class="gauge-components">${comps}</div>
    <div class="gauge-disclaimer">Reflects fiscal flow conditions and speculative positioning, not investment advice. Based on DTS operational data + CFTC/FINRA signals.</div>
  </div>`;
}

function buildDashboard(D){
  const app = document.getElementById('app');
  const c = D.cards, n = D.narrative, meta = D.meta;
  const regimeClr = c.regime==='Supportive'?P.pos:c.regime==='Restrictive'?P.neg:P.a1;

  // Build verdict line from data
  const tgaDir = n.tga_5d > 0 ? 'TGA rebuilding (draining reserves)' : 'TGA drawing down (adding reserves)';
  const momDir = n.momentum === 'accelerating' ? 'accelerating' : 'decelerating';
  const verdictText = `<strong>${c.regime}</strong> fiscal regime, ${momDir}. ${tgaDir}. FYTD injection ${pct(c.fytd_yoy_pct)} YoY.`;

  app.innerHTML = `
  <div class="dts-header">
    <div class="cat mono">Daily Treasury Statement</div>
    <h1>Flow-of-Funds Dashboard</h1>
    <div class="subtitle">FY${meta.fiscal_year} &mdash; Data through ${meta.latest}</div>
  </div>

  ${D.report&&D.report.gauge?renderGaugeHero(D.report.gauge):''}

  <div class="verdict">${verdictText}</div>

  <div class="cards">
    <div class="card">
      <div class="card-label mono">Regime</div>
      <div class="card-value" style="color:${regimeClr}">${c.regime}</div>
      <div class="card-change mono" style="color:${regimeClr}">${n.momentum==='accelerating'?'&#9650; Accelerating':'&#9660; Decelerating'}</div>
    </div>
    <div class="card">
      <div class="card-label mono">TGA Balance</div>
      <div class="card-value mono">${fmt(c.tga_level)}</div>
      <div class="card-change mono" style="color:${n.tga_5d>0?P.neg:P.pos}">5d: ${n.tga_5d>0?'Rebuilding (drains)':'Drawing down (adds)'}</div>
    </div>
    <div class="card">
      <div class="card-label mono">FYTD Fiscal Injection</div>
      <div class="card-value mono">${fmt(c.fytd_cfi)}</div>
      <div class="card-change mono" style="color:${clr(c.fytd_yoy_pct)}">${pct(c.fytd_yoy_pct)} YoY</div>
    </div>
    <div class="card">
      <div class="card-label mono">MTD Injection</div>
      <div class="card-value mono">${fmt(c.mtd_cfi)}</div>
      <div class="card-change mono" style="color:${P.a1}">5d avg: ${fmt(c.avg_5d_cfi)}/d</div>
    </div>
  </div>

  ${D.report&&D.report.gauge?renderGaugeComponents(D.report.gauge):''}

  <div id="narrative-section"></div>

  <div class="toggles">
    <button class="tbtn active" data-view="flows">Daily Flows</button>
    <button class="tbtn" data-view="cumulative">FYTD Comparison</button>
    <button class="tbtn" data-view="weekly">Weekly Regime</button>
    <button class="tbtn" data-view="composition">Composition</button>
    <button class="tbtn" data-view="issuance">Issuance Mix</button>
    <button class="tbtn" data-view="scorecard">Scorecard</button>
    <button class="tbtn" data-view="analysis">Analysis</button>
    <button class="tbtn" data-view="signals">Signal Log</button>
    <button class="tbtn" data-view="report">&#9998; Report</button>
    <button class="tbtn" data-view="technicals">Technicals</button>
    <button class="tbtn" data-view="relstrength">Rel. Strength</button>
  </div>

  <!-- DAILY FLOWS -->
  <div class="panel active" id="panel-flows">
    <div class="panel-title">Daily Core Fiscal Injection + TGA Level</div>
    <div class="panel-sub">Bars = withdrawals minus deposits (ex-debt)- positive = reserve add.  Line = TGA closing balance (right axis).</div>
    <div class="chart-wrap"><canvas id="chart-flows"></canvas></div>
    <div class="legend">
      <span><span class="legend-dot" style="background:${P.pos}"></span>Reserve add</span>
      <span><span class="legend-dot" style="background:${P.neg}"></span>Reserve drain</span>
      <span><span class="legend-dot" style="background:${P.a2};border-radius:50%"></span>TGA level (right)</span>
      <span style="color:${P.a2};font-size:var(--type-body-sm)">&#9733;</span><span style="font-size:var(--type-body-sm);color:var(--text-secondary);margin-left:4px">Coupon interest day</span>
      <span style="color:${P.pos};font-size:var(--type-caption)">&#9650;</span><span style="font-size:var(--type-body-sm);color:var(--text-secondary);margin-left:4px">SSA payment cycle</span>
    </div>
  </div>

  <!-- CUMULATIVE -->
  <div class="panel" id="panel-cumulative">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;flex-wrap:wrap;margin-bottom:12px">
      <div>
        <div class="panel-title" id="cumul-title">Cumulative Fiscal Injection - FY${meta.fiscal_year} vs FY${meta.fiscal_year-1}</div>
        <div class="panel-sub" id="cumul-sub" style="margin-bottom:0">Running total of core fiscal injection by fiscal month. The gap between lines shows YoY change in how much the government has added to the private sector.</div>
      </div>
      <div style="display:flex;gap:4px;flex-shrink:0">
        <button class="tbtn active" id="subview-cumul" style="padding:5px 14px">Cumulative</button>
        <button class="tbtn" id="subview-delta" style="padding:5px 14px">YoY Gap</button>
      </div>
    </div>
    <div class="chart-wrap" id="wrap-cumulative"><canvas id="chart-cumulative"></canvas></div>
    <div class="chart-wrap" id="wrap-cumul-delta" style="display:none"><canvas id="chart-cumul-delta"></canvas></div>
    <div class="legend" id="cumul-legend">
      <span><span class="legend-dot" style="background:${P.a1}"></span>FY${meta.fiscal_year}</span>
      <span><span class="legend-dot" style="background:${P.muted}"></span>FY${meta.fiscal_year-1}</span>
    </div>
    <div class="insight">
      FY${meta.fiscal_year} cumulative injection is <span class="mono hl-neg">${fmt(c.fytd_cfi)}</span> through the latest date, versus
      <span class="mono highlight">${c.fytd_cfi_prev!==null?fmt(c.fytd_cfi_prev):'n/a'}</span> at the same point in FY${meta.fiscal_year-1}.
      That's a <span class="mono hl-neg">${pct(c.fytd_yoy_pct)}</span> YoY gap — the YoY Gap view shows whether this gap is closing or widening month by month.
    </div>
  </div>

  <!-- WEEKLY -->
  <div class="panel" id="panel-weekly">
    <div class="panel-title">Weekly Fiscal Regime</div>
    <div class="panel-sub">Core fiscal injection and TGA-driven reserve effect by week - smooths daily noise</div>
    <div class="chart-wrap"><canvas id="chart-weekly"></canvas></div>
    <div class="legend">
      <span><span class="legend-dot" style="background:${P.pos}"></span>Fiscal injection (+) / drain (-)</span>
      <span><span class="legend-dot" style="background:${P.a1};opacity:0.6"></span>Reserve effect (TGA-driven)</span>
    </div>
  </div>

  <!-- COMPOSITION -->
  <div class="panel" id="panel-composition">
    <div class="panel-title">Monthly Composition - FY${meta.fiscal_year} vs FY${meta.fiscal_year-1}</div>
    <div class="panel-sub">Key flow categories by fiscal month, comparing current and prior year</div>
    <div class="grid-2">
      <div><div class="mini-title">Tax Receipts</div><div class="chart-wrap-sm"><canvas id="chart-comp-taxes"></canvas></div></div>
      <div><div class="mini-title">Household Transfers</div><div class="chart-wrap-sm"><canvas id="chart-comp-hh"></canvas></div></div>
      <div><div class="mini-title">Interest Payments</div><div class="chart-wrap-sm"><canvas id="chart-comp-interest"></canvas></div></div>
      <div><div class="mini-title">Tariff Receipts</div><div class="chart-wrap-sm"><canvas id="chart-comp-tariffs"></canvas></div></div>
    </div>
    <div class="legend" style="margin-top:16px">
      <span><span class="legend-dot" style="background:rgba(255,255,255,0.15)"></span>FY${meta.fiscal_year-1}</span>
      <span><span class="legend-dot" style="background:${P.a1}"></span>FY${meta.fiscal_year}</span>
    </div>
  </div>

  <!-- ISSUANCE -->
  <div class="panel" id="panel-issuance">
    <div class="panel-title">FYTD Issuance Decomposition</div>
    <div class="panel-sub">Net issuance by security type - different types affect different parts of the yield curve</div>
    <div class="chart-wrap"><canvas id="chart-issuance"></canvas></div>
    <div class="insight">
      <strong>Bills</strong> affect front-end rates and money market demand.
      <strong>Notes + Bonds</strong> affect term premium and duration risk.
      <strong>GAS</strong> (Government Account Series) is trust fund investment - large swings signal extraordinary measures during debt ceiling standoffs.
      <strong>TIPS</strong> accruals are inflation adjustments, not new cash raised.
    </div>
    <div style="margin-top:20px">
      <div class="mini-title">Weekly Bill vs Coupon Supply</div>
      <div class="chart-wrap-sm"><canvas id="chart-billcoupon"></canvas></div>
    </div>
  </div>

  <!-- SCORECARD -->
  <div class="panel" id="panel-scorecard">
    <div class="panel-title">FYTD Scorecard - FY${meta.fiscal_year} vs FY${meta.fiscal_year-1}</div>
    <div class="panel-sub">Year-over-year comparison at the same point in the fiscal year</div>
    <table class="sc-table">
      <thead><tr><th>Metric</th><th>FYTD Current</th><th>FYTD Prior</th><th>YoY Change</th></tr></thead>
      <tbody id="scorecard-body"></tbody>
    </table>
    <div class="insight" style="margin-top:16px">
      <strong>Operating deficit proxy:</strong> <span class="mono">${fmt(n.deficit_proxy)}</span> FYTD vs
      <span class="mono">${n.deficit_prior!==null?fmt(n.deficit_prior):'n/a'}</span> prior year.
    </div>
    ${n.refund_4wk!=null?`<div class="insight" style="margin-top:10px">
      <strong>Refund pace (trailing 4wk):</strong>
      <span class="mono">${fmt(n.refund_4wk)}</span> vs
      <span class="mono">${n.refund_4wk_prev!=null?fmt(n.refund_4wk_prev):'n/a'}</span> same window prior year &mdash;
      <span class="mono" style="color:${clr(n.refund_4wk_yoy)}">${pct(n.refund_4wk_yoy)}</span>
      ${n.refund_4wk_yoy!=null?(n.refund_4wk_yoy>=0?' &uarr; recent pace turned positive':'' ):''}
    </div>`:''}
    ${(()=>{
      const row = (D.scorecard||[]).find(r=>r.label&&r.label.toLowerCase().includes('refund'));
      if(!row||row.prior==null) return '';
      const gap = +(row.current - row.prior).toFixed(1);
      const gapStr = gap < 0 ? `<span class="mono" style="color:${P.neg}">${fmt(gap)}</span> vs prior year` : `<span class="mono" style="color:${P.pos}">+${fmt(gap)}</span> vs prior year`;
      return `<div class="insight" style="margin-top:6px;border-left-color:${gap<0?P.neg:P.pos}">
        <strong>Refund cumulative (FYTD):</strong>
        <span class="mono">${fmt(row.current)}</span> vs <span class="mono">${fmt(row.prior)}</span> prior year &mdash;
        ${gapStr} &mdash;
        <span class="mono" style="color:${clr(row.yoy_pct)}">${pct(row.yoy_pct)}</span>
        ${gap<0?' &darr; households still net-behind on total refunds received this fiscal year':''}
      </div>`;
    })()}


    <div style="margin-top:28px">
      <div class="panel-title">Monthly Regime (Last 12 Months)</div>
      <div class="panel-sub" style="margin-bottom:12px">All values in $bn</div>
      <div style="overflow-x:auto">
        <table class="mt-table">
          <thead><tr><th>Month</th><th>Core Inj.</th><th>Taxes</th><th>Tariffs</th><th>Refunds</th><th>HH Xfers</th><th>Interest</th><th>TGA &Delta;</th></tr></thead>
          <tbody id="monthly-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- ANALYSIS -->
  <div class="panel" id="panel-analysis">
    <div class="panel-title">Regime & Transmission Analysis</div>
    <div class="panel-sub">Data-conditional narrative - updates automatically when the underlying flows change</div>

    <div class="insight" style="margin-bottom:16px">
      <div style="font-size:var(--type-heading);font-weight:600;color:${regimeClr};margin-bottom:8px">&#9679; ${c.regime} Regime</div>
      ${n.regime_text}
    </div>

    <div class="cat mono" style="margin:20px 0 12px">Transmission Channels</div>
    <div class="chain" style="background:transparent;border:none;padding:0">
      <div class="chain-grid" id="transmission-grid"></div>
    </div>

    <div class="cat mono" style="margin:20px 0 12px">Key Category Signals</div>
    <div class="insight">
      <p style="margin-bottom:10px"><strong>Tax refunds:</strong> FYTD <span class="mono">${fmt(n.refund_fytd)}</span>
      (<span class="mono" style="color:${clr(n.refund_yoy)}">${pct(n.refund_yoy)}</span> YoY).
      Refund pace is the largest predictable household cash injection in Q1.</p>
      <p style="margin-bottom:10px"><strong>Interest expense:</strong> Trailing 12m ~<span class="mono">${fmt(n.interest_12m)}</span>.
      Interest is <span class="mono">${n.interest_share}%</span> of total withdrawals.
      Every dollar paid is simultaneously a fiscal cost and bondholder income.</p>
      <p style="margin-bottom:10px"><strong>Tariffs:</strong> <span class="mono">${n.tariff_share}%</span> of total deposits.
      Tariffs drain private-sector cash exactly like taxes.</p>
      ${n.gas_prev!==null&&Math.abs(n.gas_fytd-n.gas_prev)/Math.max(Math.abs(n.gas_prev),0.1)>0.3?
        `<p style="margin-bottom:10px;color:${P.a2}"><strong>&#9888; GAS divergence:</strong> Net GAS issuance is <span class="mono">${fmt(n.gas_fytd)}</span> vs <span class="mono">${fmt(n.gas_prev)}</span> prior year. Large shifts can indicate extraordinary measures.</p>`:''}
    </div>

    <div class="cat mono" style="margin:20px 0 12px">Forward Calendar</div>
    <div id="calendar-list"></div>

    <div class="cat mono" style="margin:20px 0 12px">How This Read Gets Invalidated</div>
    <div class="insight">
      ${c.regime==='Supportive'?
        'This call is invalidated if the 5d average drops below the 20d average for two consecutive sessions AND MTD net injection turns negative.':
        c.regime==='Restrictive'?
        'This call is invalidated if the 5d average rises above the 20d average for two consecutive sessions AND MTD injection improves to positive.':
        'This call shifts to Supportive if: 5d > 20d AND MTD > 0 AND YoY improving. Shifts to Restrictive if: MTD turns negative OR 5d falls below 20d by a widening margin.'}
      <br/><br/>If the FYTD YoY comparison on core fiscal injection changes sign, the entire fiscal stance read should be reassessed.
    </div>
  </div>

  <!-- SIGNAL LOG -->
  <div class="panel" id="panel-signals">
    <div class="panel-title">Signal Log — Track Record Builder</div>
    <div class="panel-sub">Every row is a timestamped snapshot of what the pipeline said that day. This is the evidence layer for the subscription product.</div>
    <div id="signal-log-content"><div class="loading">Loading signal log…</div></div>
    <div id="return-attribution-content"></div>
  </div>

  <!-- REPORT -->
  <div class="panel" id="panel-report">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:12px">
      <div>
        <div class="panel-title">MacroPulse Pro Research Note</div>
        <div class="panel-sub" style="margin-bottom:0">Institutional macro synthesis generated from Treasury flow data. Operational framework consistent with Federal Reserve and US Treasury accounting as described in the DTS.</div>
      </div>
      <button class="copy-btn" id="copy-report-btn" onclick="copyReport()">Copy Report Text</button>
    </div>
    <div id="report-content"></div>
  </div>

  <!-- TECHNICALS -->
  <div class="panel" id="panel-technicals">
    <div class="panel-title">ES Technical Regime — H12 SMA(20) Trend</div>
    <div class="panel-sub">Daily RTH candles colored by SMA(20) regime. Cross-reference with the fiscal regime above — when both fundamentals and technicals align, conviction is highest.</div>
    <div class="chart-wrap" style="height:420px;position:relative"><canvas id="chart-technicals"></canvas></div>
    <div class="legend">
      <span><span class="legend-dot" style="background:#10b981"></span>Bullish (close &gt; SMA)</span>
      <span><span class="legend-dot" style="background:#ef4444"></span>Bearish (close &lt; SMA)</span>
      <span><span class="legend-dot" style="background:#f59e0b;border-radius:50%"></span>SMA(20)</span>
    </div>
    <div class="insight" id="tech-insight"><strong>No technicals data.</strong> Run <code>python generate_technicals.py</code> to create technicals_data.json.</div>
  </div>

  <!-- REL. STRENGTH -->
  <div class="panel" id="panel-relstrength">
    <div class="panel-title">Relative Strength Ratio Analysis</div>
    <div class="panel-sub">RS ratios ranked by fiscal flow correlation — connecting DTS regime signals to actionable asset rotation.</div>
    <div id="rs-content"><div class="loading">Loading RS ratio data…</div></div>
  </div>

  <div class="footer mono">Source: US Treasury Daily Treasury Statement via FiscalData API</div>
  `;

  // Wire toggles
  const switchTab = (view, scrollId) => {
    document.querySelectorAll('.tbtn[data-view]').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
    const btn = document.querySelector(`.tbtn[data-view="${view}"]`);
    if(btn) btn.classList.add('active');
    const panel = document.getElementById('panel-'+view);
    if(panel) panel.classList.add('active');
    renderCharts(D, view);
    if(scrollId){
      setTimeout(()=>{
        const target = document.getElementById(scrollId);
        if(target){
          target.scrollIntoView({behavior:'smooth',block:'start'});
          target.classList.add('rpt-highlight');
          setTimeout(()=>target.classList.remove('rpt-highlight'),1500);
        }
      },100);
    }
  };

  document.querySelectorAll('.tbtn[data-view]').forEach(btn=>{
    btn.addEventListener('click',()=>switchTab(btn.dataset.view));
  });

  // Wire gauge component clicks
  document.querySelectorAll('.gauge-component[data-view]').forEach(gc=>{
    gc.addEventListener('click',()=>{
      switchTab(gc.dataset.view, gc.dataset.scroll||null);
    });
  });

  // Populate tables
  const scBody = document.getElementById('scorecard-body');
  D.scorecard.forEach(r=>{
    const yoyClr = r.yoy_pct===null?'':r.yoy_pct>=0?P.pos:P.neg;
    scBody.innerHTML += `<tr>
      <td>${r.label}</td>
      <td class="mono">${fmt(r.current)}</td>
      <td class="mono">${r.prior!==null?fmt(r.prior):'n/a'}</td>
      <td class="mono" style="color:${yoyClr}">${pct(r.yoy_pct)}</td>
    </tr>`;
  });

  const mtBody = document.getElementById('monthly-body');
  D.monthly_table.forEach(r=>{
    mtBody.innerHTML += `<tr>
      <td>${r.month}</td>
      <td class="mono" style="color:${clr(r.cfi)}">${r.cfi.toFixed(1)}</td>
      <td class="mono">${r.taxes.toFixed(1)}</td>
      <td class="mono">${r.tariffs.toFixed(1)}</td>
      <td class="mono">${r.refunds.toFixed(1)}</td>
      <td class="mono">${r.hh.toFixed(1)}</td>
      <td class="mono">${r.interest.toFixed(1)}</td>
      <td class="mono" style="color:${clr(-r.tga_delta)}">${r.tga_delta.toFixed(1)}</td>
    </tr>`;
  });

  // Transmission
  const tGrid = document.getElementById('transmission-grid');
  const tColors = [P.pos,P.neg,P.a1,P.a2];
  D.transmission.forEach((t,i)=>{
    const c = tColors[i]||P.a1;
    tGrid.innerHTML += `
    <div class="chain-item">
      <div class="chain-bar" style="background:${c}"></div>
      <div>
        <div class="chain-from">${t.from} &rarr; ${t.to}</div>
        <div class="chain-val mono" style="color:${c}">${fmt(t.value)}</div>
        <div class="chain-detail">${t.detail}</div>
      </div>
    </div>`;
  });

  // Calendar
  const calList = document.getElementById('calendar-list');
  D.calendar.forEach(e=>{
    calList.innerHTML += `<div class="cal-item"><span class="cal-date mono">${e.date}</span><span class="cal-event">${e.event}</span></div>`;
  });

  // Render default charts
  renderCharts(D, 'flows');

  // Render report
  if(D.report){ window._reportData = D.report; renderReport(D.report); }
}

function renderCharts(D, view){
  if(view==='flows' && !charts['flows']){
    const ctx = document.getElementById('chart-flows').getContext('2d');
    charts['flows'] = new Chart(ctx,{
      type:'bar',
      data:{
        labels:D.daily.map(d=>shortD(d.date)),
        datasets:[
          {type:'bar',label:'Core Fiscal Injection',data:D.daily.map(d=>d.cfi),
           backgroundColor:D.daily.map(d=>d.cfi>=0?P.pos+'D9':P.neg+'D9'),
           borderRadius:2,barPercentage:0.7,yAxisID:'y',order:2},
          {type:'line',label:'TGA Level',data:D.daily.map(d=>d.tga),
           borderColor:P.a2,borderWidth:2.5,pointRadius:0,pointHoverRadius:4,
           pointHoverBackgroundColor:P.a2,tension:0.3,yAxisID:'y1',order:1}
        ]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        interaction:{mode:'index',intersect:false},
        plugins:{legend:{display:false},tooltip:{
          backgroundColor:'#0f0f13',borderColor:'rgba(255,255,255,0.1)',borderWidth:1,
          titleFont:{family:"'JetBrains Mono',monospace",size:12,weight:'bold'},
          bodyFont:{family:"'JetBrains Mono',monospace",size:12},
          titleColor:'#FAFAFA',bodyColor:'#FAFAFA',cornerRadius:8,padding:12,
          callbacks:{label:ctx=>`${ctx.dataset.label}: ${fmt(ctx.parsed.y)}`}
        }},
        scales:{
          x:{grid:{display:false},ticks:{font:{family:"'JetBrains Mono',monospace",size:10},color:P.muted,maxRotation:0,autoSkip:true,maxTicksLimit:10},border:{display:false}},
          y:{position:'left',grid:{color:P.grid},ticks:{font:{family:"'JetBrains Mono',monospace",size:11},color:P.muted,callback:v=>v+'B'},border:{display:false}},
          y1:{position:'right',grid:{display:false},ticks:{font:{family:"'JetBrains Mono',monospace",size:11},color:P.a2+'99',callback:v=>'$'+v+'B'},border:{display:false}}
        }
      },
      plugins:[{
        id:'eventLines',
        afterDraw(chart){
          const {ctx,chartArea:{top,bottom}} = chart;
          const xScale = chart.scales.x;
          D.daily.forEach((d,i)=>{
            const isInterest = d.interest > 10;
            const isSSA      = d.hh_transfers > 25;
            if(!isInterest && !isSSA) return;
            const px = xScale.getPixelForValue(i);
            const color = isInterest ? P.a2 : P.pos;
            ctx.save();
            ctx.setLineDash([3,4]);
            ctx.strokeStyle = color+'66';
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.moveTo(px, top);
            ctx.lineTo(px, bottom);
            ctx.stroke();
            ctx.setLineDash([]);
            ctx.fillStyle = color+'CC';
            ctx.font = "10px 'JetBrains Mono',monospace";
            ctx.textAlign = 'center';
            ctx.fillText(isInterest ? '\u2605' : '\u25B2', px, top + 12);
            ctx.restore();
          });
        }
      }]
    });
  }

  if(view==='cumulative'){
    const months = ['Oct','Nov','Dec','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep'];
    const fy_cur = D.cumulative[String(D.meta.fiscal_year)]||[];
    const fy_prev = D.cumulative[String(D.meta.fiscal_year-1)]||[];

    // Init cumulative chart (lazy, once)
    if(!charts['cumulative']){
      const curData = months.map((_,i)=>{const r=fy_cur.find(x=>x.fm===i+1);return r?r.cum_cfi:null;});
      const prevData = months.map((_,i)=>{const r=fy_prev.find(x=>x.fm===i+1);return r?r.cum_cfi:null;});
      const ctx = document.getElementById('chart-cumulative').getContext('2d');
      charts['cumulative'] = new Chart(ctx,{
        type:'line',
        data:{labels:months,datasets:[
          {label:'FY'+D.meta.fiscal_year,data:curData,borderColor:P.a1,borderWidth:2.5,pointRadius:3,pointBackgroundColor:P.a1,
           backgroundColor:P.a1+'1F',fill:true,tension:0.3,spanGaps:false},
          {label:'FY'+(D.meta.fiscal_year-1),data:prevData,borderColor:P.muted,borderWidth:2,borderDash:[6,3],pointRadius:2,pointBackgroundColor:P.muted,
           backgroundColor:P.muted+'0F',fill:true,tension:0.3}
        ]},
        options:{responsive:true,maintainAspectRatio:false,
          plugins:{legend:{display:false},tooltip:{
            backgroundColor:'#0f0f13',borderColor:'rgba(255,255,255,0.1)',borderWidth:1,
            titleFont:{family:"'JetBrains Mono',monospace",size:12,weight:'bold'},bodyFont:{family:"'JetBrains Mono',monospace",size:12},
            titleColor:'#FAFAFA',bodyColor:'#FAFAFA',cornerRadius:8,padding:12,
            callbacks:{label:ctx=>ctx.parsed.y!==null?`${ctx.dataset.label}: ${fmt(ctx.parsed.y)}`:''}
          }},
          scales:{
            x:{grid:{display:false},ticks:{font:{family:"'JetBrains Mono',monospace",size:11},color:P.muted},border:{display:false}},
            y:{grid:{color:P.grid},ticks:{font:{family:"'JetBrains Mono',monospace",size:11},color:P.muted,callback:v=>'$'+v+'B'},border:{display:false}}
          }
        }
      });
    }

    // Wire sub-toggle (once)
    if(!charts['cumulative-wired']){
      charts['cumulative-wired'] = true;
      const btnCumul = document.getElementById('subview-cumul');
      const btnDelta = document.getElementById('subview-delta');
      const wrapCumul = document.getElementById('wrap-cumulative');
      const wrapDelta = document.getElementById('wrap-cumul-delta');
      const legend  = document.getElementById('cumul-legend');
      const title   = document.getElementById('cumul-title');
      const sub     = document.getElementById('cumul-sub');

      btnCumul.addEventListener('click',()=>{
        btnCumul.classList.add('active'); btnDelta.classList.remove('active');
        wrapCumul.style.display=''; wrapDelta.style.display='none';
        legend.style.display='';
        title.textContent='Cumulative Fiscal Injection \u2014 FY'+D.meta.fiscal_year+' vs FY'+(D.meta.fiscal_year-1);
        sub.textContent='Running total of core fiscal injection by fiscal month. The gap between lines shows YoY change in how much the government has added to the private sector.';
      });

      btnDelta.addEventListener('click',()=>{
        btnDelta.classList.add('active'); btnCumul.classList.remove('active');
        wrapDelta.style.display=''; wrapCumul.style.display='none';
        legend.style.display='none';
        title.textContent='YoY Gap \u2014 FY'+D.meta.fiscal_year+' minus FY'+(D.meta.fiscal_year-1)+' (by fiscal month)';
        sub.textContent='Green = current year running ahead of prior year. Red = running behind. A rising trend means the gap is closing \u2014 momentum improving.';

        // Init delta chart (lazy, once)
        if(!charts['cumul-delta']){
          const deltaData = months.map((_,i)=>{
            const cur  = fy_cur.find(x=>x.fm===i+1);
            const prev = fy_prev.find(x=>x.fm===i+1);
            return (cur && prev) ? +(cur.cum_cfi - prev.cum_cfi).toFixed(2) : null;
          });
          const ctx2 = document.getElementById('chart-cumul-delta').getContext('2d');
          charts['cumul-delta'] = new Chart(ctx2,{
            type:'bar',
            data:{labels:months,datasets:[
              {label:'YoY Gap',data:deltaData,
               backgroundColor:deltaData.map(v=>v===null?'transparent':v>=0?P.pos+'CC':P.neg+'CC'),
               borderRadius:4,barPercentage:0.5}
            ]},
            options:{responsive:true,maintainAspectRatio:false,
              plugins:{legend:{display:false},tooltip:{
                backgroundColor:'#0f0f13',borderColor:'rgba(255,255,255,0.1)',borderWidth:1,
                titleFont:{family:"'JetBrains Mono',monospace",size:12,weight:'bold'},bodyFont:{family:"'JetBrains Mono',monospace",size:12},
                titleColor:'#FAFAFA',bodyColor:'#FAFAFA',cornerRadius:8,padding:12,
                callbacks:{label:c=>{
                  const v=c.parsed.y;
                  if(v===null) return '';
                  return v>=0?`+${fmt(v)} ahead of prior year`:`${fmt(v)} behind prior year`;
                }}
              }},
              scales:{
                x:{grid:{display:false},ticks:{font:{family:"'JetBrains Mono',monospace",size:11},color:P.muted},border:{display:false}},
                y:{grid:{color:P.grid},ticks:{font:{family:"'JetBrains Mono',monospace",size:11},color:P.muted,callback:v=>(v>0?'+':'')+v+'B'},border:{display:false}}
              }
            }
          });
        }
      });
    }
  }

  if(view==='weekly' && !charts['weekly']){
    const ctx = document.getElementById('chart-weekly').getContext('2d');
    charts['weekly'] = new Chart(ctx,{
      type:'bar',
      data:{labels:D.weekly.map(w=>w.week),datasets:[
        {label:'Core Fiscal Injection',data:D.weekly.map(w=>w.cfi),
         backgroundColor:D.weekly.map(w=>w.cfi>=0?P.pos+'D9':P.neg+'D9'),borderRadius:4,barPercentage:0.4},
        {label:'Reserve Effect',data:D.weekly.map(w=>w.reserve),
         backgroundColor:D.weekly.map(w=>w.reserve>=0?P.a1+'99':P.a3+'99'),borderRadius:4,barPercentage:0.4}
      ]},
      options:{responsive:true,maintainAspectRatio:false,
        interaction:{mode:'index',intersect:false},
        plugins:{legend:{display:false},tooltip:{
          backgroundColor:'#0f0f13',borderColor:'rgba(255,255,255,0.1)',borderWidth:1,
          titleFont:{family:"'JetBrains Mono',monospace",size:12,weight:'bold'},bodyFont:{family:"'JetBrains Mono',monospace",size:12},
          titleColor:'#FAFAFA',bodyColor:'#FAFAFA',cornerRadius:8,padding:12,
          callbacks:{label:ctx=>`${ctx.dataset.label}: ${fmt(ctx.parsed.y)}`}
        }},
        scales:{
          x:{grid:{display:false},ticks:{font:{family:"'JetBrains Mono',monospace",size:10},color:P.muted,maxRotation:0},border:{display:false}},
          y:{grid:{color:P.grid},ticks:{font:{family:"'JetBrains Mono',monospace",size:11},color:P.muted,callback:v=>v+'B'},border:{display:false}}
        }
      }
    });
  }

  if(view==='composition' && !charts['comp-taxes']){
    const allMonths = ['Oct','Nov','Dec','Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep'];
    const fy_cur = D.cumulative[String(D.meta.fiscal_year)]||[];
    const fy_prev = D.cumulative[String(D.meta.fiscal_year-1)]||[];
    const maxFm = fy_cur.reduce((m,x)=>Math.max(m,x.fm),0);
    const months = allMonths.slice(0, maxFm);
    const get = (arr,fm,key) => {const r=arr.find(x=>x.fm===fm);return r?r[key]:0;};
    const pairs = [
      {id:'comp-taxes',curKey:'taxes',prevKey:'taxes',color:P.neg},
      {id:'comp-hh',curKey:'hh',prevKey:'hh',color:P.pos},
      {id:'comp-interest',curKey:'interest',prevKey:'interest',color:P.a2},
      {id:'comp-tariffs',curKey:'tariffs',prevKey:'tariffs',color:P.a3},
    ];
    pairs.forEach(({id,curKey,prevKey,color})=>{
      const ctx = document.getElementById('chart-'+id).getContext('2d');
      charts[id] = new Chart(ctx,{
        type:'bar',
        data:{labels:months,datasets:[
          {label:'FY'+(D.meta.fiscal_year-1),data:months.map((_,i)=>get(fy_prev,i+1,prevKey)),
           backgroundColor:'rgba(255,255,255,0.12)',borderRadius:3,barPercentage:0.6},
          {label:'FY'+D.meta.fiscal_year,data:months.map((_,i)=>get(fy_cur,i+1,curKey)),
           backgroundColor:color+'D9',borderRadius:3,barPercentage:0.6}
        ]},
        options:{responsive:true,maintainAspectRatio:false,
          plugins:{legend:{display:false},tooltip:{
            backgroundColor:'#0f0f13',borderColor:'rgba(255,255,255,0.1)',borderWidth:1,
            titleFont:{family:"'JetBrains Mono',monospace",size:11},bodyFont:{family:"'JetBrains Mono',monospace",size:11},
            titleColor:'#FAFAFA',bodyColor:'#FAFAFA',cornerRadius:6,padding:10,
            callbacks:{label:ctx=>`${ctx.dataset.label}: ${fmt(ctx.parsed.y)}`}
          }},
          scales:{
            x:{grid:{display:false},ticks:{font:{family:"'JetBrains Mono',monospace",size:10},color:P.muted},border:{display:false}},
            y:{grid:{color:P.grid},ticks:{font:{family:"'JetBrains Mono',monospace",size:10},color:P.muted,callback:v=>v+'B'},border:{display:false}}
          }
        }
      });
    });
  }

  if(view==='issuance' && !charts['issuance']){
    const barColors = [P.a1,P.a2,P.a3,P.pos,P.a4,P.muted];
    const ctx = document.getElementById('chart-issuance').getContext('2d');
    charts['issuance'] = new Chart(ctx,{
      type:'bar',
      data:{labels:D.debt_decomp.map(d=>d.name),datasets:[
        {label:'Net Issuance',data:D.debt_decomp.map(d=>d.net),
         backgroundColor:D.debt_decomp.map((_,i)=>(barColors[i]||P.a1)+'D9'),
         borderRadius:6,barPercentage:0.5}
      ]},
      options:{responsive:true,maintainAspectRatio:false,indexAxis:'y',
        plugins:{legend:{display:false},tooltip:{
          backgroundColor:'#0f0f13',borderColor:'rgba(255,255,255,0.1)',borderWidth:1,
          titleFont:{family:"'JetBrains Mono',monospace",size:12,weight:'bold'},bodyFont:{family:"'JetBrains Mono',monospace",size:12},
          titleColor:'#FAFAFA',bodyColor:'#FAFAFA',cornerRadius:8,padding:12,
          callbacks:{label:ctx=>`Net: ${fmt(ctx.parsed.x)}`}
        }},
        scales:{
          x:{grid:{color:P.grid},ticks:{font:{family:"'JetBrains Mono',monospace",size:11},color:P.muted,callback:v=>'$'+v+'B'},border:{display:false}},
          y:{grid:{display:false},ticks:{font:{family:"'Inter',sans-serif",size:13,weight:600},color:'#FAFAFA'},border:{display:false}}
        }
      }
    });

    const ctx2 = document.getElementById('chart-billcoupon').getContext('2d');
    charts['billcoupon'] = new Chart(ctx2,{
      type:'bar',
      data:{labels:D.weekly.map(w=>w.week),datasets:[
        {label:'Bills (net)',data:D.weekly.map(w=>w.bills),backgroundColor:P.a1+'D9',borderRadius:3,barPercentage:0.4},
        {label:'Coupon (net)',data:D.weekly.map(w=>w.coupon),backgroundColor:P.a2+'D9',borderRadius:3,barPercentage:0.4}
      ]},
      options:{responsive:true,maintainAspectRatio:false,
        interaction:{mode:'index',intersect:false},
        plugins:{legend:{display:false},tooltip:{
          backgroundColor:'#0f0f13',borderColor:'rgba(255,255,255,0.1)',borderWidth:1,
          titleFont:{family:"'JetBrains Mono',monospace",size:11},bodyFont:{family:"'JetBrains Mono',monospace",size:11},
          titleColor:'#FAFAFA',bodyColor:'#FAFAFA',cornerRadius:6,padding:10,
          callbacks:{label:ctx=>`${ctx.dataset.label}: ${fmt(ctx.parsed.y)}`}
        }},
        scales:{
          x:{grid:{display:false},ticks:{font:{family:"'JetBrains Mono',monospace",size:10},color:P.muted,maxRotation:0},border:{display:false}},
          y:{grid:{color:P.grid},ticks:{font:{family:"'JetBrains Mono',monospace",size:10},color:P.muted,callback:v=>v+'B'},border:{display:false}}
        }
      }
    });
  }

  // Technicals — lazy render on first tab click
  if(view==='technicals' && !charts['technicals'] && window._techData){
    renderTechnicals(window._techData);
    charts['technicals'] = true;
  }

  if(view==='relstrength' && !charts['relstrength-init']){
    renderRelStrength(window._rsData || null);
    charts['relstrength-init'] = true;
  }
}

// -- Report tab ---------------------------------------------------------------
function md(s){return (s||'').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>');}

function renderReport(R){
  const el = document.getElementById('report-content');
  if(!el||!R) return;

  let h = '';

  // Framework
  if(R.framework){
    h += `<div class="rpt" style="border-color:rgba(6,182,212,0.2)">
      <div class="rpt-h2">Framework</div>
      <div class="rpt-p">${md(R.framework)}</div>
    </div>`;
  }

  // Executive Summary
  h += `<div class="rpt" id="rpt-exec">
    <div class="rpt-h2">Executive Summary</div>
    <div class="rpt-p">${md(R.executive_summary)}</div>
  </div>`;

  // What Changed This Week
  h += `<div class="rpt">
    <div class="rpt-h2">What Changed in the Last Week</div>
    <div class="rpt-p">${md(R.what_changed)}</div>
  </div>`;

  // MTD and FYTD Scorecard
  h += `<div class="rpt">
    <div class="rpt-h2">MTD and FYTD Scorecard</div>
    <ul class="rpt-ul">${R.scorecard_items.map(s=>`<li>${md(s)}</li>`).join('')}</ul>
  </div>`;

  // Drivers and Attribution
  h += `<div class="rpt">
    <div class="rpt-h2">Drivers and Attribution</div>
    <div class="rpt-p">${md(R.drivers)}</div>
  </div>`;

  // Key Data Signals
  if(R.signals && R.signals.length){
    h += `<div class="rpt">
      <div class="rpt-h2">Key Data Signals</div>
      ${R.signals.map(s=>`
        <div class="signal-box">
          <div class="signal-title">${s.title}</div>
          <div class="rpt-p" style="margin-bottom:0">${md(s.text)}</div>
        </div>
      `).join('')}
    </div>`;
  }

  // Regime Read and Forward Implications
  h += `<div class="rpt">
    <div class="rpt-h2">Regime Read and Forward Implications</div>
    <div class="rpt-p"><strong>Base case:</strong> ${md(R.base_case)}</div>
    <div class="rpt-p"><strong>Alternative scenario:</strong> ${md(R.alt_scenario)}</div>
    <div class="rpt-p"><strong>Falsification:</strong> ${md(R.falsification)}</div>
    ${R.forward_text?`<div class="rpt-h3">Things to Look Forward To</div><div class="rpt-p">${md(R.forward_text)}</div>`:''}
    ${R.forward_calendar&&R.forward_calendar.length?`
      <div class="rpt-h3">Upcoming Calendar</div>
      <ul class="rpt-ul">${R.forward_calendar.map(c=>`<li>${md(c)}</li>`).join('')}</ul>
    `:''}
  </div>`;

  // Market Mapping Layer
  h += `<div class="rpt" id="rpt-market-map">
    <div class="rpt-h2">Market Mapping Layer</div>
    <div class="rpt-p" style="margin-bottom:12px">Auto-derived from DTS transmission analysis. These are probabilistic biases based on the operational flow of reserves, not predictions. The interest income channel partially offsets any \"restrictive\" fiscal read at current rate levels.</div>
    <table class="rpt-map">
      <thead><tr><th>Asset Bucket</th><th>Probabilistic Bias</th><th>Reasoning</th></tr></thead>
      <tbody>${R.market_map.map(m=>`
        <tr><td>${m.asset}</td><td>${m.bias}</td><td style="color:var(--text-secondary);font-size:var(--type-body-sm)">${m.reason}</td></tr>
      `).join('')}</tbody>
    </table>
  </div>`;

  // ETF Sector Tilts
  if(R.etf_tilts && R.etf_tilts.items && R.etf_tilts.items.length){
    const tiltColor = (t) => t === 'overweight' ? 'var(--green)' : t === 'underweight' ? 'var(--red)' : 'var(--text-secondary)';
    const tiltBadge = (t) => `<span style="color:${tiltColor(t)};font-weight:600">${t.charAt(0).toUpperCase()+t.slice(1)}</span>`;
    const catIcon = (c) => ({'cyclical':'\u{1F4C8}','defensive':'\u{1F6E1}','safe-haven':'\u{1F4B0}','growth':'\u{1F680}','credit':'\u{1F4B3}'}[c]||'');
    const activeItems = R.etf_tilts.items.filter(t => t.tilt !== 'neutral');
    h += `<div class="rpt" id="rpt-etf-tilts">
      <div class="rpt-h2">ETF Sector Tilts</div>
      <div class="rpt-p" style="margin-bottom:12px">${R.etf_tilts.summary||''}</div>
      <table class="rpt-map">
        <thead><tr><th>Ticker</th><th>Name</th><th>Category</th><th>Tilt</th><th>Rationale</th></tr></thead>
        <tbody>${activeItems.map(t=>`
          <tr>
            <td style="font-weight:700;font-family:'JetBrains Mono',monospace">${t.ticker}</td>
            <td>${t.name}</td>
            <td>${catIcon(t.category)} ${t.category}</td>
            <td>${tiltBadge(t.tilt)}</td>
            <td style="color:var(--text-secondary);font-size:var(--type-body-sm)">${t.rationale}</td>
          </tr>
        `).join('')}</tbody>
      </table>
      ${R.etf_tilts.contrarian_watch && R.etf_tilts.contrarian_watch.length ?
        `<div class="rpt-p" style="margin-top:14px"><strong>Contrarian Watchlist:</strong> ${
          R.etf_tilts.contrarian_watch.map(w=>`<span style="font-weight:600">${w.ticker}</span> (${w.rationale})`).join(' · ')
        }</div>` : ''}
    </div>`;
  }

  // Speculative Positioning (COT)
  if(R.cot && R.cot.items && R.cot.items.length){
    const zColor = (z) => z > 1.5 ? 'var(--red)' : z > 1 ? 'var(--yellow)' : z < -1.5 ? 'var(--green)' : z < -1 ? 'var(--blue-bright)' : 'var(--text-secondary)';
    const sigBadge = (sig) => {
      const colors = {'Extreme Long':'var(--red)','Elevated Long':'var(--yellow)','Extreme Short':'var(--green)','Elevated Short':'var(--blue-bright)','Neutral':'var(--text-secondary)'};
      return `<span style="color:${colors[sig]||'var(--text-secondary)'};font-weight:600">${sig}</span>`;
    };
    h += `<div class="rpt" id="rpt-cot">
      <div class="rpt-h2">Speculative Positioning - Contrarian Indicator</div>
      <div class="rpt-p" style="margin-bottom:4px">CFTC Commitment of Traders (Traders in Financial Futures). Leveraged Funds = hedge funds &amp; CTAs - historically wrong at extremes.</div>
      <div class="rpt-p" style="margin-bottom:12px;font-size:var(--type-body-sm);color:var(--text-secondary)">Data as of: ${R.cot.data_date || 'N/A'} · Published weekly on Friday for prior Tuesday positions · Z-score >1.5 or <-1.5 = extreme</div>
      <table class="rpt-map">
        <thead><tr><th>Contract</th><th>Lev Net</th><th>Z-Score</th><th>%ile</th><th>1w Chg</th><th>Signal</th></tr></thead>
        <tbody>${R.cot.items.map(c=>`
          <tr>
            <td>${c.label}</td>

  // Speculative Leverage (FINRA Margin Debt)

    const mSigBadge = (sig) => {
      const colors = {'Extreme Leverage':'var(--red)','Elevated Leverage':'var(--yellow)','Extreme Deleveraging':'var(--green)','Reduced Leverage':'var(--blue-bright)','Normal':'var(--text-secondary)'};
      return `<span style="color:${colors[sig]||'var(--text-secondary)'};font-weight:600">${sig}</span>`;
    };
    const mFmt = (v,dp=1) => v != null ? (v>0?'+':'')+v.toFixed(dp) : 'N/A';
    h += `<div class="rpt" id="rpt-margin">
      <div class="rpt-h2">Speculative Leverage - FINRA Margin Debt</div>
      <div class="rpt-p" style="margin-bottom:4px">Aggregate debit balances in customer securities margin accounts. Proxy for speculative leverage — historically peaks near market tops.</div>
      <div class="rpt-p" style="margin-bottom:12px;font-size:var(--type-body-sm);color:var(--text-secondary)">Data as of: ${M.month || 'N/A'} · Published monthly ~3rd week of following month · Z-score vs trailing 24 months</div>
      <table class="rpt-map">
        <thead><tr><th>Metric</th><th>Value</th></tr></thead>
        <tbody>
          <tr><td>Margin Debt</td><td style="font-family:'JetBrains Mono',monospace;font-weight:700">$${M.margin_debt_bn.toFixed(1)}bn</td></tr>
          <tr><td>Net Balance (Free Credit − Debt)</td><td style="font-family:'JetBrains Mono',monospace;color:${M.net_margin_balance_bn < 0 ? 'var(--red)' : 'var(--green)'}">$${M.net_margin_balance_bn.toFixed(1)}bn</td></tr>
          <tr><td>Month-over-Month</td><td style="font-family:'JetBrains Mono',monospace;color:${M.mom_change_pct > 0 ? 'var(--red)' : 'var(--green)'}">${mFmt(M.mom_change_pct)}%</td></tr>
          <tr><td>Year-over-Year</td><td style="font-family:'JetBrains Mono',monospace;color:${M.yoy_change_pct > 0 ? 'var(--red)' : 'var(--green)'}">${mFmt(M.yoy_change_pct)}%</td></tr>
          <tr><td>3-Month Trend</td><td style="font-weight:600;color:${M.trend_3m==='Rising'?'var(--red)':M.trend_3m==='Falling'?'var(--green)':'var(--text-secondary)'}">${M.trend_3m}</td></tr>
          <tr><td>Z-Score (24m)</td><td style="color:${mzColor(M.z_score_24m)};font-weight:700;font-family:'JetBrains Mono',monospace">${mFmt(M.z_score_24m,2)}</td></tr>
          <tr><td>Percentile (24m)</td><td style="font-family:'JetBrains Mono',monospace">${M.percentile_24m != null ? M.percentile_24m.toFixed(0) : 'N/A'}%</td></tr>
          <tr><td>Signal</td><td>${mSigBadge(M.signal)}</td></tr>
        </tbody>
      </table>
      ${M.narrative ? `<div class="rpt-p" style="margin-top:14px">${md(M.narrative)}</div>` : ''}
    </div>`;
  }

  // FRED References
  if(R.fred_refs && R.fred_refs.length){
    h += `<div class="rpt" id="rpt-fred">
      <div class="rpt-h2">Suggested FRED Charts</div>
      <div class="rpt-p" style="margin-bottom:12px">Data-conditional references - include in your note where they add context to the current flow picture.</div>
      ${R.fred_refs.map(f=>`
        <a class="rpt-fred" href="${f.url}" target="_blank" rel="noopener">
          <div class="rpt-fred-title">${f.title}</div>
          <div class="rpt-fred-reason">${f.reason}</div>
          <div class="rpt-fred-url">${f.url}</div>
        </a>
      `).join('')}
    </div>`;
  }

  // Risks, Seasonality, and Data Caveats
  h += `<div class="rpt">
    <div class="rpt-h2">Risks, Seasonality, and Data Caveats</div>
    <ul class="rpt-ul">${R.caveats.map(c=>`<li>${c}</li>`).join('')}</ul>
  </div>`;

  el.innerHTML = h;
}

      t += c.label + ': Net ' + (c.lev_net>0?'+':'') + c.lev_net.toLocaleString() + ' | Z-Score: ' + c.z_score.toFixed(1) + ' | Signal: ' + c.signal + '\n';

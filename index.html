// ── Signal Log tab ──────────────────────────────────────────────────────────
function renderSignalLog(entries){
  const el = document.getElementById('signal-log-content');
  if(!el) return;

  if(!entries || entries.length === 0){
    el.innerHTML = `<div class="insight"><strong>No signal data yet.</strong> The signal log starts accumulating after the first daily pipeline run with log_daily_signal.py. Check that run_daily_dts.sh includes the logging step.</div>`;
    return;
  }

  // Sort newest first
  const sorted = [...entries].sort((a,b) => b.date.localeCompare(a.date));

  // Health metrics
  const totalDays = sorted.length;
  const newest = sorted[0].date;
  const oldest = sorted[sorted.length-1].date;

  // US Federal holidays — computed algorithmically for any year
  const usFederalHolidays = (year) => {
    const h = new Set();
    const obs = (m, d) => { // observed date: Mon if Sun, Fri if Sat
      const dt = new Date(year, m, d), dow = dt.getDay();
      if(dow===0) dt.setDate(d+1); else if(dow===6) dt.setDate(d-1);
      h.add(dt.toISOString().slice(0,10));
    };
    const nth = (m, wd, n) => { // nth weekday of month
      const dt = new Date(year, m, 1); let cnt=0;
      while(true){ if(dt.getDay()===wd&&++cnt===n) return dt.toISOString().slice(0,10); dt.setDate(dt.getDate()+1); }
    };
    const last = (m, wd) => { // last weekday of month
      const dt = new Date(year, m+1, 0);
      while(dt.getDay()!==wd) dt.setDate(dt.getDate()-1);
      return dt.toISOString().slice(0,10);
    };
    obs(0,1);           // New Year's Day
    h.add(nth(0,1,3));  // MLK Day (3rd Mon Jan)
    h.add(nth(1,1,3));  // Presidents' Day (3rd Mon Feb)
    h.add(last(4,1));   // Memorial Day (last Mon May)
    obs(5,19);          // Juneteenth
    obs(6,4);           // Independence Day
    h.add(nth(8,1,1));  // Labor Day (1st Mon Sep)
    h.add(nth(9,1,2));  // Columbus Day (2nd Mon Oct)
    obs(10,11);         // Veterans Day
    h.add(nth(10,4,4)); // Thanksgiving (4th Thu Nov)
    obs(11,25);         // Christmas
    return h;
  };

  // Gap detection — find missing business days (excluding weekends + US Federal holidays)
  const dateSet = new Set(sorted.map(e=>e.date));
  const gaps = [];
  if(totalDays > 1){
    const start = new Date(oldest+'T00:00:00');
    const end = new Date(newest+'T00:00:00');
    const usHolidays = new Set();
    for(let y=start.getFullYear(); y<=end.getFullYear(); y++){
      usFederalHolidays(y).forEach(d=>usHolidays.add(d));
    }
    for(let d = new Date(start); d <= end; d.setDate(d.getDate()+1)){
      const dow = d.getDay();
      if(dow===0||dow===6) continue; // skip weekends
      const ds = d.toISOString().slice(0,10);
      if(usHolidays.has(ds)) continue; // skip US Federal holidays
      if(!dateSet.has(ds)) gaps.push(ds);
    }
  }

  // Regime breakdown
  const regimeCounts = {};
  sorted.forEach(e => { regimeCounts[e.regime] = (regimeCounts[e.regime]||0) + 1; });

  // Days until Step 2 threshold
  const daysTo30 = Math.max(0, 30 - totalDays);

  const regimeBadge = (r) => {
    const cls = r==='Supportive'?'sl-sup':r==='Restrictive'?'sl-res':'sl-neu';
    return `<span class="sl-badge ${cls}">${r}</span>`;
  };

  const zClr = (z) => {
    if(z===null||z===undefined) return 'var(--text-dim)';
    if(z > 1.5) return '#ef4444';
    if(z > 1.0) return '#f59e0b';
    if(z < -1.5) return '#10b981';
    if(z < -1.0) return '#60a5fa';
    return 'var(--text-secondary)';
  };

  const fmtZ = (z) => {
    if(z===null||z===undefined) return '—';
    return (z>=0?'+':'')+z.toFixed(1);
  };

  let h = '';

  // Health cards
  h += `<div class="sl-health">
    <div class="card">
      <div class="card-label mono">Days Logged</div>
      <div class="card-value mono" style="color:${totalDays>=30?P.pos:P.a2}">${totalDays}</div>
      <div class="card-change mono" style="color:${daysTo30>0?'var(--yellow)':'var(--green)'}">${daysTo30>0?daysTo30+' to Step 2':'✓ Ready for Step 2'}</div>
    </div>
    <div class="card">
      <div class="card-label mono">Latest Entry</div>
      <div class="card-value mono">${newest}</div>
      <div class="card-change mono" style="color:var(--text-secondary)">Oldest: ${oldest}</div>
    </div>
    <div class="card">
      <div class="card-label mono">Gaps Detected</div>
      <div class="card-value mono" style="color:${gaps.length>0?P.neg:P.pos}">${gaps.length}</div>
      <div class="card-change mono" style="color:${gaps.length>0?'var(--red)':'var(--green)'}">${gaps.length>0?'Missing business days':'No gaps'}</div>
    </div>
    <div class="card">
      <div class="card-label mono">Regime Split</div>
      <div class="card-value" style="font-size:var(--type-body)">${Object.entries(regimeCounts).map(([r,c])=>regimeBadge(r)+' '+c).join(' ')}</div>
    </div>
  </div>`;

  // Gap warning — collapsible chips with search links
  if(gaps.length > 0){
    const gapChips = gaps.map(d => {
      const q = encodeURIComponent(`US Treasury closed ${d} federal holiday`);
      return `<a class="sl-gap-chip" href="https://www.google.com/search?q=${q}" target="_blank" rel="noopener" title="Search why ${d} is missing">${d}</a>`;
    }).join('');
    h += `<div class="sl-gap">
      <span class="sl-gap-toggle" onclick="this.classList.toggle('open');this.nextElementSibling.classList.toggle('open')">
        <span class="sl-gap-arrow">▶</span>
        <span class="sl-gap-count">${gaps.length}</span> missing business days — click dates to search why
      </span>
      <div class="sl-gap-chips">${gapChips}</div>
    </div>`;
  }

  // Table
  h += `<div class="sl-wrap"><table class="sl-table">
    <thead><tr>
      <th>Date</th><th>Regime</th><th>Momentum</th>
      <th>TGA ($bn)</th><th>TGA Trend</th>
      <th>5d Inj ($M)</th><th>20d Inj ($M)</th>
      <th>Eq Bias</th><th>USD Bias</th>
      <th>SPX z</th><th>10Y z</th><th>2Y z</th><th>VIX z</th>
    </tr></thead>
    <tbody>`;

  sorted.forEach(e => {
    h += `<tr>
      <td style="color:var(--text-primary);font-weight:600">${e.date}</td>
      <td>${regimeBadge(e.regime)}</td>
      <td style="color:${e.regime_momentum==='Accelerating'?P.pos:e.regime_momentum==='Decelerating'?P.neg:P.muted}">${e.regime_momentum}</td>
      <td>${e.tga_level!==null?e.tga_level.toFixed(0):'—'}</td>
      <td style="color:${e.tga_trend==='Building'?P.neg:e.tga_trend==='Drawing'?P.pos:P.muted}">${e.tga_trend}</td>
      <td style="color:${(e.net_fiscal_injection_5d||0)>=0?P.pos:P.neg}">${e.net_fiscal_injection_5d!==null?e.net_fiscal_injection_5d.toLocaleString():'—'}</td>
      <td>${e.net_fiscal_injection_20d!==null?e.net_fiscal_injection_20d.toLocaleString():'—'}</td>
      <td style="font-size:var(--type-caption)">${e.market_map_equities||'—'}</td>
      <td style="font-size:var(--type-caption)">${e.market_map_usd||'—'}</td>
      <td style="color:${zClr(e.cot_sp500_zscore)};font-weight:700">${fmtZ(e.cot_sp500_zscore)}</td>
      <td style="color:${zClr(e.cot_10y_zscore)};font-weight:700">${fmtZ(e.cot_10y_zscore)}</td>
      <td style="color:${zClr(e.cot_2y_zscore)};font-weight:700">${fmtZ(e.cot_2y_zscore)}</td>
      <td style="color:${zClr(e.cot_vix_zscore)};font-weight:700">${fmtZ(e.cot_vix_zscore)}</td>
    </tr>`;
  });

  h += `</tbody></table></div>`;

  el.innerHTML = h;
}

// ── Return Attribution ─────────────────────────────────────────────────────
function renderReturnAttribution(data){
  const el = document.getElementById('return-attribution-content');
  if(!el) return;

  if(!data || !data.summary){
    el.innerHTML = '';
    return;
  }

  const S = data.summary;
  const scored = data.scored_signals || 0;
  const total = data.total_signals || 0;

  const fmtHr = (hr) => {
    if(!hr || hr.rate===null || hr.rate===undefined) return `<span class="rt-pending">pending</span>`;
    const clr = hr.rate >= 60 ? P.pos : hr.rate < 40 ? P.neg : P.muted;
    return `<span style="color:${clr};font-weight:700">${hr.rate.toFixed(0)}%</span> <span style="color:var(--text-dim);font-size:var(--type-caption)">(${hr.hits}/${hr.total})</span>`;
  };

  const fmtRet = (v, suffix='%') => {
    if(v===null||v===undefined) return `<span class="rt-pending">pending</span>`;
    const clr = v >= 0 ? P.pos : P.neg;
    return `<span style="color:${clr}">${v>=0?'+':''}${v.toFixed(2)}${suffix}</span>`;
  };

  let h = '';

  // Scoring progress
  h += `<div class="sl-section">
    <div class="sl-section-title">Return Attribution</div>
    <div class="sl-section-sub">Forward returns scored against each logged signal. Updated daily as new market closes arrive. Computed at: ${data.computed_at||'—'}</div>
  </div>`;

  h += `<div class="sl-health" style="margin-bottom:20px">
    <div class="card">
      <div class="card-label mono">Signals Scored (5d)</div>
      <div class="card-value mono" style="color:${scored>0?P.pos:P.a2}">${scored}/${total}</div>
      <div class="card-change mono" style="color:var(--text-secondary)">${total-scored} awaiting forward data</div>
    </div>
  </div>`;

  // Regime performance table
  const regimes = S.regime_performance || {};
  if(Object.keys(regimes).length > 0){
    h += `<div class="sl-section" style="margin-top:16px">
      <div class="sl-section-title">Regime → SPX Performance</div>
      <div class="sl-section-sub">When the pipeline called Supportive, did SPX go up? When Restrictive, did it go down?</div>
      <table class="rt-table">
        <thead><tr><th>Regime</th><th>Count</th><th>5d Avg</th><th>5d Hit</th><th>10d Avg</th><th>10d Hit</th><th>20d Avg</th><th>20d Hit</th></tr></thead>
        <tbody>`;

    for(const regime of ['Supportive','Neutral','Restrictive']){
      const p = regimes[regime];
      if(!p) continue;
      const badge = regime==='Supportive'?'sl-sup':regime==='Restrictive'?'sl-res':'sl-neu';
      h += `<tr>
        <td><span class="sl-badge ${badge}">${regime}</span> <span style="color:var(--text-dim);font-size:var(--type-body-sm)">(${p.count})</span></td>
        <td class="mono">${p.count}</td>
        <td>${fmtRet(p.avg_spx_5d)}</td><td>${fmtHr(p.hit_rate_5d)}</td>
        <td>${fmtRet(p.avg_spx_10d)}</td><td>${fmtHr(p.hit_rate_10d)}</td>
        <td>${fmtRet(p.avg_spx_20d)}</td><td>${fmtHr(p.hit_rate_20d)}</td>
      </tr>`;
    }
    h += `</tbody></table></div>`;
  }

  // Market map performance
  const maps = S.market_map_performance || {};
  if(Object.keys(maps).length > 0){
    const mapLabels = {equities:'Equities',usd:'USD',front_end:'Front-End Rates',term_premium:'Term Premium'};
    h += `<div class="sl-section" style="margin-top:24px">
      <div class="sl-section-title">Market Map Directional Calls</div>
      <div class="sl-section-sub">Hit rate when the pipeline made a directional bias call (excludes Neutral)</div>
      <table class="rt-table">
        <thead><tr><th>Asset</th><th>Directional Calls</th><th>5d Hit</th><th>10d Hit</th><th>20d Hit</th></tr></thead>
        <tbody>`;
    for(const [key, p] of Object.entries(maps)){
      h += `<tr>
        <td>${mapLabels[key]||key}</td>
        <td class="mono">${p.count}</td>
        <td>${fmtHr(p.hit_rate_5d)}</td>
        <td>${fmtHr(p.hit_rate_10d)}</td>
        <td>${fmtHr(p.hit_rate_20d)}</td>
      </tr>`;
    }
    h += `</tbody></table></div>`;
  }

  // COT contrarian performance
  const cots = S.cot_performance || {};
  if(Object.keys(cots).length > 0){
    h += `<div class="sl-section" style="margin-top:24px">
      <div class="sl-section-title">COT Contrarian Signals</div>
      <div class="sl-section-sub">Returns when leveraged funds hit extreme positioning (z-score ±1.5)</div>
      <table class="rt-table">
        <thead><tr><th>Contract / Signal</th><th>Count</th><th>5d Avg</th><th>5d Hit</th><th>10d Avg</th><th>10d Hit</th><th>20d Avg</th><th>20d Hit</th></tr></thead>
        <tbody>`;
    for(const [label, p] of Object.entries(cots)){
      const dispLabel = label.replace(/_/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
      h += `<tr>
        <td>${dispLabel} <span style="color:var(--text-dim);font-size:var(--type-caption)">(${p.signal})</span></td>
        <td class="mono">${p.count}</td>
        <td>${fmtRet(p.avg_ret_5d,'')}</td><td>${fmtHr(p.hit_rate_5d)}</td>
        <td>${fmtRet(p.avg_ret_10d,'')}</td><td>${fmtHr(p.hit_rate_10d)}</td>
        <td>${fmtRet(p.avg_ret_20d,'')}</td><td>${fmtHr(p.hit_rate_20d)}</td>
      </tr>`;
    }
    h += `</tbody></table></div>`;
  }

  // Combined performance
  const combined = S.combined_performance || {};
  if(Object.keys(combined).length > 0){

// ── Technicals tab ──────────────────────────────────────────────────────────
function renderTechnicals(techData){
  const canvas = document.getElementById('chart-technicals');
  const insightEl = document.getElementById('tech-insight');
  if(!canvas || !techData || !techData.data || techData.data.length===0){
    if(insightEl) insightEl.innerHTML = '<strong>No technicals data.</strong> Run <code>python generate_technicals.py</code> to create technicals_data.json.';
    return;
  }

  const data = techData.data;
  const n = data.length;
  const ctx = canvas.getContext('2d');
  const dpr = window.devicePixelRatio || 1;

  // Dimensions from parent container
  const rect = canvas.parentElement.getBoundingClientRect();
  const W = rect.width;
  const H = rect.height;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.scale(dpr, dpr);

  const mTop = 16, mBot = 36, mLeft = 60, mRight = 16;
  const cW = W - mLeft - mRight;
  const cH = H - mTop - mBot;

  // Price range with 3% padding
  let pMax = -Infinity, pMin = Infinity;
  data.forEach(d => { if(d.high > pMax) pMax = d.high; if(d.low < pMin) pMin = d.low; });
  const pad = (pMax - pMin) * 0.03;
  const yMax = pMax + pad, yMin = pMin - pad;
  const toY = p => mTop + cH * (1 - (p - yMin) / (yMax - yMin));

  // Candle geometry
  const slotW = cW / n;
  const bodyW = Math.max(1, Math.floor(slotW * 0.65));
  const toX = i => mLeft + slotW * i + slotW / 2;

  // Regime colors: Green=Bullish, Red=Bearish, Blue=Neutral
  const regClr = { bullish: '#10b981', bearish: '#ef4444', neutral: '#06b6d4' };

  // Date label spacing
  const labelStep = Math.max(1, Math.floor(n / 10));

  // ── Draw function (called for initial render + crosshair restore) ──
  function drawChart(){
    ctx.clearRect(0, 0, W, H);

    // Grid lines + y-axis price labels
    const nGrid = 6;
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';
    ctx.font = '11px "JetBrains Mono", monospace';
    for(let i = 0; i <= nGrid; i++){
      const price = yMin + (yMax - yMin) * i / nGrid;
      const y = toY(price);
      ctx.strokeStyle = 'rgba(255,255,255,0.06)';
      ctx.lineWidth = 1;
      ctx.setLineDash([]);
      ctx.beginPath(); ctx.moveTo(mLeft, y); ctx.lineTo(W - mRight, y); ctx.stroke();
      ctx.fillStyle = '#94A3B8';
      ctx.fillText(Math.round(price).toString(), mLeft - 8, y);
    }

    // Candles
    for(let i = 0; i < n; i++){
      const d = data[i];
      const x = toX(i);
      const color = regClr[d.regime] || regClr.neutral;

      // Wick
      ctx.strokeStyle = color;
      ctx.lineWidth = 1;
      ctx.setLineDash([]);
      ctx.beginPath(); ctx.moveTo(x, toY(d.high)); ctx.lineTo(x, toY(d.low)); ctx.stroke();

      // Body
      const bTop = toY(Math.max(d.open, d.close));
      const bBot = toY(Math.min(d.open, d.close));
      ctx.fillStyle = color;
      ctx.fillRect(x - bodyW / 2, bTop, bodyW, Math.max(1, bBot - bTop));
    }

    // SMA(20) line
    ctx.strokeStyle = '#f59e0b';
    ctx.lineWidth = 1.5;
    ctx.setLineDash([]);
    ctx.beginPath();
    let started = false;
    for(let i = 0; i < n; i++){
      if(data[i].sma !== null){
        const x = toX(i);
        const y = toY(data[i].sma);
        if(!started){ ctx.moveTo(x, y); started = true; } else ctx.lineTo(x, y);
      }
    }
    ctx.stroke();

    // X-axis date labels
    ctx.fillStyle = '#94A3B8';
    ctx.font = '10px "JetBrains Mono", monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    for(let i = 0; i < n; i += labelStep){
      ctx.fillText(data[i].date.slice(5), toX(i), H - mBot + 8);
    }
  }

  // Initial draw
  drawChart();

  // Save rendered chart for fast crosshair restore
  const chartImg = ctx.getImageData(0, 0, canvas.width, canvas.height);

  // ── Tooltip + crosshair ──
  let tooltipDiv = canvas.parentElement.querySelector('.tech-tooltip');
  if(!tooltipDiv){
    tooltipDiv = document.createElement('div');
    tooltipDiv.className = 'tech-tooltip';
    canvas.parentElement.appendChild(tooltipDiv);
  }

  let lastIdx = -1;

  canvas.onmousemove = function(e){
    const r = canvas.getBoundingClientRect();
    const mx = e.clientX - r.left;
    const my = e.clientY - r.top;

    const idx = Math.floor((mx - mLeft) / slotW);
    if(idx < 0 || idx >= n || mx < mLeft || mx > W - mRight || my < mTop || my > H - mBot){
      tooltipDiv.style.display = 'none';
      if(lastIdx >= 0){ ctx.putImageData(chartImg, 0, 0); lastIdx = -1; }
      return;
    }

    if(idx !== lastIdx){
      lastIdx = idx;
      const d = data[idx];
      const chg = d.close - d.open;
      const chgPct = ((chg / d.open) * 100).toFixed(2);
      const regLabel = d.regime.charAt(0).toUpperCase() + d.regime.slice(1);
      const regColor = regClr[d.regime] || regClr.neutral;

      tooltipDiv.innerHTML =
        `<div class="tt-date">${d.date}</div>` +
        `<div class="tt-row"><span class="tt-label">O</span> <span>${d.open.toFixed(2)}</span></div>` +
        `<div class="tt-row"><span class="tt-label">H</span> <span>${d.high.toFixed(2)}</span></div>` +
        `<div class="tt-row"><span class="tt-label">L</span> <span>${d.low.toFixed(2)}</span></div>` +
        `<div class="tt-row"><span class="tt-label">C</span> <span style="color:${chg >= 0 ? P.pos : P.neg}">${d.close.toFixed(2)} (${chg >= 0 ? '+' : ''}${chgPct}%)</span></div>` +
        (d.sma !== null ? `<div class="tt-row"><span class="tt-label">SMA</span> <span style="color:#f59e0b">${d.sma.toFixed(2)}</span></div>` : '') +
        `<div class="tt-row"><span class="tt-label">Regime</span> <span style="color:${regColor};font-weight:700">${regLabel}</span></div>`;
      tooltipDiv.style.display = 'block';

      // Position tooltip — flip if near right edge
      const ttW = tooltipDiv.offsetWidth;
      let tx = toX(idx) + 12;
      if(tx + ttW > W - 10) tx = toX(idx) - ttW - 12;
      tooltipDiv.style.left = tx + 'px';
      tooltipDiv.style.top = Math.max(0, my - 60) + 'px';
    }

    // Restore chart image and draw crosshair
    ctx.putImageData(chartImg, 0, 0);
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 4]);
    // Crosshair uses CSS-pixel coords (transform still active)
    const cx = toX(lastIdx);
    ctx.beginPath(); ctx.moveTo(cx, mTop); ctx.lineTo(cx, H - mBot); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(mLeft, my); ctx.lineTo(W - mRight, my); ctx.stroke();
    ctx.restore();
  };

  canvas.onmouseleave = function(){
    tooltipDiv.style.display = 'none';
    if(lastIdx >= 0){ ctx.putImageData(chartImg, 0, 0); lastIdx = -1; }
  };

  // ── Insight box ──
  if(insightEl){
    const latest = data[n - 1];
    const regLabel = latest.regime.charAt(0).toUpperCase() + latest.regime.slice(1);
    const regColor = regClr[latest.regime];

    // Streak count
    let streak = 1;
    for(let i = n - 2; i >= 0; i--){
      if(data[i].regime === latest.regime) streak++; else break;
    }

    // Last regime transition
    let transDate = null, transFrom = null, transTo = null;
    for(let i = n - 1; i > 0; i--){
      if(data[i].regime !== data[i - 1].regime){
        transDate = data[i].date;
        transFrom = data[i - 1].regime.charAt(0).toUpperCase() + data[i - 1].regime.slice(1);
        transTo = data[i].regime.charAt(0).toUpperCase() + data[i].regime.slice(1);
        break;
      }
    }

    // Regime breakdown
    const counts = { bullish: 0, bearish: 0 };
    data.forEach(d => { if(counts[d.regime] !== undefined) counts[d.regime]++; });

    let txt = `<strong style="color:${regColor}">Current: ${regLabel}</strong> — ${streak} consecutive day${streak > 1 ? 's' : ''}.`;
    if(transDate) txt += ` Last transition: ${transFrom} &rarr; ${transTo} on ${transDate}.`;
    txt += `<br/>${techData.lookback_days}-day breakdown: <span style="color:#10b981">${counts.bullish} bullish</span>, <span style="color:#ef4444">${counts.bearish} bearish</span>.`;
    if(latest.sma !== null){
      const diff = latest.close - latest.sma;
      txt += ` Close ${diff >= 0 ? 'above' : 'below'} SMA(20) by <span class="mono">${Math.abs(diff).toFixed(1)} pts</span>.`;
    }
    txt += `<br/>Generated: ${techData.generated_at || 'unknown'}.`;
    insightEl.innerHTML = txt;
  }
}

// Cost parameters (IG spread betting)
const IG_COSTS = {carry_daily:0.000196};
// ETF prices loaded from rs_ratios.json at runtime ($ per share)
let ETF_PRICES_USD = {};

function getTradeIdea(pair) {
  const sig = pair.signal || '';
  const isLongNum = sig.includes('Overweight') || sig.includes('Numerator favored');
  const isShortNum = sig.includes('Underweight') || sig.includes('Denominator favored');
  const dir = isLongNum ? 'long_num' : isShortNum ? 'short_num' : null;
  if (!dir) return null;
  const key = pair.name + '|' + dir;
  const idea = TRADE_IDEAS[key];
  if (!idea) return null;
  const numBlock = IG_UNAVAIL[pair.numerator];
  const denBlock = IG_UNAVAIL[pair.denominator];
  return {...idea, dir, numBlock, denBlock, pair};
}

function buildTradePanel(idea, capital) {
  capital = capital || 3000;
  const marginUse = 0.60;
  const marginAvail = capital * marginUse;

  var num = idea.pair.numerator, den = idea.pair.denominator;
  var numInfo = IG_ETF_INFO[num] || {cls:'US Other',spread:0.0015,pts:10000,margin:0.20,ig:num,igCode:num};
  var denInfo = IG_ETF_INFO[den] || {cls:'US Other',spread:0.0015,pts:10000,margin:0.20,ig:den,igCode:den};

  // Per-leg margin: split available margin, each leg uses its own margin rate
  var numMarginRate = numInfo.margin || 0.20;
  var denMarginRate = denInfo.margin || 0.20;
  var numExposure = (marginAvail / 2) / numMarginRate;
  var denExposure = (marginAvail / 2) / denMarginRate;
  var exposure = (numExposure + denExposure) / 2; // avg for cost calcs

  // Use IG prices (points) for stake calc, yfinance USD for display
  var numPriceUSD = ETF_PRICES_USD[num] || (numInfo.pts / 100);
  var denPriceUSD = ETF_PRICES_USD[den] || (denInfo.pts / 100);
  var numPricePts = numInfo.pts;
  var denPricePts = denInfo.pts;
  var numStake = Math.round(numExposure / numPricePts * 100);
  var denStake = Math.round(denExposure / denPricePts * 100);

  // Spread cost per leg uses actual IG rate, capped at 10c/share
  var numSpreadPerShare = Math.min(numPriceUSD * numInfo.spread, 0.10);
  var denSpreadPerShare = Math.min(denPriceUSD * denInfo.spread, 0.10);
  // Convert to GBP cost: stake (p/pt) * spread in points (cents) * 2 (round-trip) / 100
  var numSpreadCost = (numStake * numSpreadPerShare * 100 * 2) / 100;
  var denSpreadCost = (denStake * denSpreadPerShare * 100 * 2) / 100;
  var totalSpreadCost = numSpreadCost + denSpreadCost;

  var carryCost = (numExposure + denExposure) * IG_COSTS.carry_daily * idea.horizon;
  var totalCost = totalSpreadCost + carryCost;
  var expectedGross = ((numExposure + denExposure) / 2) * (idea.mean / 100);
  var expectedNet = expectedGross - totalCost;
  var freeMargin = capital - marginAvail;
  var totalExposure = numExposure + denExposure;
  var bufferPct = (freeMargin / totalExposure * 100).toFixed(1);

  var numDir, denDir;
  if (idea.dir === 'long_num') { numDir = 'Long'; denDir = 'Short'; }
  else { numDir = 'Short'; denDir = 'Long'; }

  var blocked = '';
  if (idea.numBlock) blocked += '<div style="color:#ef4444;font-size:var(--type-caption);margin-top:6px">' + num + ': ' + idea.numBlock + '</div>';
  if (idea.denBlock) blocked += '<div style="color:#ef4444;font-size:var(--type-caption);margin-top:6px">' + den + ': ' + idea.denBlock + '</div>';

  return '<div class="tp-grid">'
    + '<div class="tp-section">'
    + '<div class="tp-label">Trade Structure</div>'
    + '<div class="tp-row"><span>Direction</span><span class="tp-val">' + numDir + ' ' + num + ' / ' + denDir + ' ' + den + '</span></div>'
    + '<div class="tp-row"><span>IG instruments</span><span class="tp-val">' + numInfo.igCode + ' / ' + denInfo.igCode + '</span></div>'
    + '<div class="tp-row"><span>Hold period</span><span class="tp-val">' + idea.horizon + ' trading days</span></div>'
    + '<div class="tp-row"><span>Backtest mean return</span><span class="tp-val" style="color:#10b981">+' + idea.mean.toFixed(2) + '%</span></div>'
    + '<div class="tp-row"><span>Backtest hit rate</span><span class="tp-val">' + idea.hit.toFixed(1) + '%</span></div>'
    + '<div class="tp-note">' + idea.note + '</div>'
    + blocked
    + '</div>'
    + '<div class="tp-section">'
    + '<div class="tp-label">IG Spread Bet Ticket (\u00A3' + capital.toLocaleString() + ' capital, 60% margin use)</div>'
    + '<table style="width:100%;border-collapse:collapse;font-size:var(--type-body-sm);margin-bottom:8px">'
    + '<thead><tr style="border-bottom:1px solid rgba(255,255,255,0.1)">'
    + '<th style="text-align:left;padding:4px 0;color:var(--text-secondary);font-size:var(--type-caption)">LEG</th>'
    + '<th style="text-align:left;padding:4px 0;color:var(--text-secondary);font-size:var(--type-caption)">DIR</th>'
    + '<th style="text-align:right;padding:4px 0;color:var(--text-secondary);font-size:var(--type-caption)">IG PRICE</th>'
    + '<th style="text-align:right;padding:4px 0;color:var(--text-secondary);font-size:var(--type-caption)">STAKE</th>'
    + '<th style="text-align:right;padding:4px 0;color:var(--text-secondary);font-size:var(--type-caption)">MARGIN%</th>'
    + '<th style="text-align:right;padding:4px 0;color:var(--text-secondary);font-size:var(--type-caption)">EXPOSURE</th>'
    + '<th style="text-align:right;padding:4px 0;color:var(--text-secondary);font-size:var(--type-caption)">MARGIN</th>'

// ETF ticker descriptions for tooltips
const ETF_DESC = {
  XLY:'Consumer Discretionary (SPDR)',XLP:'Consumer Staples (SPDR)',IWM:'Russell 2000 Small Cap (iShares)',
  SPY:'S&P 500 (SPDR)',HYG:'High Yield Corporate Bond (iShares)',TLT:'20+ Year Treasury Bond (iShares)',
  KRE:'Regional Banking (SPDR)',XLU:'Utilities (SPDR)',GLD:'Gold (SPDR)',XLI:'Industrials (SPDR)',
  XLV:'Health Care (SPDR)',XLF:'Financials (SPDR)',XLE:'Energy (SPDR)',XLK:'Technology (SPDR)',
  XLB:'Materials (SPDR)',XLRE:'Real Estate (SPDR)'
};
// Wrap a ticker string with a tooltip span
function tickerTip(t){var d=ETF_DESC[t];return d?'<span title="'+t+' — '+d+'" style="cursor:help;border-bottom:1px dotted rgba(255,255,255,0.3)">'+t+'</span>':t;}
// Wrap a "NUM/DEN" pair name with tooltips on each ticker
function pairTip(name){var parts=name.split('/');return parts.map(tickerTip).join('/');}

function renderRelStrength(data){
  const el = document.getElementById('rs-content');
  if(!el) return;
  // Load live ETF prices from rs_ratios.json
  if(data && data.etf_prices) ETF_PRICES_USD = data.etf_prices;
  if(!data || !data.pairs || data.pairs.length === 0){
    el.innerHTML = '<div class="insight"><strong>No RS ratio data available.</strong> Run <code>python3 generate_rs_ratios.py</code> to generate rs_ratios.json.</div>';
    return;
  }

  const regimeClr = data.regime==='Supportive'?P.pos:data.regime==='Restrictive'?P.neg:P.a1;
  const momDir = data.fiscal_momentum >= 0 ? 'Positive' : 'Negative';
  const momClr = data.fiscal_momentum >= 0 ? P.pos : P.neg;
  const aligned = data.pairs.filter(p=>p.regime_alignment==='Aligned').length;
  const total = data.pairs.length;
  const s = data.summary || {};

  // Section A — Summary Cards
  let h = `<div class="rs-summary">
    <div class="card">
      <div class="card-label mono">Regime</div>
      <div class="card-value" style="color:${regimeClr}">${data.regime}</div>
      <div class="card-change mono" style="color:${regimeClr}">${data.tga_trend||''} TGA</div>
    </div>
    <div class="card">
      <div class="card-label mono">Fiscal Momentum</div>
      <div class="card-value mono" style="color:${momClr}">${data.fiscal_momentum>0?'+':''}${Number(data.fiscal_momentum).toLocaleString()}</div>
      <div class="card-change mono" style="color:${momClr}">5d CFI minus 20d CFI</div>
    </div>
    <div class="card">
      <div class="card-label mono">Pair Alignment</div>
      <div class="card-value mono">${aligned}/${total}</div>
      <div class="card-change mono" style="color:${aligned>=total*0.6?P.pos:aligned>=total*0.3?P.a2:P.neg}">${s.conviction?s.conviction.split('—')[0]:''}</div>
    </div>
    <div class="card">
      <div class="card-label mono">Generated</div>
      <div class="card-value" style="font-size:var(--type-body)">${data.generated||'—'}</div>
    </div>
  </div>`;

  // Asset chips
  if(s.top_overweight && s.top_overweight.length > 0){
    h += '<div style="margin-bottom:16px"><div class="mini-title">Overweight Tilt</div><div class="rs-assets">';
    s.top_overweight.forEach(a=>{ h += `<span class="ow">${tickerTip(a)}</span>`; });
    h += '</div></div>';
  }
  if(s.top_underweight && s.top_underweight.length > 0){
    h += '<div style="margin-bottom:20px"><div class="mini-title">Underweight Tilt</div><div class="rs-assets">';
    s.top_underweight.forEach(a=>{ h += `<span class="uw">${tickerTip(a)}</span>`; });
    h += '</div></div>';
  }

  // Section B — Chart with pair selector
  h += '<div class="mini-title">RS Ratio Chart</div>';
  h += '<div class="rs-pair-sel" id="rs-pair-selector">';
  data.pairs.forEach((p,i)=>{
    h += `<button class="rs-pair-btn${i===0?' active':''}" data-idx="${i}" title="${p.name.split('/').map(t=>t+' — '+(ETF_DESC[t]||t)).join('  |  ')}">${p.name}</button>`;
  });
  h += '</div>';
  h += '<div class="chart-wrap" style="height:320px"><canvas id="chart-relstrength"></canvas></div>';
  h += `<div class="legend" id="rs-legend">
    <span><span class="legend-dot" style="background:${P.a1}"></span>RS Ratio</span>
    <span><span class="legend-dot" style="background:${P.a2}"></span>SMA(20)</span>
    <span><span class="legend-dot" style="background:rgba(16,185,129,0.15)"></span>Supportive</span>
    <span><span class="legend-dot" style="background:rgba(239,68,68,0.15)"></span>Restrictive</span>
  </div>`;

  // Section C — Pair Ranking Table (scored and sorted by trade quality)
  // Score each pair: 5 conditions, each worth 1 point
  var scored = data.pairs.map(function(p, origIdx) {
    var score = 0;
    // 1. Fiscal correlation strength: |corr| > 0.3
    var corrPass = Math.abs(p.fiscal_corr_60d) > 0.3;
    if (corrPass) score++;
    // 2. Ratio vs SMA20: is the trend confirmed?
    var sig = p.signal || '';
    var isLongNum = sig.includes('Overweight') || sig.includes('Numerator favored');
    var isShortNum = sig.includes('Underweight') || sig.includes('Denominator favored');
    var smaPass = (isLongNum && p.current_ratio > p.sma20) || (isShortNum && p.current_ratio < p.sma20);
    if (smaPass) score++;
    // 3. ROC confirms direction: > 0 for long num, < 0 for short num
    var rocPass = (isLongNum && p.roc_20d > 0) || (isShortNum && p.roc_20d < 0);
    if (rocPass) score++;
    // 4. Regime alignment
    var alignPass = p.regime_alignment === 'Aligned';
    if (alignPass) score++;
    // 5. Validated backtest edge exists for this pair+direction
    var btIdea = getTradeIdea(p);
    var btPass = btIdea !== null;
    if (btPass) score++;
    return {p:p, origIdx:origIdx, score:score, corrPass:corrPass, smaPass:smaPass, rocPass:rocPass, alignPass:alignPass, btPass:btPass, btIdea:btIdea};
  });
  // Sort: highest score first, then by |fiscal_corr| as tiebreaker
  scored.sort(function(a, b) {
    if (b.score !== a.score) return b.score - a.score;
    return Math.abs(b.p.fiscal_corr_60d) - Math.abs(a.p.fiscal_corr_60d);
  });

  var GRN = '#10b981';
  var DIM = 'rgba(255,255,255,0.25)';

  h += '<div style="margin-top:28px;display:flex;align-items:center;justify-content:space-between">';
  h += '<div class="mini-title" style="margin-bottom:0">Pair Rankings by Trade Quality</div>';
  h += '<button id="rs-toggle-edge" class="rs-pair-btn active" style="font-size:var(--type-caption);padding:4px 10px">Tradeable only</button>';
  h += '</div>';
  h += '<div style="overflow-x:auto"><table class="rs-table"><thead><tr>';
  h += '<th style="text-align:center">Score</th><th></th><th>Pair</th><th>Category</th><th>20d ROC</th><th>Ratio vs SMA20</th><th>60d Fiscal Corr</th><th>Signal</th><th>Aligned</th><th>Edge</th>';
  h += '</tr></thead><tbody>';
  scored.forEach(function(s, rank) {
    var p = s.p;
    var i = s.origIdx;
    var isTop = s.score >= 4;
    var rowDim = s.score <= 1 ? 'opacity:0.4;' : s.score === 2 ? 'opacity:0.55;' : s.score === 3 ? 'opacity:0.75;' : '';

    var vsma = p.current_ratio > p.sma20 ? 'Above' : 'Below';
    var vsmaClr = s.smaPass ? GRN : DIM;
    var corrClr = s.corrPass ? GRN : DIM;
    var rocClr = s.rocPass ? GRN : DIM;
    var alignClr = s.alignPass ? GRN : DIM;
    var btClr = s.btPass ? GRN : DIM;

    var sigCls = p.signal.includes('Overweight') || p.signal.includes('Numerator favored') ? 'rs-ow' : p.signal.includes('Underweight') || p.signal.includes('Denominator favored') ? 'rs-uw' : 'rs-mix';

    // Trade dot: only active if score >= 4 (at least 4 of 5 conditions met)
    var idea = s.score >= 4 ? s.btIdea : null;
    var dotCls = idea ? 'trade-dot active' : 'trade-dot inactive';
    var dotTitle = idea ? 'Click for trade idea (' + s.score + '/5)' : s.score + '/5 conditions met';

    // Score display: 5 filled dots
    var scoreDots = '';
    for (var d = 0; d < 5; d++) {
      scoreDots += '<span style="display:inline-block;width:7px;height:7px;margin:0 1px;'
        + 'background:' + (d < s.score ? GRN : 'rgba(255,255,255,0.1)') + ';border-radius:50%"></span>';
    }

    // Edge column: show backtest stats if validated, otherwise dash
    var edgeText = s.btPass
      ? '<span style="color:' + GRN + ';font-weight:600">+' + s.btIdea.mean.toFixed(1) + '% / ' + s.btIdea.hit.toFixed(0) + '%</span>'
      : '<span style="color:' + DIM + '">—</span>';

    // data-has-edge attribute for toggle filtering
    var edgeAttr = s.btPass ? 'data-has-edge="1"' : 'data-has-edge="0"';

    h += '<tr style="' + rowDim + '" ' + edgeAttr + '>'
      + '<td style="text-align:center;white-space:nowrap">' + scoreDots + '</td>'
      + '<td style="text-align:center;padding:10px 4px"><span class="' + dotCls + '" title="' + dotTitle + '" data-trade-idx="' + i + '"></span></td>'
      + '<td style="font-weight:600;color:' + (isTop ? 'var(--text-primary)' : 'var(--text-secondary)') + '">' + pairTip(p.name) + '</td>'
      + '<td style="color:' + (isTop ? 'var(--text-primary)' : DIM) + '">' + (p.category==='cross-asset'?'Cross-Asset':'Sector') + '</td>'
      + '<td style="color:' + rocClr + ';font-weight:' + (s.rocPass ? '600' : '400') + '">' + (p.roc_20d>=0?'+':'') + p.roc_20d.toFixed(1) + '%</td>'
      + '<td style="color:' + vsmaClr + ';font-weight:' + (s.smaPass ? '600' : '400') + '">' + vsma + '</td>'
      + '<td style="color:' + corrClr + ';font-weight:' + (s.corrPass ? '600' : '400') + '">' + (p.fiscal_corr_60d>0?'+':'') + p.fiscal_corr_60d.toFixed(3) + '</td>'
      + '<td><span class="rs-signal ' + sigCls + '">' + p.signal + '</span></td>'
      + '<td style="color:' + alignClr + ';font-weight:600">' + p.regime_alignment + '</td>'
      + '<td>' + edgeText + '</td>'
      + '</tr>';
    // Hidden expandable trade panel row (only for score >= 4 with validated idea)
    if (idea) {
      h += '<tr class="trade-panel" id="trade-panel-' + i + '"><td colspan="10">'
        + '<button class="tp-close" data-trade-idx="' + i + '">Close</button>'
        + buildTradePanel(idea, 3000)
        + '</td></tr>';
    }
  });
  h += '</tbody></table></div></div>';

  // Section D — Rotation Framework
  h += `<div class="insight" style="margin-top:24px">
    <strong>Trade Quality Score (5 conditions)</strong><br/>
    Each pair is scored on five conditions. <span style="color:#10b981">Green</span> = condition met. The trade idea dot activates at 4+ conditions. Lower-scored pairs are visually dimmed.<br/><br/>
    Columns are ordered by leading indicator preference (most leading nearest the pair name):<br/><br/>
    <strong>1. 20d ROC</strong> &#8212; momentum (leading). When ROC turns, the ratio is starting to move. First signal of a trend forming or reversing.<br/>
    <strong>2. Ratio vs SMA(20)</strong> &#8212; trend confirmation (lagging). Confirms the ROC move is sustained, not a false start.<br/>
    <strong>3. 60d Fiscal Corr</strong> &#8212; structural (slowest). |corr| > 0.3 means the pair responds meaningfully to fiscal flows. Sets <em>which</em> pair to watch.<br/>
    <strong>4. Regime Aligned</strong> &#8212; the fiscal regime supports the trade direction. Polarity is set by correlation sign: positive corr pairs align with Supportive (pro-cyclical), negative corr pairs align with Restrictive (counter-cyclical, e.g. GLD/SPY).<br/>
    <strong>5. Validated Edge</strong> &#8212; backtest (Jan 2023 &#8211; Mar 2026) confirms this pair+direction combo has a statistical edge after IG costs.<br/><br/>
    <span style="color:var(--text-dim)">This is a positioning framework, not investment advice. Only pairs scoring 4/5 or 5/5 generate a trade ticket.</span>
  </div>`;

  el.innerHTML = h;

  // Wire pair selector buttons
  const btns = document.querySelectorAll('#rs-pair-selector .rs-pair-btn');
  btns.forEach(btn=>{
    btn.addEventListener('click',()=>{
      btns.forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      const idx = parseInt(btn.dataset.idx);
      renderRSChart(data.pairs[idx]);
    });
  });

  // Wire trade idea dots and close buttons
  document.querySelectorAll('.trade-dot.active').forEach(dot=>{
    dot.addEventListener('click',()=>{
      const idx = dot.dataset.tradeIdx;
      const panel = document.getElementById('trade-panel-' + idx);
      if (!panel) return;
      document.querySelectorAll('.trade-panel.open').forEach(p=>{
        if (p.id !== 'trade-panel-' + idx) p.classList.remove('open');
      });
      panel.classList.toggle('open');
    });
  });
  document.querySelectorAll('.tp-close').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const idx = btn.dataset.tradeIdx;
      const panel = document.getElementById('trade-panel-' + idx);
      if (panel) panel.classList.remove('open');
    });
  });

  // Wire tradeable-only toggle
  var toggleBtn = document.getElementById('rs-toggle-edge');
  if (toggleBtn) {
    var showAll = false; // start with tradeable only
    // Apply initial filter
    document.querySelectorAll('.rs-table tbody tr[data-has-edge="0"]').forEach(function(row) {
      row.style.display = 'none';
    });
    toggleBtn.addEventListener('click', function() {
      showAll = !showAll;
      toggleBtn.textContent = showAll ? 'Tradeable only' : 'Show all';
      toggleBtn.classList.toggle('active', !showAll);
      document.querySelectorAll('.rs-table tbody tr[data-has-edge="0"]').forEach(function(row) {
        row.style.display = showAll ? '' : 'none';
      });
    });
  }

  // Render first pair chart
  renderRSChart(data.pairs[0]);
}

function renderRSChart(pair){
  destroyChart('relstrength');
  const canvas = document.getElementById('chart-relstrength');
  if(!canvas || !pair.series) return;

  const s = pair.series;
  const dates = s.dates.map(d=>{const p=d.split('-');return p[1]+'/'+p[2];});

  // Build regime background segments
  const regimeBg = s.regime.map(r=>r==='Supportive'?'rgba(16,185,129,0.08)':r==='Restrictive'?'rgba(239,68,68,0.08)':'rgba(255,255,255,0.02)');

  const ctx = canvas.getContext('2d');
  charts['relstrength'] = new Chart(ctx,{
    type:'line',
    data:{labels:dates,datasets:[
      {label:'RS Ratio',data:s.ratio,borderColor:P.a1,borderWidth:2.5,pointRadius:0,pointHoverRadius:4,
       pointHoverBackgroundColor:P.a1,tension:0.3,order:1},
      {label:'SMA(20)',data:s.sma20,borderColor:P.a2,borderWidth:1.5,borderDash:[6,3],pointRadius:0,
       pointHoverRadius:3,pointHoverBackgroundColor:P.a2,tension:0.3,order:2}
    ]},
    options:{responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{legend:{display:false},tooltip:{
        backgroundColor:'#0f0f13',borderColor:'rgba(255,255,255,0.1)',borderWidth:1,
        titleFont:{family:"'JetBrains Mono',monospace",size:12,weight:'bold'},
        bodyFont:{family:"'JetBrains Mono',monospace",size:12},
        titleColor:'#FAFAFA',bodyColor:'#FAFAFA',cornerRadius:8,padding:12,
        callbacks:{label:c=>c.parsed.y!==null?`${c.dataset.label}: ${c.parsed.y.toFixed(4)}`:''}
      }},
      scales:{
        x:{grid:{display:false},ticks:{font:{family:"'JetBrains Mono',monospace",size:10},color:P.muted,maxRotation:0,autoSkip:true,maxTicksLimit:12},border:{display:false}},
        y:{grid:{color:P.grid},ticks:{font:{family:"'JetBrains Mono',monospace",size:11},color:P.muted,callback:v=>v.toFixed(2)},border:{display:false}}
      }
    },
    plugins:[{
      id:'regimeBands',
      beforeDraw(chart){
        const {ctx:c,chartArea:{top,bottom,left,right},scales:{x}} = chart;
        const regime = s.regime;
        if(!regime) return;
        regime.forEach((r,i)=>{
          const x0 = i===0?left:x.getPixelForValue(i)-((x.getPixelForValue(1)-x.getPixelForValue(0))/2);
          const x1 = i===regime.length-1?right:x.getPixelForValue(i)+((x.getPixelForValue(1)-x.getPixelForValue(0))/2);
          c.fillStyle = r==='Supportive'?'rgba(16,185,129,0.06)':r==='Restrictive'?'rgba(239,68,68,0.06)':'transparent';
          c.fillRect(x0,top,x1-x0,bottom-top);
        });
      }
    }]
  });
}

function renderNarrative(narr){
  const el = document.getElementById('narrative-section');
  if(!el||!narr||!narr.topics||!narr.topics.length) return;
  const barColors = [P.a1,P.a2,P.a3,P.a4,P.a5,P.a6,P.pos,P.neg,P.muted];
  const top5 = narr.topics.slice(0,5);
  const maxPct = top5[0]?top5[0].pct:1;
  const ts = narr.fetched_at?new Date(narr.fetched_at).toLocaleString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'}):'';
  const topicsHtml = top5.map((t,i)=>{
    const barW = (t.pct/maxPct*100).toFixed(0);
    const c = barColors[i%barColors.length];
    const headlines = (t.sample_headlines||[]).slice(0,3).map(h=>`<li>${h}</li>`).join('');
    return `<div class="narr-topic">
      <div class="narr-topic-header">
        <span class="narr-topic-name">${t.topic}</span>
        <div class="narr-bar-wrap"><div class="narr-bar" style="width:${barW}%;background:${c}"></div></div>
        <span class="narr-topic-pct">${t.pct.toFixed(0)}%</span>
      </div>
      ${headlines?`<ul class="narr-headlines">${headlines}</ul>`:''}
    </div>`;
  }).join('');

  el.innerHTML = `<div class="narr-wrap">
    <div class="narr-header" onclick="this.parentElement.querySelector('.narr-body').classList.toggle('collapsed');this.querySelector('.narr-toggle').textContent=this.parentElement.querySelector('.narr-body').classList.contains('collapsed')?'\\u25B6':'\\u25BC'">
      <span class="narr-title mono">Market Narrative</span>
      <span class="narr-toggle">&#9660;</span>
    </div>
    <div class="narr-dominant">${narr.dominant||'No dominant narrative'}</div>
    <div class="narr-meta">${narr.total_headlines||0} headlines scanned${ts?' \u00B7 '+ts:''}</div>
    <div class="narr-body">
      ${topicsHtml}
    </div>
  </div>`;
}

// Load data and build
async function init(){
  try {
    const resp = await fetch('viz_data.json');
    if(!resp.ok) throw new Error('Could not load viz_data.json');
    const data = await resp.json();
    buildDashboard(data);

    // Load signal log (non-blocking — dashboard works without it)
    try {
      const slResp = await fetch('signal_log.jsonl');
      if(slResp.ok){
        const text = await slResp.text();
        const entries = text.trim().split('\n').filter(l=>l).map(l=>JSON.parse(l));
        window._signalLogData = entries;
        renderSignalLog(entries);
      } else {
        renderSignalLog([]);
      }
    } catch(slErr){
      console.warn('Signal log not available:', slErr.message);
      renderSignalLog([]);
    }

    // Load return attribution (non-blocking)
    try {
      const raResp = await fetch('signal_returns.json');
      if(raResp.ok){
        const raData = await raResp.json();
        window._returnData = raData;
        renderReturnAttribution(raData);
      }
    } catch(raErr){
      console.warn('Return attribution not available:', raErr.message);
    }

    // Load technicals data (non-blocking)
    try {
      const techResp = await fetch('technicals_data.json');
      if(techResp.ok){
        window._techData = await techResp.json();
      }
    } catch(techErr){
      console.warn('Technicals data not available:', techErr.message);
    }

    // Load RS ratios data (non-blocking)
    try {
      const rsResp = await fetch('rs_ratios.json');
      if(rsResp.ok){
        window._rsData = await rsResp.json();
      }
    } catch(rsErr){
      console.warn('RS ratios data not available:', rsErr.message);
    }

    // Load market narrative (non-blocking)
    try {
      const narrResp = await fetch('narrative.json');
      if(narrResp.ok){
        const narrData = await narrResp.json();
        window._narrativeData = narrData;
        renderNarrative(narrData);
      }
    } catch(narrErr){
      console.warn('Narrative data not available:', narrErr.message);
    }
  } catch(e){
    document.getElementById('loader').innerHTML =
      '<div style="color:#ef4444">Failed to load viz_data.json</div><div style="color:#94A3B8;font-size:var(--type-body-sm);margin-top:8px">'+e.message+'<br/>Make sure viz_data.json is in the same directory as index.html</div>';
  }
}
init();

// Theme toggle
function toggleTheme() {
  const html = document.documentElement;
  const isLight = html.getAttribute('data-theme') === 'light';
  if (isLight) {
    html.removeAttribute('data-theme');
    document.getElementById('theme-icon').innerHTML = '&#9790;';
    document.getElementById('theme-label').textContent = 'Dark';
    localStorage.setItem('rfa-theme', 'dark');
  } else {
    html.setAttribute('data-theme', 'light');
    document.getElementById('theme-icon').innerHTML = '&#9788;';
    document.getElementById('theme-label').textContent = 'Light';
    localStorage.setItem('rfa-theme', 'light');
  }
}
(function() {
  var saved = localStorage.getItem('rfa-theme');
  if (saved === 'light') {
    document.documentElement.setAttribute('data-theme', 'light');
    var icon = document.getElementById('theme-icon');
    var label = document.getElementById('theme-label');
    if (icon) icon.innerHTML = '&#9788;';
    if (label) label.textContent = 'Light';
  }
})();
</script>
